<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גיליון</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/css/pluginsCss.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/plugins.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/css/luckysheet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/assets/iconfont/iconfont.css">
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/js/plugin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/luckysheet.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body {
    height: 100%;
    overscroll-behavior: none; /* מונע זליגת גלילה לדף הנושן */
  }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #fff; color: #37352f;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ריווח עליון קבוע — משאיר מקום לפופ-אפ הריחוף של נושן */
  .content { flex: 1; min-height: 0; padding: 30px 4px 2px; position: relative; }
  #sheetRoot { height: 100%; width: 100%; position: relative; }

  /* מצב נקי: מסתיר בכוח כל שארית של פסים תחתונים ומחווני זום */
  body:not(.chrome-on) .luckysheet-stat-area,
  body:not(.chrome-on) .luckysheet-sheet-area,
  body:not(.chrome-on) #luckysheet-bottom-controll-row,
  body:not(.chrome-on) .luckysheet-zoom-content,
  body:not(.chrome-on) #luckysheet-zoom-content,
  body:not(.chrome-on) .luckysheet-print-viewBtn { display: none !important; }

  .toolbar {
    display: flex; gap: 6px; align-items: center;
    flex-wrap: nowrap; overflow-x: auto; scrollbar-width: thin;
    margin: 6px 10px 10px; padding: 6px 10px;
    border: 1px solid #e9e9e7; border-radius: 10px; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .toolbar::-webkit-scrollbar { height: 4px; }
  .toolbar::-webkit-scrollbar-thumb { background: #d3d3d0; border-radius: 2px; }
  .toolbar a { text-decoration: none; font-size: 15px; flex-shrink: 0; }
  #docName {
    border: 1px solid transparent; border-radius: 6px; background: transparent;
    font-size: 13.5px; font-weight: 600; color: #37352f;
    padding: 3px 8px; min-width: 60px; max-width: 170px; flex: 1 1 60px;
    direction: rtl;
  }
  #docName:hover { border-color: #d3d3d0; }
  #docName:focus { outline: none; border-color: #2383e2; }
  .toolbar button {
    border: 1px solid #d3d3d0; background: #fff; color: #37352f;
    border-radius: 6px; padding: 4px 9px; font-size: 12.5px; cursor: pointer;
    flex-shrink: 0; white-space: nowrap; font-family: inherit;
  }
  .toolbar button:hover { background: #f1f1ef; }
  .toolbar button.on { background: #37352f; color: #fff; border-color: #37352f; }
  .zoomGroup { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  #zoomPct {
    width: 52px; text-align: center; border: 1px solid #d3d3d0; border-radius: 6px;
    padding: 3px 2px; font-size: 12.5px; direction: ltr;
  }
  #zoomPct:focus { outline: none; border-color: #2383e2; }
  #saveStatus { font-size: 11.5px; color: #9b9a97; flex-shrink: 0; white-space: nowrap; }

  body.toolbar-hidden .toolbar { display: none; }
  #showBtn {
    display: none; position: fixed; bottom: 10px; inset-inline-start: 10px;
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid #d3d3d0; background: #fff; cursor: pointer;
    font-size: 13px; opacity: .35; box-shadow: 0 2px 6px rgba(0,0,0,.1);
    align-items: center; justify-content: center; z-index: 100000;
  }
  #showBtn:hover { opacity: 1; }
  body.toolbar-hidden #showBtn { display: none; }

  /* פריטי התפריט המורחב בקליק ימני */
  #dovExtraMenu { direction: rtl; text-align: right; border-top: 1px solid #e1e1e1; margin-top: 4px; padding-top: 4px; }
  #dovExtraMenu .dov-menuitem {
    padding: 6px 12px; cursor: pointer; font-size: 13px; color: #37352f; white-space: nowrap;
  }
  #dovExtraMenu .dov-menuitem:hover { background: #f1f1ef; }

  /* מודאלים קטנים */
  .dovOverlay {
    position: fixed; inset: 0; background: rgba(15,15,15,.45);
    display: flex; align-items: center; justify-content: center; z-index: 100001;
  }
  .dovBox {
    background: #fff; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,.25);
    width: min(330px, 92vw); max-height: 80vh; overflow-y: auto;
    padding: 12px 14px; direction: rtl;
  }
  .dovHead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 700; font-size: 14px; }
  .dovClose { border: none; background: none; font-size: 15px; cursor: pointer; color: #9b9a97; }
  .dovClose:hover { color: #37352f; }
  .dovLabel { font-size: 12px; color: #787774; margin: 8px 0 4px; }
  .dovSwatches { display: flex; flex-wrap: wrap; gap: 5px; }
  .dovSwatch {
    width: 22px; height: 22px; border-radius: 4px; border: 1px solid #d3d3d0; cursor: pointer; padding: 0;
  }
  .dovSwatch:hover { transform: scale(1.15); }
  .dovBtnRow { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .dovBtnRow button, .dovListItem {
    border: 1px solid #d3d3d0; background: #fff; border-radius: 6px;
    padding: 4px 9px; font-size: 12.5px; cursor: pointer; font-family: inherit; color: #37352f;
  }
  .dovBtnRow button:hover, .dovListItem:hover { background: #f1f1ef; }
  .dovList { display: flex; flex-direction: column; gap: 5px; }
  .dovListItem { text-align: right; }
  .dovListItem.active { background: #37352f; color: #fff; border-color: #37352f; }
  .dovBox select { border: 1px solid #d3d3d0; border-radius: 6px; padding: 3px 6px; font-size: 12.5px; font-family: inherit; }

  /* תפריט הקליק הימני: לא נחתך — נגלל */
  #luckysheet-rightclick-menu { max-height: calc(100vh - 16px) !important; overflow-y: auto !important; }
  #dovExtraMenu { border-top: none; border-bottom: 1px solid #e1e1e1; margin: 0 0 4px; padding: 0 0 4px; }
  #dovExtraMenu .dov-head { font-weight: 700; }
  #dovExtraMenu .dov-sub { display: none; }
  #dovExtraMenu.open .dov-sub { display: block; }
  #dovExtraMenu .dov-sub .dov-menuitem { padding-right: 26px; }
  #dovExtraMenu .dov-arrow { float: left; color: #9b9a97; font-size: 11px; }

  .dovSwatch.sel { outline: 2px solid #2383e2; outline-offset: 1px; }
  .dovBtnRow button.on { background: #2383e2; color: #fff; border-color: #2383e2; font-weight: 700; }
  .dovBtnRow button.on::before { content: "\2713 "; }
  #luckysheet-scrollbar-x, #luckysheet-scrollbar-y, .luckysheet-scrollbar-x, .luckysheet-scrollbar-y { overscroll-behavior: none; }
</style>
</head>
<body>

  <div class="content"><div id="sheetRoot"></div></div>

  <div class="toolbar">
    <a href="index.html" title="כל הקבצים">🏠</a>
    <input id="docName" title="שם הגיליון — לחץ כדי לערוך">
    <button id="chromeBtn" title="הצגת/הסתרת סרגל הכלים, שורת הנוסחאות והלשוניות">🎛️ תפריטים</button>
    <button id="rowNumBtn" title="קביעת רוחב עמודת מספרי השורות">🔢 שורות</button>
    <span class="zoomGroup">
      <button id="zoomOut" title="הקטנת תצוגה">➖</button>
      <input id="zoomPct" value="100" title="אחוז תצוגה — הקלד ערך חופשי (25 עד 400)">
      <button id="zoomIn" title="הגדלת תצוגה">➕</button>
    </span>
    <button id="undoBtn" title="ביטול פעולה אחרונה (Ctrl+Z)">↩</button>
    <button id="redoBtn" title="ביצוע חוזר (Ctrl+Y)">↪</button>
    <button id="linksBtn" title="היכן הגיליון משובץ בנושן">🔗</button>
    <button id="copyUrlBtn" title="העתקת כתובת הדף הנוכחי (לשחזור הטמעה)">📋</button>
    <button id="csvBtn" title="הורדה כ-CSV (נפתח באקסל)">⬇️ CSV</button>
    <span id="saveStatus">טוען...</span>
    <button id="hideBtn" title="הסתרת הסרגל">⌄</button>
  </div>
  <button id="showBtn" title="הצגת הסרגל">⌃</button>

<script src="storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="cloud.js"></script>
<script src="links-ui.js"></script>
<script>
  // תיקון קריטי: מניעת קפיצת דף הנושן המארח.
  (function () {
    const origFocus = HTMLElement.prototype.focus;
    HTMLElement.prototype.focus = function (opts) {
      return origFocus.call(this, Object.assign({ preventScroll: true }, opts || {}));
    };
    const dovOrigSIV = Element.prototype.scrollIntoView;
    Element.prototype.scrollIntoView = function () {};
    setTimeout(function () { Element.prototype.scrollIntoView = dovOrigSIV; }, 1500);
  })();

  const docNameInput = document.getElementById("docName");
  const saveStatus = document.getElementById("saveStatus");
  const sheetRoot = document.getElementById("sheetRoot");
  const chromeBtn = document.getElementById("chromeBtn");
  const rowNumBtn = document.getElementById("rowNumBtn");
  const zoomPct = document.getElementById("zoomPct");

  window.addEventListener("error", (e) => {
    if (saveStatus) saveStatus.textContent = "⚠️ שגיאה: " + e.message;
  });

  // ----- טעינת המסמך -----
  const params = new URLSearchParams(location.search);
  // אם הקישור כולל מזהה מרחב (space) — מתחברים אליו אוטומטית גם אם האחסון המקומי נוקה
  try {
    const spParam = params.get("space");
    if (spParam && window.dovCloud && !dovCloud.spaceId()) dovCloud.setSpaceId(spParam);
  } catch (e) {}
  let docId = params.get("id");
  let doc = docId ? getDoc(docId) : null;
  if (!doc && docId && window.dovCloud && dovCloud.spaceId()) {
    // הקובץ לא נמצא מקומית (הדפדפן ניקה את האחסון?) — לא יוצרים קובץ חדש וריק!
    // שלד עם אותו מזהה ו-updated ריק — המשיכה מהענן (שרצה מיד) תמיד תנצח ותחזיר את התוכן
    doc = { id: docId, type: "sheet", name: defaultName(), content: "", data: null, folderId: null, links: [], created: nowIso(), updated: "" };
    window.dovStore.putDoc(doc);
  }
  if (!doc) {
    doc = createDoc("sheet", null);
    docId = doc.id;
    history.replaceState(null, "", "sheet.html?id=" + encodeURIComponent(docId));
  }
  docNameInput.value = doc.name;

  // ----- העדפות תצוגה -----
  let chromeOn = false;
  let rowHeaderW = 32;
  try {
    chromeOn = localStorage.getItem("dov-sheet-chrome") === "1";
    const w = parseInt(localStorage.getItem("dov-sheet-rowheaderw"), 10);
    if (!isNaN(w)) rowHeaderW = Math.max(0, Math.min(120, w));
  } catch (e) {}

  // ----- המרת נתונים מהמנוע הישן (x-spreadsheet) -----
  function convertOldData(old) {
    const sheets = [];
    old.forEach((os, i) => {
      const celldata = [];
      const rows = (os && os.rows) || {};
      Object.keys(rows).forEach((rk) => {
        if (rk === "len") return;
        const r = parseInt(rk, 10);
        if (isNaN(r)) return;
        const cells = (rows[rk] && rows[rk].cells) || {};
        Object.keys(cells).forEach((ck) => {
          const c = parseInt(ck, 10);
          if (isNaN(c)) return;
          const t = cells[ck].text;
          if (t !== undefined && t !== "") {
            celldata.push({ r: r, c: c, v: { v: t, m: String(t) } });
          }
        });
      });
      sheets.push({ name: (os && os.name) || ("Sheet" + (i + 1)), index: "s" + (i + 1), order: i, status: i === 0 ? 1 : 0, celldata: celldata });
    });
    return sheets.length ? sheets : null;
  }

  let initialSheets = null;
  if (doc.data && doc.data.engine === "luckysheet" && Array.isArray(doc.data.sheets) && doc.data.sheets.length) {
    initialSheets = doc.data.sheets;
  } else if (Array.isArray(doc.data)) {
    initialSheets = convertOldData(doc.data);
  }
  if (!initialSheets) {
    initialSheets = [{ name: "Sheet1", index: "s1", order: 0, status: 1, celldata: [] }];
  }

  // ----- שמירה -----
  let saveTimer = null;
  function snapshot() {
    const sheets = luckysheet.getAllSheets();
    sheets.forEach((s) => {
      try {
        if (s.data) {
          s.celldata = luckysheet.transToCellData(s.data);
          delete s.data;
        }
      } catch (e) {}
      delete s.load;
    });
    return sheets;
  }
  function scheduleSave() {
    saveStatus.textContent = "שומר...";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try {
        updateDoc(docId, { data: { engine: "luckysheet", sheets: snapshot() } });
        saveStatus.textContent = "נשמר ✓";
      } catch (e) {
        saveStatus.textContent = "⚠️ השמירה נכשלה";
      }
    }, 600);
  }

  // ----- מודאל כללי -----
  function dovModal(title, buildBody) {
    const ov = document.createElement("div");
    ov.className = "dovOverlay";
    const box = document.createElement("div");
    box.className = "dovBox";
    const head = document.createElement("div");
    head.className = "dovHead";
    const titleSpan = document.createElement("span");
    titleSpan.textContent = title;
    const x = document.createElement("button");
    x.className = "dovClose";
    x.textContent = "✕";
    head.appendChild(titleSpan);
    head.appendChild(x);
    box.appendChild(head);
    const body = document.createElement("div");
    box.appendChild(body);
    ov.appendChild(box);
    document.body.appendChild(ov);
    function close() { ov.remove(); }
    x.addEventListener("click", close);
    ov.addEventListener("click", (e) => { if (e.target === ov) close(); });
    buildBody(body, close);
  }

  // ----- עיצוב מהיר (על הטווח המסומן) עם חיווי מצב -----
  const dovColors = ["#37352f", "#787774", "#e03e3e", "#d9730d", "#dfab01", "#0f7b6c", "#0b6e99", "#6940a5", "#ad1a72", "#ffffff", "#f1f1ef", "#fbe4e4", "#faebdd", "#fbf3db", "#ddedea", "#ddebf1", "#eae4f2", "#f4dfeb"];
  function setFmt(attr, value) {
    try { luckysheet.setRangeFormat(attr, value); scheduleSave(); } catch (e) { alert("לא הצלחתי להחיל — ודא שיש תאים מסומנים"); }
  }
  function dovGetSelCell() {
    try {
      const r = luckysheet.getRange();
      if (r && r[0]) return { r: r[0].row[0], c: r[0].column[0] };
    } catch (e) {}
    return null;
  }
  function dovCellAttr(attr) {
    const s = dovGetSelCell();
    if (!s) return null;
    try { return luckysheet.getCellValue(s.r, s.c, { type: attr }); } catch (e) { return null; }
  }
  function openQuickFormat() {
    dovModal("\ud83c\udfa8 עיצוב מהיר לתאים המסומנים", (body) => {
      const refreshers = [];
      function refreshAll() { refreshers.forEach((f) => { try { f(); } catch (e) {} }); }

      function swatchRow(label, attr) {
        const lab = document.createElement("div");
        lab.className = "dovLabel";
        lab.textContent = label;
        body.appendChild(lab);
        const row = document.createElement("div");
        row.className = "dovSwatches";
        dovColors.forEach((c) => {
          const b = document.createElement("button");
          b.className = "dovSwatch";
          b.style.background = c;
          b.title = c;
          b.dataset.c = c;
          b.addEventListener("click", () => { setFmt(attr, c); setTimeout(refreshAll, 120); });
          row.appendChild(b);
        });
        refreshers.push(() => {
          const cur = String(dovCellAttr(attr) || "").toLowerCase();
          row.querySelectorAll(".dovSwatch").forEach((btn) => {
            btn.classList.toggle("sel", btn.dataset.c === cur);
          });
        });
        body.appendChild(row);
      }

      function dovBtnGroup(labelText, defs) {
        const lab = document.createElement("div");
        lab.className = "dovLabel";
        lab.textContent = labelText;
        body.appendChild(lab);
        const r = document.createElement("div");
        r.className = "dovBtnRow";
        defs.forEach((def) => {
          const t = def[0], fn = def[1], isOn = def[2];
          const b = document.createElement("button");
          b.textContent = t;
          b.addEventListener("click", () => { fn(); setTimeout(refreshAll, 120); });
          if (isOn) refreshers.push(() => { b.classList.toggle("on", !!isOn()); });
          r.appendChild(b);
        });
        body.appendChild(r);
      }

      swatchRow("צבע רקע", "bg");
      swatchRow("צבע טקסט", "fc");
      dovBtnGroup("סגנון טקסט (לחיצה מדליקה/מכבה)", [
        ["\ud835\udc01 מודגש", () => setFmt("bl", dovCellAttr("bl") == 1 ? 0 : 1), () => dovCellAttr("bl") == 1],
        ["\ud835\udc3c נטוי", () => setFmt("it", dovCellAttr("it") == 1 ? 0 : 1), () => dovCellAttr("it") == 1],
        ["קו תחתון", () => setFmt("un", dovCellAttr("un") == 1 ? 0 : 1), () => dovCellAttr("un") == 1],
        ["קו חוצה", () => setFmt("cl", dovCellAttr("cl") == 1 ? 0 : 1), () => dovCellAttr("cl") == 1],
      ]);
      dovBtnGroup("יישור אופקי", [
        ["ימין", () => setFmt("ht", 2), () => dovCellAttr("ht") == 2],
        ["מרכז", () => setFmt("ht", 0), () => dovCellAttr("ht") == 0],
        ["שמאל", () => setFmt("ht", 1), () => dovCellAttr("ht") == 1],
      ]);
      dovBtnGroup("יישור אנכי", [
        ["למעלה", () => setFmt("vt", 1), () => dovCellAttr("vt") == 1],
        ["אמצע", () => setFmt("vt", 0), () => dovCellAttr("vt") == 0],
        ["למטה", () => setFmt("vt", 2), () => dovCellAttr("vt") == 2],
      ]);
      dovBtnGroup("טקסט ארוך", [
        ["גלישת שורות", () => setFmt("tb", 2), () => dovCellAttr("tb") == 2],
        ["זליגה לתא הסמוך", () => setFmt("tb", 1), () => dovCellAttr("tb") == 1],
        ["חיתוך", () => setFmt("tb", 0), () => dovCellAttr("tb") == 0],
      ]);
      dovBtnGroup("גבולות התא", [
        ["כל הגבולות", () => setBorder("border-all")],
        ["מסגרת חיצונית", () => setBorder("border-outside")],
        ["פנימיים", () => setBorder("border-inside")],
        ["תחתון", () => setBorder("border-bottom")],
        ["עליון", () => setBorder("border-top")],
        ["ימני", () => setBorder("border-right")],
        ["שמאלי", () => setBorder("border-left")],
        ["ללא גבולות", () => setBorder("border-none")],
      ]);

      const labC = document.createElement("div");
      labC.className = "dovLabel";
      labC.textContent = "צבע מותאם אישית";
      body.appendChild(labC);
      const rowC = document.createElement("div");
      rowC.className = "dovBtnRow";
      const pick = document.createElement("input");
      pick.type = "color";
      pick.value = "#ffe066";
      rowC.appendChild(pick);
      const applyBg = document.createElement("button");
      applyBg.textContent = "החל כרקע";
      applyBg.addEventListener("click", () => { setFmt("bg", pick.value); setTimeout(refreshAll, 120); });
      rowC.appendChild(applyBg);
      const applyFc = document.createElement("button");
      applyFc.textContent = "החל כצבע טקסט";
      applyFc.addEventListener("click", () => { setFmt("fc", pick.value); setTimeout(refreshAll, 120); });
      rowC.appendChild(applyFc);
      const condBtn = document.createElement("button");
      condBtn.textContent = "\ud83d\udea6 עיצוב לפי תנאים...";
      condBtn.addEventListener("click", openCondFormat);
      rowC.appendChild(condBtn);
      body.appendChild(rowC);

      dovBtnGroup("מיזוג תאים", [
        ["מזג את הטווח", () => { try { luckysheet.setRangeMerge("all"); scheduleSave(); } catch (e) { alert("סמן קודם טווח של כמה תאים"); } }],
        ["בטל מיזוג", () => { try { luckysheet.cancelRangeMerge(); scheduleSave(); } catch (e) {} }],
      ]);

      const lab2 = document.createElement("div");
      lab2.className = "dovLabel";
      lab2.textContent = "גודל גופן";
      body.appendChild(lab2);
      const sel = document.createElement("select");
      [9, 10, 11, 12, 14, 16, 18, 20, 24, 28].forEach((n) => {
        const o = document.createElement("option");
        o.value = n;
        o.textContent = n;
        if (n === 11) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener("change", () => setFmt("fs", parseInt(sel.value, 10)));
      refreshers.push(() => {

  function copyCurrentUrl() {
    let url = location.href;
    // מצרפים את מזהה המרחב — כך ההטמעה תתחבר לענן גם אם האחסון המקומי נוקה
    try {
      if (window.dovCloud && dovCloud.spaceId() && url.indexOf("space=") < 0) {
        url += (url.indexOf("?") >= 0 ? "&" : "?") + "space=" + encodeURIComponent(dovCloud.spaceId());
      }
    } catch (e) {}
    try {
      const ta = document.createElement("textarea");
      ta.value = url;
      ta.style.cssText = "position:fixed;top:-100px;left:0;opacity:0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      if (ok) { saveStatus.textContent = "הכתובת הועתקה ✓"; return; }
    } catch (e) {}
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(
          () => { saveStatus.textContent = "הכתובת הועתקה ✓"; },
          () => dovShowUrlModal(url)
        );
        return;
      }
    } catch (e) {}
    dovShowUrlModal(url);
  }

  function dovColName(i) {

    const els = document.querySelectorAll('div[id*="menu"], div[class*="menu"], div[id*="Menu"], div[class*="Menu"]');
    els.forEach((el) => {
      if (el.style && el.style.display === "none") return;
      if (el.id === "dovExtraMenu") return;
      if (el.closest && el.closest(".dovOverlay")) return;
      const cs = window.getComputedStyle(el);
      if (cs.display === "none" || cs.visibility === "hidden") return;
      if (cs.position !== "absolute" && cs.position !== "fixed") return;
      let r = el.getBoundingClientRect();
      if (r.width < 60 || r.height < 40) return;
      const mh = (vh - 8) + "px";
      if (r.height > vh - 8 && el.style.maxHeight !== mh) {
        el.style.maxHeight = mh;
        el.style.overflowY = "auto";
      }
      const mw = (vw - 8) + "px";
      if (r.width > vw - 8 && el.style.maxWidth !== mw) {
        el.style.maxWidth = mw;
        el.style.overflowX = "auto";
      }
      r = el.getBoundingClientRect();
      let dx = 0;
      let dy = 0;
      if (r.bottom > vh - 4) dy = (vh - 4) - r.bottom;
      if (r.top + dy < 4) dy = 4 - r.top;
      if (r.right > vw - 4) dx = (vw - 4) - r.right;
      if (r.left + dx < 4) dx = 4 - r.left;
      // סטייה של עד 2 פיקסלים לא מוזזת — מונע רעד בגבול
      if (Math.abs(dy) > 2) el.style.top = Math.round(el.offsetTop + dy) + "px";
      if (Math.abs(dx) > 2) el.style.left = Math.round(el.offsetLeft + dx) + "px";
    });
  }
  function dovQueueClamp() {
    if (dovClampPending) return;
    dovClampPending = true;
    setTimeout(dovClampMenus, 30);
  }
  function dovClampSoon() {
    setTimeout(dovClampMenus, 60);
    setTimeout(dovClampMenus, 200);
  }
  // במק המקש המקובל הוא Cmd, אבל המנוע מכיר רק Ctrl — ממפים Cmd+קליק ל-Ctrl+קליק
  document.addEventListener("mousedown", function (e) {
    if (e.metaKey && !e.ctrlKey && e.button === 0) {
      const t = e.target;
      if (t && t.closest && t.closest("#sheetRoot")) {
        e.stopImmediatePropagation();
        e.preventDefault();
        const ev = new MouseEvent("mousedown", {
          bubbles: true,
          cancelable: true,
          view: window,
          clientX: e.clientX,
          clientY: e.clientY,
          button: 0,
          ctrlKey: true,
          shiftKey: e.shiftKey,
        });
        t.dispatchEvent(ev);
      }
    }
  }, true);
  document.addEventListener("click", dovClampSoon);
  document.addEventListener("mouseover", function (e) {
    if (e.target && e.target.closest && e.target.closest('div[id*="menu"], div[class*="menu"]')) dovClampSoon();
  });
  window.addEventListener("resize", dovQueueClamp);
  document.addEventListener("contextmenu", () => { setTimeout(dovClampMenus, 50); setTimeout(dovClampMenus, 150); });

  // ----- גלילה, מגע וזום בצביטה -----
  function dovBars() {
    const sy = document.getElementById("luckysheet-scrollbar-y") || document.querySelector(".luckysheet-scrollbar-y");
    const sx = document.getElementById("luckysheet-scrollbar-x") || document.querySelector(".luckysheet-scrollbar-x");
    return { sy: sy, sx: sx };
  }
  function dovGetScrollTop() {
    const b = dovBars();
    if (b.sy) return b.sy.scrollTop;
    try {
      const s = luckysheet.getSheet();
      if (s && typeof s.scrollTop === "number") return s.scrollTop;
    } catch (e) {}
    return 0;
  }
  function dovScrollTo(y) {
    y = Math.max(0, y);
    const b = dovBars();
    if (b.sy && b.sy.clientHeight > 0) { b.sy.scrollTop = y; return; }
    try { luckysheet.scroll({ scrollTop: y }); } catch (e) {}
  }
  function dovScrollBy(dy, dx) {
    if (dy) dovScrollTo(dovGetScrollTop() + dy);
    if (dx) {
      const b = dovBars();
      if (b.sx) b.sx.scrollLeft = Math.max(0, b.sx.scrollLeft + dx);
    }
  }

  // בליעת גלילה שלא תזלוג לנושן + זום בצביטה בטאצ'-פד (Ctrl+גלגלת)
  let dovLastWheelZoom = 0;
  sheetRoot.addEventListener("wheel", (e) => {
    if (e.ctrlKey) {
      e.preventDefault();
      const now = Date.now();
      if (now - dovLastWheelZoom > 80) {
        dovLastWheelZoom = now;
        applyZoom(currentZoom() * (e.deltaY < 0 ? 1.06 : 0.94));
      }
      return;
    }
    if (e.target && e.target.closest && e.target.closest("#luckysheet-scrollbar-x, #luckysheet-scrollbar-y, .luckysheet-scrollbar-x, .luckysheet-scrollbar-y")) return;
    e.preventDefault();
    const dy = e.deltaY;
    if (dy && Math.abs(dy) > Math.abs(e.deltaX || 0)) {
      const syEl = dovBars().sy;
      const before = syEl ? syEl.scrollTop : null;
      setTimeout(() => {
        const b2 = dovBars();
        if (!b2.sy || b2.sy.scrollTop === before) dovScrollBy(dy);
      }, 40);
    }
  }, { passive: false });

  // גלילה אוטומטית כשגוררים סימון אל הקצה העליון/התחתון
  let dovAutoVy = 0;
  let dovAutoTimer = null;
  let dovDragging = false;
  function dovSetAuto(vy) {
    dovAutoVy = vy;
    if (!vy) {
      if (dovAutoTimer) { clearInterval(dovAutoTimer); dovAutoTimer = null; }
      return;
    }
    if (!dovAutoTimer) {
      dovAutoTimer = setInterval(() => { dovScrollBy(dovAutoVy); }, 50);
    }
  }
  function dovEdgeCheck(clientY) {
    const rect = sheetRoot.getBoundingClientRect();
    if (clientY > rect.bottom - 28) dovSetAuto(Math.min(60, 14 + (clientY - (rect.bottom - 28))));
    else if (clientY < rect.top + 46 && clientY >= rect.top) dovSetAuto(-16);
    else dovSetAuto(0);
  }
  sheetRoot.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    if (e.target && e.target.closest && e.target.closest("#luckysheet-scrollbar-x, #luckysheet-scrollbar-y, .luckysheet-scrollbar-x, .luckysheet-scrollbar-y")) return;
    dovDragging = true;
  });
  document.addEventListener("mousemove", (e) => { if (dovDragging) dovEdgeCheck(e.clientY); });
  document.addEventListener("mouseup", () => { dovDragging = false; dovSetAuto(0); });

  // מגע: שתי אצבעות = גלילה חופשית או זום בצביטה; אצבע אחת ליד הקצה = גלילה תוך כדי סימון
  let dovPinch = null;
  function dovDist(t) {
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }
  sheetRoot.addEventListener("touchstart", (e) => {
    if (e.touches.length === 2) {
      dovPinch = {
        d0: dovDist(e.touches),
        z0: currentZoom(),
        x0: (e.touches[0].clientX + e.touches[1].clientX) / 2,
        y0: (e.touches[0].clientY + e.touches[1].clientY) / 2,
        mode: null,
        last: 0,
      };
    }
  }, { passive: true });
  sheetRoot.addEventListener("touchmove", (e) => {
    if (e.touches.length === 2 && dovPinch) {
      e.preventDefault();
      const d = dovDist(e.touches);
      const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      if (!dovPinch.mode) {
        if (Math.abs(d - dovPinch.d0) > 18) dovPinch.mode = "zoom";
        else if (Math.abs(my - dovPinch.y0) > 14 || Math.abs(mx - dovPinch.x0) > 14) dovPinch.mode = "pan";
      }
      if (dovPinch.mode === "zoom") {
        const now = Date.now();
        if (now - dovPinch.last > 90) {
          dovPinch.last = now;
          applyZoom(dovPinch.z0 * (d / dovPinch.d0));
        }
      } else if (dovPinch.mode === "pan") {
        dovScrollBy(-(my - dovPinch.y0), -(mx - dovPinch.x0));
        dovPinch.y0 = my;
        dovPinch.x0 = mx;
      }
      return;
    }
    if (e.touches.length === 1) dovEdgeCheck(e.touches[0].clientY);
  }, { passive: false });
  sheetRoot.addEventListener("touchend", (e) => {
    if (e.touches.length < 2) dovPinch = null;
    if (e.touches.length === 0) dovSetAuto(0);
  }, { passive: true });

  // מעקב מקלדת: שהתצוגה תרד ותעלה יחד עם הסימון (חיצים / Enter)
  document.addEventListener("keydown", (e) => {
    if (["ArrowDown", "ArrowUp", "Enter", "PageDown", "PageUp"].indexOf(e.key) === -1) return;
    setTimeout(() => {
      try {
        const rng = luckysheet.getRange();
        if (!rng || !rng[0]) return;
        const row = rng[0].row[1];
        const sheet = luckysheet.getSheet();
        const rows = sheet && sheet.visibledatarow;
        if (!rows || rows[row] == null) return;
        const z = currentZoom();
        const bottomPx = rows[row] * z;
        const topPx = (row > 0 ? rows[row - 1] : 0) * z;
        const b = dovBars();
        const cur = dovGetScrollTop();
        const viewH = (b.sy && b.sy.clientHeight) || sheetRoot.clientHeight;
        if (bottomPx > cur + viewH - 8) dovScrollTo(bottomPx - viewH + 30);
        else if (topPx < cur) dovScrollTo(Math.max(0, topPx - 8));
      } catch (err) {}
    }, 60);
  });

  // ----- זום -----
  function applyZoom(z) {
    z = Math.max(0.25, Math.min(4, z));
    try { luckysheet.setSheetZoom(z); } catch (e) {}
    zoomPct.value = Math.round(z * 100);
    scheduleSave();
  }
  function currentZoom() {
    const v = parseInt(zoomPct.value, 10);
    return isNaN(v) ? 1 : v / 100;
  }
  document.getElementById("zoomIn").addEventListener("click", () => applyZoom(currentZoom() + 0.25));
  document.getElementById("zoomOut").addEventListener("click", () => applyZoom(currentZoom() - 0.25));
  zoomPct.addEventListener("change", () => applyZoom(currentZoom()));
  zoomPct.addEventListener("keydown", (e) => { if (e.key === "Enter") applyZoom(currentZoom()); });

  // ----- מתגי תצוגה -----
  function toggleChrome() {
    chromeOn = !chromeOn;
    try { localStorage.setItem("dov-sheet-chrome", chromeOn ? "1" : "0"); } catch (e) {}
    buildSheet(snapshot());
  }
  chromeBtn.addEventListener("click", toggleChrome);
  rowNumBtn.addEventListener("click", () => {
    const answer = prompt("רוחב עמודת מספרי השורות בפיקסלים (0 = מוסתרת, מומלץ 28-46):", rowHeaderW);
    if (answer === null) return;
    const w = parseInt(answer, 10);
    if (isNaN(w)) return;
    rowHeaderW = Math.max(0, Math.min(120, w));
    try { localStorage.setItem("dov-sheet-rowheaderw", String(rowHeaderW)); } catch (e) {}
    buildSheet(snapshot());
  });

  // ----- שם המסמך -----
  docNameInput.addEventListener("change", () => {
    const name = docNameInput.value.trim();
    if (name) {
      updateDoc(docId, { name: name });
    } else {
      docNameInput.value = getDoc(docId).name;
    }
    saveStatus.textContent = "נשמר ✓";
  });

  // ----- הסרגל התחתון (מוסתר כברירת מחדל) -----
  function setBarHidden(hidden) {
    document.body.classList.toggle("toolbar-hidden", hidden);
    try { localStorage.setItem("dov-sheet-bar", hidden ? "0" : "1"); } catch (e) {}
  }
  document.getElementById("hideBtn").addEventListener("click", () => setBarHidden(true));
  document.getElementById("showBtn").addEventListener("click", () => setBarHidden(false));
  let barShown = false;
  try { barShown = localStorage.getItem("dov-sheet-bar") === "1"; } catch (e) {}
  setBarHidden(!barShown);

  // ----- קישורי נושן -----
  document.getElementById("linksBtn").addEventListener("click", () => openLinksModal(docId));
  document.getElementById("copyUrlBtn").addEventListener("click", copyCurrentUrl);
  document.getElementById("undoBtn").addEventListener("click", doUndo);
  document.getElementById("redoBtn").addEventListener("click", doRedo);

  // ----- ייצוא CSV -----
  function sheetTo2D(sh) {
    if (sh.data && sh.data.length) {
      return sh.data.map((row) => (row || []).map((c) => {
        if (!c) return "";
        if (c.m !== undefined && c.m !== null) return String(c.m);
        if (c.v !== undefined && c.v !== null) return String(c.v);
        return "";
      }));
    }
    const out = [];
    (sh.celldata || []).forEach((item) => {
      const v = item.v || {};
      let text = "";
      if (v.m !== undefined && v.m !== null) text = String(v.m);
      else if (v.v !== undefined && v.v !== null) text = String(v.v);
      if (text === "") return;
      while (out.length <= item.r) out.push([]);
      out[item.r][item.c] = text;
    });
    return out;
  }
  document.getElementById("csvBtn").addEventListener("click", () => {
    const sheets = luckysheet.getAllSheets();
    let active = sheets.find((s) => s.status === 1) || sheets[0] || {};
    const grid = sheetTo2D(active);
    let maxRow = -1, maxCol = -1;
    grid.forEach((row, r) => {
      (row || []).forEach((text, c) => {
        if (text !== undefined && text !== "") {
          if (r > maxRow) maxRow = r;
          if (c > maxCol) maxCol = c;
        }
      });
    });
    const lines = [];
    for (let r = 0; r <= maxRow; r++) {
      const line = [];
      for (let c = 0; c <= maxCol; c++) {
        let text = (grid[r] && grid[r][c] !== undefined) ? String(grid[r][c]) : "";
        if (/[",\n]/.test(text)) text = '"' + text.replace(/"/g, '""') + '"';
        line.push(text);
      }
      lines.push(line.join(","));
    }
    const blob = new Blob(["\ufeff" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
    const safeName = (getDoc(docId).name || "sheet").replace(/[\\/:*?"<>|]/g, "-");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = safeName + ".csv";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ===== סנכרון ענן של הקובץ הנוכחי =====
  (function () {
    try {
      if (!window.dovCloud || !dovCloud.spaceId()) return;
      const stEl2 = document.getElementById("saveStatus");
      if (stEl2) dovCloud.bindStatus(stEl2);
      const cid = new URLSearchParams(location.search).get("id");
      if (!cid) return;
      const flag = "dov-cloud-reload-" + cid;
      dovCloud.pullDoc(cid).then(function (changed) {
        if (changed && !sessionStorage.getItem(flag)) {
          sessionStorage.setItem(flag, "1");
          location.reload();
        } else if (!changed) {
          sessionStorage.removeItem(flag);
        }
      });
    } catch (e) { console.error(e); }
  })();

</script>
