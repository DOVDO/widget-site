<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>גיליון</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/css/pluginsCss.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/plugins.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/css/luckysheet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/assets/iconfont/iconfont.css">
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/plugins/js/plugin.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luckysheet@2.1.13/dist/luckysheet.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body {
    height: 100%;
    overscroll-behavior: none; /* מונע זליגת גלילה לדף הנושן */
  }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #fff; color: #37352f;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* ריווח עליון קבוע — משאיר מקום לפופ-אפ הריחוף של נושן */
  .content { flex: 1; min-height: 0; padding: 30px 4px 2px; position: relative; }
  #sheetRoot { height: 100%; width: 100%; position: relative; }

  /* מצב נקי: מסתיר בכוח כל שארית של פסים תחתונים ומחווני זום */
  body:not(.chrome-on) .luckysheet-stat-area,
  body:not(.chrome-on) .luckysheet-sheet-area,
  body:not(.chrome-on) #luckysheet-bottom-controll-row,
  body:not(.chrome-on) .luckysheet-zoom-content,
  body:not(.chrome-on) #luckysheet-zoom-content,
  body:not(.chrome-on) .luckysheet-print-viewBtn { display: none !important; }

  .toolbar {
    display: flex; gap: 6px; align-items: center;
    flex-wrap: nowrap; overflow-x: auto; scrollbar-width: thin;
    margin: 6px 10px 10px; padding: 6px 10px;
    border: 1px solid #e9e9e7; border-radius: 10px; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .toolbar::-webkit-scrollbar { height: 4px; }
  .toolbar::-webkit-scrollbar-thumb { background: #d3d3d0; border-radius: 2px; }
  .toolbar a { text-decoration: none; font-size: 15px; flex-shrink: 0; }
  #docName {
    border: 1px solid transparent; border-radius: 6px; background: transparent;
    font-size: 13.5px; font-weight: 600; color: #37352f;
    padding: 3px 8px; min-width: 60px; max-width: 170px; flex: 1 1 60px;
    direction: rtl;
  }
  #docName:hover { border-color: #d3d3d0; }
  #docName:focus { outline: none; border-color: #2383e2; }
  .toolbar button {
    border: 1px solid #d3d3d0; background: #fff; color: #37352f;
    border-radius: 6px; padding: 4px 9px; font-size: 12.5px; cursor: pointer;
    flex-shrink: 0; white-space: nowrap; font-family: inherit;
  }
  .toolbar button:hover { background: #f1f1ef; }
  .toolbar button.on { background: #37352f; color: #fff; border-color: #37352f; }
  .zoomGroup { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  #zoomPct {
    width: 52px; text-align: center; border: 1px solid #d3d3d0; border-radius: 6px;
    padding: 3px 2px; font-size: 12.5px; direction: ltr;
  }
  #zoomPct:focus { outline: none; border-color: #2383e2; }
  #saveStatus { font-size: 11.5px; color: #9b9a97; flex-shrink: 0; white-space: nowrap; }

  body.toolbar-hidden .toolbar { display: none; }
  #showBtn {
    display: none; position: fixed; bottom: 10px; inset-inline-start: 10px;
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid #d3d3d0; background: #fff; cursor: pointer;
    font-size: 13px; opacity: .35; box-shadow: 0 2px 6px rgba(0,0,0,.1);
    align-items: center; justify-content: center; z-index: 100000;
  }
  #showBtn:hover { opacity: 1; }
  body.toolbar-hidden #showBtn { display: flex; }

  /* פריטי התפריט המורחב בקליק ימני */
  #dovExtraMenu { direction: rtl; text-align: right; border-top: 1px solid #e1e1e1; margin-top: 4px; padding-top: 4px; }
  #dovExtraMenu .dov-menuitem {
    padding: 6px 12px; cursor: pointer; font-size: 13px; color: #37352f; white-space: nowrap;
  }
  #dovExtraMenu .dov-menuitem:hover { background: #f1f1ef; }

  /* מודאלים קטנים */
  .dovOverlay {
    position: fixed; inset: 0; background: rgba(15,15,15,.45);
    display: flex; align-items: center; justify-content: center; z-index: 100001;
  }
  .dovBox {
    background: #fff; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,.25);
    width: min(330px, 92vw); max-height: 80vh; overflow-y: auto;
    padding: 12px 14px; direction: rtl;
  }
  .dovHead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: 700; font-size: 14px; }
  .dovClose { border: none; background: none; font-size: 15px; cursor: pointer; color: #9b9a97; }
  .dovClose:hover { color: #37352f; }
  .dovLabel { font-size: 12px; color: #787774; margin: 8px 0 4px; }
  .dovSwatches { display: flex; flex-wrap: wrap; gap: 5px; }
  .dovSwatch {
    width: 22px; height: 22px; border-radius: 4px; border: 1px solid #d3d3d0; cursor: pointer; padding: 0;
  }
  .dovSwatch:hover { transform: scale(1.15); }
  .dovBtnRow { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .dovBtnRow button, .dovListItem {
    border: 1px solid #d3d3d0; background: #fff; border-radius: 6px;
    padding: 4px 9px; font-size: 12.5px; cursor: pointer; font-family: inherit; color: #37352f;
  }
  .dovBtnRow button:hover, .dovListItem:hover { background: #f1f1ef; }
  .dovList { display: flex; flex-direction: column; gap: 5px; }
  .dovListItem { text-align: right; }
  .dovListItem.active { background: #37352f; color: #fff; border-color: #37352f; }
  .dovBox select { border: 1px solid #d3d3d0; border-radius: 6px; padding: 3px 6px; font-size: 12.5px; font-family: inherit; }
</style>
</head>
<body>

  <div class="content"><div id="sheetRoot"></div></div>

  <div class="toolbar">
    <a href="index.html" title="כל הקבצים">🏠</a>
    <input id="docName" title="שם הגיליון — לחץ כדי לערוך">
    <button id="chromeBtn" title="הצגת/הסתרת סרגל הכלים, שורת הנוסחאות והלשוניות">🎛️ תפריטים</button>
    <button id="rowNumBtn" title="קביעת רוחב עמודת מספרי השורות">🔢 שורות</button>
    <span class="zoomGroup">
      <button id="zoomOut" title="הקטנת תצוגה">➖</button>
      <input id="zoomPct" value="100" title="אחוז תצוגה — הקלד ערך חופשי (25 עד 400)">
      <button id="zoomIn" title="הגדלת תצוגה">➕</button>
    </span>
    <button id="linksBtn" title="היכן הגיליון משובץ בנושן">🔗</button>
    <button id="csvBtn" title="הורדה כ-CSV (נפתח באקסל)">⬇️ CSV</button>
    <span id="saveStatus">טוען...</span>
    <button id="hideBtn" title="הסתרת הסרגל">⌄</button>
  </div>
  <button id="showBtn" title="הצגת הסרגל">⌃</button>

<script src="storage.js"></script>
<script src="links-ui.js"></script>
<script>
  // תיקון קריטי: מניעת קפיצת דף הנושן המארח.
  (function () {
    const origFocus = HTMLElement.prototype.focus;
    HTMLElement.prototype.focus = function (opts) {
      return origFocus.call(this, Object.assign({ preventScroll: true }, opts || {}));
    };
    Element.prototype.scrollIntoView = function () {};
  })();

  const docNameInput = document.getElementById("docName");
  const saveStatus = document.getElementById("saveStatus");
  const sheetRoot = document.getElementById("sheetRoot");
  const chromeBtn = document.getElementById("chromeBtn");
  const rowNumBtn = document.getElementById("rowNumBtn");
  const zoomPct = document.getElementById("zoomPct");

  window.addEventListener("error", (e) => {
    if (saveStatus) saveStatus.textContent = "⚠️ שגיאה: " + e.message;
  });

  // ----- טעינת המסמך -----
  const params = new URLSearchParams(location.search);
  let docId = params.get("id");
  let doc = docId ? getDoc(docId) : null;
  if (!doc) {
    doc = createDoc("sheet", null);
    docId = doc.id;
    history.replaceState(null, "", "sheet.html?id=" + encodeURIComponent(docId));
  }
  docNameInput.value = doc.name;

  // ----- העדפות תצוגה -----
  let chromeOn = false;
  let rowHeaderW = 32;
  try {
    chromeOn = localStorage.getItem("dov-sheet-chrome") === "1";
    const w = parseInt(localStorage.getItem("dov-sheet-rowheaderw"), 10);
    if (!isNaN(w)) rowHeaderW = Math.max(0, Math.min(120, w));
  } catch (e) {}

  // ----- המרת נתונים מהמנוע הישן (x-spreadsheet) -----
  function convertOldData(old) {
    const sheets = [];
    old.forEach((os, i) => {
      const celldata = [];
      const rows = (os && os.rows) || {};
      Object.keys(rows).forEach((rk) => {
        if (rk === "len") return;
        const r = parseInt(rk, 10);
        if (isNaN(r)) return;
        const cells = (rows[rk] && rows[rk].cells) || {};
        Object.keys(cells).forEach((ck) => {
          const c = parseInt(ck, 10);
          if (isNaN(c)) return;
          const t = cells[ck].text;
          if (t !== undefined && t !== "") {
            celldata.push({ r: r, c: c, v: { v: t, m: String(t) } });
          }
        });
      });
      sheets.push({ name: (os && os.name) || ("Sheet" + (i + 1)), index: "s" + (i + 1), order: i, status: i === 0 ? 1 : 0, celldata: celldata });
    });
    return sheets.length ? sheets : null;
  }

  let initialSheets = null;
  if (doc.data && doc.data.engine === "luckysheet" && Array.isArray(doc.data.sheets) && doc.data.sheets.length) {
    initialSheets = doc.data.sheets;
  } else if (Array.isArray(doc.data)) {
    initialSheets = convertOldData(doc.data);
  }
  if (!initialSheets) {
    initialSheets = [{ name: "Sheet1", index: "s1", order: 0, status: 1, celldata: [] }];
  }

  // ----- שמירה -----
  let saveTimer = null;
  function snapshot() {
    const sheets = luckysheet.getAllSheets();
    sheets.forEach((s) => {
      try {
        if (s.data) {
          s.celldata = luckysheet.transToCellData(s.data);
          delete s.data;
        }
      } catch (e) {}
      delete s.load;
    });
    return sheets;
  }
  function scheduleSave() {
    saveStatus.textContent = "שומר...";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try {
        updateDoc(docId, { data: { engine: "luckysheet", sheets: snapshot() } });
        saveStatus.textContent = "נשמר ✓";
      } catch (e) {
        saveStatus.textContent = "⚠️ השמירה נכשלה";
      }
    }, 600);
  }

  // ----- מודאל כללי -----
  function dovModal(title, buildBody) {
    const ov = document.createElement("div");
    ov.className = "dovOverlay";
    const box = document.createElement("div");
    box.className = "dovBox";
    const head = document.createElement("div");
    head.className = "dovHead";
    const titleSpan = document.createElement("span");
    titleSpan.textContent = title;
    const x = document.createElement("button");
    x.className = "dovClose";
    x.textContent = "✕";
    head.appendChild(titleSpan);
    head.appendChild(x);
    box.appendChild(head);
    const body = document.createElement("div");
    box.appendChild(body);
    ov.appendChild(box);
    document.body.appendChild(ov);
    function close() { ov.remove(); }
    x.addEventListener("click", close);
    ov.addEventListener("click", (e) => { if (e.target === ov) close(); });
    buildBody(body, close);
  }

  // ----- עיצוב מהיר (על הטווח המסומן) -----
  const dovColors = ["#37352f", "#787774", "#e03e3e", "#d9730d", "#dfab01", "#0f7b6c", "#0b6e99", "#6940a5", "#ad1a72", "#ffffff", "#f1f1ef", "#fbe4e4", "#faebdd", "#fbf3db", "#ddedea", "#ddebf1", "#eae4f2", "#f4dfeb"];
  function setFmt(attr, value) {
    try { luckysheet.setRangeFormat(attr, value); scheduleSave(); } catch (e) { alert("לא הצלחתי להחיל — ודא שיש תאים מסומנים"); }
  }
  function openQuickFormat() {
    dovModal("🎨 עיצוב מהיר לתאים המסומנים", (body) => {
      function swatchRow(label, attr) {
        const lab = document.createElement("div");
        lab.className = "dovLabel";
        lab.textContent = label;
        body.appendChild(lab);
        const row = document.createElement("div");
        row.className = "dovSwatches";
        dovColors.forEach((c) => {
          const b = document.createElement("button");
          b.className = "dovSwatch";
          b.style.background = c;
          b.title = c;
          b.addEventListener("click", () => setFmt(attr, c));
          row.appendChild(b);
        });
        body.appendChild(row);
      }
      swatchRow("צבע רקע", "bg");
      swatchRow("צבע טקסט", "fc");

      const lab = document.createElement("div");
      lab.className = "dovLabel";
      lab.textContent = "סגנון טקסט";
      body.appendChild(lab);
      const row = document.createElement("div");
      row.className = "dovBtnRow";
      [
        ["𝐁 מודגש", () => setFmt("bl", 1)],
        ["ללא הדגשה", () => setFmt("bl", 0)],
        ["𝐼 נטוי", () => setFmt("it", 1)],
        ["ללא נטוי", () => setFmt("it", 0)],
        ["קו תחתון", () => setFmt("un", 1)],
        ["קו חוצה", () => setFmt("cl", 1)],
        ["ניקוי סגנון", () => { setFmt("bl", 0); setFmt("it", 0); setFmt("un", 0); setFmt("cl", 0); }],
      ].forEach(([t, fn]) => {
        const b = document.createElement("button");
        b.textContent = t;
        b.addEventListener("click", fn);
        row.appendChild(b);
      });
      body.appendChild(row);

      const lab2 = document.createElement("div");
      lab2.className = "dovLabel";
      lab2.textContent = "גודל גופן";
      body.appendChild(lab2);
      const sel = document.createElement("select");
      [9, 10, 11, 12, 14, 16, 18, 20, 24, 28].forEach((n) => {
        const o = document.createElement("option");
        o.value = n;
        o.textContent = n;
        if (n === 11) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener("change", () => setFmt("fs", parseInt(sel.value, 10)));
      body.appendChild(sel);

      const tip = document.createElement("div");
      tip.className = "dovLabel";
      tip.textContent = "החלון נשאר פתוח — אפשר להחיל כמה עיצובים ברצף.";
      body.appendChild(tip);
    });
  }

  // ----- מעבר בין גיליונות -----
  function openSheetsModal() {
    dovModal("📑 גיליונות", (body, close) => {
      const list = document.createElement("div");
      list.className = "dovList";
      let sheets = [];
      try { sheets = luckysheet.getAllSheets(); } catch (e) {}
      sheets.sort((a, b) => (a.order || 0) - (b.order || 0)).forEach((s) => {
        const b = document.createElement("button");
        b.className = "dovListItem" + (s.status === 1 ? " active" : "");
        b.textContent = "📄 " + s.name;
        b.addEventListener("click", () => {
          try { luckysheet.setSheetActive(s.order); } catch (e) {}
          close();
        });
        list.appendChild(b);
      });
      const add = document.createElement("button");
      add.className = "dovListItem";
      add.textContent = "➕ גיליון חדש";
      add.addEventListener("click", () => {
        try { luckysheet.setSheetAdd(); scheduleSave(); } catch (e) {}
        close();
      });
      list.appendChild(add);
      body.appendChild(list);
    });
  }

  // ----- הזרקת פריטים לתפריט הקליק הימני של הגיליון -----
  function injectExtraMenu() {
    const menu = document.getElementById("luckysheet-rightclick-menu");
    if (!menu || document.getElementById("dovExtraMenu")) return;
    const wrap = document.createElement("div");
    wrap.id = "dovExtraMenu";
    const items = [
      ["🎨 עיצוב מהיר (צבעים, הדגשה, גודל)", openQuickFormat],
      ["🔍 זום...", () => {
        const answer = prompt("אחוז תצוגה (25-400):", zoomPct.value);
        if (answer === null) return;
        const v = parseInt(answer, 10);
        if (!isNaN(v)) applyZoom(v / 100);
      }],
      ["📑 גיליונות (מעבר והוספה)", openSheetsModal],
      ["🎛️ הצג/הסתר תפריטים מלאים", toggleChrome],
      ["👁️ הצג/הסתר את סרגל הווידג'ט", () => {
        setBarHidden(!document.body.classList.contains("toolbar-hidden"));
      }],
      ["🔗 קישורי נושן", () => openLinksModal(docId)],
      ["⬇️ הורדת CSV", () => document.getElementById("csvBtn").click()],
    ];
    items.forEach(([label, fn]) => {
      const it = document.createElement("div");
      it.className = "dov-menuitem";
      it.textContent = label;
      it.addEventListener("mousedown", (e) => { e.stopPropagation(); });
      it.addEventListener("click", (e) => {
        e.stopPropagation();
        menu.style.display = "none";
        fn();
      });
      wrap.appendChild(it);
    });
    menu.appendChild(wrap);
  }

  // ----- בניית הגיליון -----
  let booted = false;
  function buildSheet(sheets) {
    document.body.classList.toggle("chrome-on", chromeOn);
    if (booted) { try { luckysheet.destroy(); } catch (e) {} }
    sheetRoot.innerHTML = "";
    luckysheet.create({
      container: "sheetRoot",
      lang: "en",
      data: sheets,
      showinfobar: false,
      showtoolbar: chromeOn,
      showsheetbar: chromeOn,
      showstatisticBar: chromeOn,
      sheetFormulaBar: chromeOn,
      enableAddRow: false,
      enableAddBackTop: false,
      rowHeaderWidth: rowHeaderW,
      columnHeaderHeight: 20,
      row: 100,
      column: 26,
      devicePixelRatio: window.devicePixelRatio || 1,
      hook: {
        updated: function () { scheduleSave(); },
        workbookCreateAfter: function () {
          saveStatus.textContent = "מוכן";
          const z = (sheets[0] && sheets[0].zoomRatio) || 1;
          zoomPct.value = Math.round(z * 100);
          setTimeout(injectExtraMenu, 300);
        },
      },
    });
    booted = true;
    chromeBtn.classList.toggle("on", chromeOn);
  }

  buildSheet(initialSheets);
  // רשת ביטחון להזרקת התפריט גם אם ה-hook לא רץ
  setTimeout(injectExtraMenu, 2000);
  setTimeout(injectExtraMenu, 5000);

  // ----- בליעת גלילה: שלא תזלוג לדף הנושן -----
  sheetRoot.addEventListener("wheel", (e) => { e.preventDefault(); }, { passive: false });

  // ----- זום -----
  function applyZoom(z) {
    z = Math.max(0.25, Math.min(4, z));
    try { luckysheet.setSheetZoom(z); } catch (e) {}
    zoomPct.value = Math.round(z * 100);
    scheduleSave();
  }
  function currentZoom() {
    const v = parseInt(zoomPct.value, 10);
    return isNaN(v) ? 1 : v / 100;
  }
  document.getElementById("zoomIn").addEventListener("click", () => applyZoom(currentZoom() + 0.25));
  document.getElementById("zoomOut").addEventListener("click", () => applyZoom(currentZoom() - 0.25));
  zoomPct.addEventListener("change", () => applyZoom(currentZoom()));
  zoomPct.addEventListener("keydown", (e) => { if (e.key === "Enter") applyZoom(currentZoom()); });

  // ----- מתגי תצוגה -----
  function toggleChrome() {
    chromeOn = !chromeOn;
    try { localStorage.setItem("dov-sheet-chrome", chromeOn ? "1" : "0"); } catch (e) {}
    buildSheet(snapshot());
  }
  chromeBtn.addEventListener("click", toggleChrome);
  rowNumBtn.addEventListener("click", () => {
    const answer = prompt("רוחב עמודת מספרי השורות בפיקסלים (0 = מוסתרת, מומלץ 28-46):", rowHeaderW);
    if (answer === null) return;
    const w = parseInt(answer, 10);
    if (isNaN(w)) return;
    rowHeaderW = Math.max(0, Math.min(120, w));
    try { localStorage.setItem("dov-sheet-rowheaderw", String(rowHeaderW)); } catch (e) {}
    buildSheet(snapshot());
  });

  // ----- שם המסמך -----
  docNameInput.addEventListener("change", () => {
    const name = docNameInput.value.trim();
    if (name) {
      updateDoc(docId, { name: name });
    } else {
      docNameInput.value = getDoc(docId).name;
    }
    saveStatus.textContent = "נשמר ✓";
  });

  // ----- הסרגל התחתון (מוסתר כברירת מחדל) -----
  function setBarHidden(hidden) {
    document.body.classList.toggle("toolbar-hidden", hidden);
    try { localStorage.setItem("dov-sheet-bar", hidden ? "0" : "1"); } catch (e) {}
  }
  document.getElementById("hideBtn").addEventListener("click", () => setBarHidden(true));
  document.getElementById("showBtn").addEventListener("click", () => setBarHidden(false));
  let barShown = false;
  try { barShown = localStorage.getItem("dov-sheet-bar") === "1"; } catch (e) {}
  setBarHidden(!barShown);

  // ----- קישורי נושן -----
  document.getElementById("linksBtn").addEventListener("click", () => openLinksModal(docId));

  // ----- ייצוא CSV -----
  function sheetTo2D(sh) {
    if (sh.data && sh.data.length) {
      return sh.data.map((row) => (row || []).map((c) => {
        if (!c) return "";
        if (c.m !== undefined && c.m !== null) return String(c.m);
        if (c.v !== undefined && c.v !== null) return String(c.v);
        return "";
      }));
    }
    const out = [];
    (sh.celldata || []).forEach((item) => {
      const v = item.v || {};
      let text = "";
      if (v.m !== undefined && v.m !== null) text = String(v.m);
      else if (v.v !== undefined && v.v !== null) text = String(v.v);
      if (text === "") return;
      while (out.length <= item.r) out.push([]);
      out[item.r][item.c] = text;
    });
    return out;
  }
  document.getElementById("csvBtn").addEventListener("click", () => {
    const sheets = luckysheet.getAllSheets();
    let active = sheets.find((s) => s.status === 1) || sheets[0] || {};
    const grid = sheetTo2D(active);
    let maxRow = -1, maxCol = -1;
    grid.forEach((row, r) => {
      (row || []).forEach((text, c) => {
        if (text !== undefined && text !== "") {
          if (r > maxRow) maxRow = r;
          if (c > maxCol) maxCol = c;
        }
      });
    });
    const lines = [];
    for (let r = 0; r <= maxRow; r++) {
      const line = [];
      for (let c = 0; c <= maxCol; c++) {
        let text = (grid[r] && grid[r][c] !== undefined) ? String(grid[r][c]) : "";
        if (/[",\n]/.test(text)) text = '"' + text.replace(/"/g, '""') + '"';
        line.push(text);
      }
      lines.push(line.join(","));
    }
    const blob = new Blob(["\ufeff" + lines.join("\n")], { type: "text/csv;charset=utf-8" });
    const safeName = (getDoc(docId).name || "sheet").replace(/[\\/:*?"<>|]/g, "-");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = safeName + ".csv";
    a.click();
    URL.revokeObjectURL(a.href);
  });
</script>
</body>
</html>
