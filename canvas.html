<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>קנבס אינסופי</title>
<style>
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; font-family: "Segoe UI", "Heebo", Arial, sans-serif; background: #fff; color: #37352f; overflow: hidden; overscroll-behavior: none; }

  /* ===== סרגל עליון (מתחיל מתחת לאזור הריחוף של נושן) ===== */
  #bar { display: flex; align-items: center; gap: 6px; padding: 46px 10px 6px 10px; border-bottom: 1px solid #f1f1ef; overflow-x: auto; overflow-y: hidden; flex: none; scrollbar-width: thin; }
  #bar button { border: 1px solid #d3d1cb; background: #fff; border-radius: 5px; cursor: pointer; padding: 4px 9px; font-size: 13px; font-family: inherit; white-space: nowrap; flex: none; }
  #bar button:hover { background: #f1f1ef; }
  #docName { border: 1px solid transparent; border-radius: 5px; padding: 4px 6px; font-size: 13.5px; font-weight: 600; font-family: inherit; width: 150px; flex: none; background: transparent; }
  #docName:hover, #docName:focus { border-color: #d3d1cb; background: #fff; outline: none; }
  #saveStatus { font-size: 11.5px; color: #787774; white-space: nowrap; flex: none; margin-inline-start: auto; padding-inline-start: 8px; }

  /* ===== הקנבס עצמו ===== */
  #spacer { display: none; height: 42px; flex: none; }
  body.noChrome #spacer { display: block; }
  body.noChrome #bar { display: none; }
  #canvasRoot { flex: 1; min-height: 0; position: relative; margin-right: 46px; touch-action: none; }
  #bgLines { display: none; position: fixed; inset: 0 46px 0 0; z-index: 2; pointer-events: none; background: repeating-linear-gradient(to bottom, transparent 0, transparent 27px, rgba(55,53,47,.08) 27px, rgba(55,53,47,.08) 28px); }
  #canvasRoot > div { width: 100%; height: 100%; }
  #saveStatus { display: none; }

  /* ===== העמודה הימנית: שליטה בסרגלים + נורית סנכרון ===== */
  #dovRail { position: fixed; top: 50%; right: 6px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; z-index: 8500; max-height: calc(100vh - 12px); overflow-y: auto; overflow-x: hidden; scrollbar-width: none; padding: 2px; }
  #dovRail::-webkit-scrollbar { display: none; }
  #dovRail button { flex-shrink: 0; }
  #dovRail button { width: 34px; height: 34px; border: 1px solid #d3d1cb; background: #fff; border-radius: 8px; cursor: pointer; font-size: 15px; padding: 0; box-shadow: 0 1px 4px rgba(0,0,0,.14); }
  #dovRail button:hover { background: #f1f1ef; }
  #dovRail button.on { border-color: #0b6e99; background: #e7f3f8; }
  #dovDot { width: 12px; height: 12px; border-radius: 50%; margin: 4px auto 0; background: #9b9a97; box-shadow: 0 0 0 2px #fff, 0 0 0 3px #d3d1cb; cursor: pointer; }

  /* ===== שכבת הנעצים — צילום אזור מדויק ===== */
  #pinLayer { display: none; position: fixed; inset: 0 46px 0 0; z-index: 9000; cursor: crosshair; background: rgba(11,110,153,.05); }
  .dovPinMark { position: absolute; transform: translate(-50%, -100%); font-size: 22px; pointer-events: none; }
  #pinHint { position: absolute; top: 8px; right: 8px; background: #0b6e99; color: #fff; border-radius: 6px; padding: 4px 10px; font-size: 12.5px; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  #pinRect { position: absolute; pointer-events: none; border: 2px dashed #0b6e99; background: rgba(11,110,153,.06); box-shadow: 0 0 0 100000px rgba(15,15,15,.28); }
  .pinHandle { position: absolute; pointer-events: auto; touch-action: none; width: 14px; height: 14px; background: #fff; border: 2px solid #0b6e99; border-radius: 50%; }
  .pinHandle.nw { top: -9px; left: -9px; cursor: nwse-resize; }
  .pinHandle.ne { top: -9px; right: -9px; cursor: nesw-resize; }
  .pinHandle.sw { bottom: -9px; left: -9px; cursor: nesw-resize; }
  .pinHandle.se { bottom: -9px; right: -9px; cursor: nwse-resize; }
  #pinBar { position: absolute; pointer-events: auto; display: flex; gap: 6px; align-items: center; background: #fff; border: 1px solid #d3d1cb; border-radius: 8px; padding: 4px 8px; box-shadow: 0 2px 10px rgba(0,0,0,.18); font-size: 13px; white-space: nowrap; }
  #pinBar button { border: 1px solid #d3d1cb; background: #fff; border-radius: 6px; cursor: pointer; padding: 3px 10px; font-size: 13px; }
  #pinBar button.primary { background: #0b6e99; color: #fff; border-color: #0b6e99; }
  #pinBar label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .pinMove { position: absolute; pointer-events: auto; touch-action: none; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: #fff; border: 2px solid #0b6e99; border-radius: 50%; cursor: move; font-size: 16px; color: #0b6e99; box-shadow: 0 2px 8px rgba(0,0,0,.25); user-select: none; }
  .dovListItem { display: block; width: 100%; text-align: right; border: 1px solid #e3e2de; background: #fff; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 13px; }
  .dovListItem:hover { background: #f1f1ef; }

  /* ===== פאנל עיצוב מהיר ===== */
  #stylePanel { display: none; position: fixed; top: 50%; right: 50px; transform: translateY(-50%); z-index: 9100; background: #fff; border: 1px solid #d3d1cb; border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.22); padding: 10px; width: 218px; max-height: calc(100vh - 20px); overflow-y: auto; direction: rtl; font-size: 12.5px; }
  #stylePanel h4 { margin: 8px 0 4px; font-size: 12px; color: #787774; font-weight: 600; }
  #stylePanel h4:first-child { margin-top: 0; }
  .spRow { display: flex; flex-wrap: wrap; gap: 4px; }
  .spRow button { border: 1px solid #d3d1cb; background: #fff; border-radius: 6px; cursor: pointer; padding: 4px 8px; font-size: 12.5px; min-width: 30px; }
  .spRow button:hover { background: #f1f1ef; }
  .spSwatch { width: 24px; height: 24px; min-width: 24px !important; padding: 0 !important; border-radius: 6px; }

  /* ===== שגיאות ===== */
  #errBanner { display: none; position: fixed; top: 46px; inset-inline: 8px; z-index: 99999; background: #fbe4e4; color: #e03e3e; border: 1px solid #e03e3e; border-radius: 6px; padding: 8px 12px; font-size: 12.5px; white-space: pre-wrap; }

  /* ===== חלוניות (מודאלים) ===== */
  .dovOverlay { position: fixed; inset: 0; background: rgba(15,15,15,.45); z-index: 99000; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .dovBox { background: #fff; border-radius: 10px; box-shadow: 0 10px 36px rgba(0,0,0,.25); padding: 16px; width: 100%; max-width: 420px; max-height: 82vh; overflow: auto; direction: rtl; }
  .dovBox h3 { margin: 0 0 12px; font-size: 15px; }
  .dovBox .rowLine { display: flex; align-items: center; gap: 6px; padding: 6px 4px; border-bottom: 1px solid #f1f1ef; font-size: 13px; }
  .dovBox .rowLine .grow { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dovBox button { border: 1px solid #d3d1cb; background: #fff; border-radius: 5px; cursor: pointer; padding: 4px 9px; font-size: 12.5px; font-family: inherit; }
  .dovBox button:hover { background: #f1f1ef; }
  .dovBox button.primary { background: #0b6e99; border-color: #0b6e99; color: #fff; }
  .dovBox button.danger { color: #e03e3e; border-color: #e03e3e; }
  .dovBox input[type=text] { border: 1px solid #d3d1cb; border-radius: 5px; padding: 5px 8px; font-size: 13px; font-family: inherit; flex: 1; min-width: 0; }
  .dovBox img { max-width: 100%; border: 1px solid #e3e2de; border-radius: 6px; }
  .dovBox .btnRow { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .dovBox .hint { font-size: 11.5px; color: #787774; margin-top: 8px; }

  /* ===== מצב לייב — נורית בסרגל ===== */
  #railLive.on { border-color: #e03e3e !important; background: #fdecec !important; animation: dovLivePulse 1.6s infinite; }
  @keyframes dovLivePulse { 0%, 100% { box-shadow: 0 1px 4px rgba(0,0,0,.14); } 50% { box-shadow: 0 0 0 3px rgba(224,62,62,.35); } }

  /* ===== פלטת ציור (נוחה למגע) ===== */
  #drawPalette { display: none; position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 9300; gap: 5px; align-items: center; background: #fff; border: 1px solid #d3d1cb; border-radius: 16px; box-shadow: 0 6px 24px rgba(0,0,0,.24); padding: 7px 10px; direction: rtl; max-width: calc(100vw - 70px); overflow-x: auto; flex-wrap: nowrap; scrollbar-width: thin; }
  #drawPalette button { border: 1px solid #d3d1cb; background: #fff; border-radius: 10px; cursor: pointer; padding: 0; flex: none; }
  #drawPalette button:hover { background: #f1f1ef; }
  #drawPalette .dpTool { width: 44px; height: 44px; font-size: 20px; }
  #drawPalette .dpTool.act { border-color: #0b6e99; background: #e7f3f8; }
  #drawPalette .dpBtn { width: 40px; height: 44px; font-size: 17px; }
  #drawPalette .dpSize { min-width: 26px; text-align: center; font-size: 15px; font-weight: 700; color: #37352f; }
  #drawPalette .dpSw { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px #d3d1cb; }
  #drawPalette .dpSw.act { box-shadow: 0 0 0 2px #fff, 0 0 0 4px #0b6e99; }
  #drawPalette .dpColor { width: 36px; height: 36px; border: 1px solid #d3d1cb; border-radius: 8px; background: #fff; cursor: pointer; padding: 2px; flex: none; }
  #drawPalette .dpSep { width: 1px; height: 30px; background: #e3e2de; flex: none; margin: 0 2px; }

  #toast { position: fixed; bottom: 16px; inset-inline-end: 16px; background: #37352f; color: #fff; border-radius: 6px; padding: 8px 14px; font-size: 13px; z-index: 99999; display: none; }
</style>
</head>
<body>

<div id="bar">
  <button id="homeBtn" title="חזרה לסייר הקבצים">🏠</button>
  <input id="docName" title="שם הקובץ">
  <button id="noteBtn" title="הוספת פתק צהוב למרכז המסך">📌 פתק</button>
  <button id="viewsBtn" title="מיקומים שמורים בקנבס">📍 מיקומים</button>
  <button id="exportBtn" title="ייצוא והדפסה של המסומן או של הכל">🖨️ ייצוא</button>
  <button id="copyUrlBtn" title="העתקת קישור הקובץ (להטמעה בנושן)">📋 קישור</button>
  <button id="linksBtn" title="היכן הקובץ משובץ בנ��שן">🔗</button>
  <button id="hideBtn" title="הסתרת הסרגל — מסך נקי">👁️ הסתר</button>
  <span id="saveStatus">טוען…</span>
</div>
<div id="spacer"></div>
<div id="canvasRoot"></div>
<div id="bgLines"></div>
<div id="dovRail">
  <button id="railBar" title="סרגל הקובץ — פתק, מיקומים, ייצוא, קישור">🗂️</button>
  <button id="railTools" title="סרגל כלים — צורות, טקסט, תמונה">🧰</button>
  <button id="railBottom" title="סרגל תחתון — צבעים, ביטול וחזרה, תפריט">🎛️</button>
  <button id="railBg" title="רקע: רשת / שורות / ריק">🔲</button>
  <button id="railPins" title="צילום אזור בין 2 נעצים">📌</button>
  <button id="railSync" title="רענון וסנכרון מהענן">🔄</button>
  <button id="railList" title="כל האובייקטים בקנבס — קפיצה מהירה">🧭</button>
  <button id="railStyle" title="עיצוב האובייקט המסומן — צבעים, קו, מילוי ועוד">🎨</button>
  <button id="railEmbed" title="הטמעת מסמך / גיליון / קנבס בתוך הקנבס — או יצירת חדש">➕</button>
  <button id="railFocus" title="מצב מיקוד על הטמעה — נעילה, זום קירוב, זום מקסימלי">🎯</button>
  <button id="railDraw" title="מצב ציור — עט, מרקר, מחק, צבעים, גודל">✏️</button>
  <button id="railLive" title="מצב לייב — סנכרון מיידי בין המחשב לפלאפון">🔴</button>
  <div id="dovDot" title="מצב סנכרון"></div>
</div>
<div id="pinLayer"></div>
<div id="errBanner"></div>
<div id="toast"></div>

<script src="storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="cloud.js"></script>
<script src="links-ui.js"></script>

<!-- ===== Excalidraw: React + הספרייה עצמה, עם גיבוי משני CDN ===== -->
<script>window.EXCALIDRAW_ASSET_PATH = "https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/";</script>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script>if (!window.React) document.write('<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"><\/script>');</script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script>if (!window.ReactDOM) document.write('<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"><\/script>');</script>
<script src="https://unpkg.com/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>
<script>if (!window.ExcalidrawLib) { window.EXCALIDRAW_ASSET_PATH = "https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.17.6/dist/"; document.write('<script src="https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"><\/script>'); }</script>

<script>
  // ===== דיווח שגיאות גלוי (כמו בשאר הדפים) =====
  function dovErr(msg) {
    var el = document.getElementById("errBanner");
    el.textContent = "⚠️ שגיאה: " + msg;
    el.style.display = "block";
    setTimeout(function () { el.style.display = "none"; }, 12000);
  }
  window.addEventListener("error", function (e) {
    var m = (e && e.message) || "";
    if (!m || m.toLowerCase().indexOf("script error") >= 0) return;
    dovErr(m);
  });

  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(toast._tm);
    toast._tm = setTimeout(function () { t.style.display = "none"; }, 2500);
  }

  // ===== טעינת הקובץ מהאחסון =====
  var qsParams = new URLSearchParams(location.search);
  // אם הקישור כולל מזהה מרחב (space) — מתחברים אליו אוטומטית גם אם האחסון המקומי נוקה
  try {
    var spParam = qsParams.get("space");
    if (spParam && window.dovCloud && !dovCloud.spaceId()) dovCloud.setSpaceId(spParam);
  } catch (e) {}
  var docId = qsParams.get("id");
  var docRec = docId ? getDoc(docId) : null;
  if (!docRec && docId && window.dovCloud && dovCloud.spaceId()) {
    // הקובץ לא נמצא מקומית (הדפדפן ניקה את האחסון?) — לא יוצרים קובץ חדש וריק!
    // שלד עם אותו מזהה ו-updated ריק — המשיכה מהענן (שרצה מיד) תמיד תנצח ותחזיר את התוכן
    docRec = { id: docId, type: "canvas", name: defaultName(), content: "", data: null, folderId: null, links: [], created: nowIso(), updated: "" };
    window.dovStore.putDoc(docRec);
  }
  if (!docRec) {
    docRec = createDoc("canvas", null);
    docId = docRec.id;
    history.replaceState(null, "", location.pathname + "?id=" + encodeURIComponent(docId));
  }

  var saved = {};
  try { saved = JSON.parse(docRec.content || "{}") || {}; } catch (e) { saved = {}; }
  var dovViews = Array.isArray(saved.views) ? saved.views : [];

  var initAS = saved.appState || {};
  delete initAS.collaborators; // אחרי JSON זה כבר לא Map — חייבים להסיר כדי לא להקריס

  // ===== שמירה אוטומטית =====
  var api = null;
  var saveTimer = null;
  var statusEl = document.getElementById("saveStatus");

  function snapshotCanvas() {
    var as = api.getAppState();
    return {
      engine: "excalidraw",
      elements: api.getSceneElements(),
      appState: {
        viewBackgroundColor: as.viewBackgroundColor,
        scrollX: as.scrollX,
        scrollY: as.scrollY,
        zoom: { value: (as.zoom && as.zoom.value) || 1 }
      },
      files: api.getFiles(),
      views: dovViews
    };
  }

  // חתימת תוכן: שומרים ומסנכרנים רק כשהתוכן האמיתי השתנה
  // (onChange של Excalidraw נורה גם על סימון, גלילה ותזוזת עכבר — בלי שינוי אמיתי)
  var lastSig = null;
  function contentSig(snap) {
    return JSON.stringify(snap.elements) + "|" + Object.keys(snap.files || {}).length + "|" + JSON.stringify(snap.views);
  }

  function doSave() {
    if (!api) return;
    try {
      var snap = snapshotCanvas();
      var sig = contentSig(snap);
      if (sig === lastSig) return; // אין שינוי אמיתי — לא שומרים ולא ��סנכרנים
      lastSig = sig;
      var s = JSON.stringify(snap);
      updateDoc(docId, { content: s });
      if (s.length > 850000) {
        statusEl.textContent = "⚠️ הקובץ גדול — תמונות כבדות עלולות לא להסתנכרן לענן (מגבלת 1MB)";
        statusEl.style.color = "#d9730d";
      } else if (!window.dovCloud || !dovCloud.spaceId()) {
        statusEl.textContent = "נשמר מקומית ✓";
        statusEl.style.color = "#787774";
      }
    } catch (e) { dovErr("שמירה נכשלה: " + e.message); }
  }

  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(doSave, 800);
  }

  // ===== בניית הקנבס =====
  function buildCanvas() {
    if (!window.React || !window.ReactDOM || !window.ExcalidrawLib) {
      dovErr("ספריית הקנבס לא נטענה — בדוק חי��ור לאינטרנט ורענן את ה��ף");
      statusEl.textContent = "⚠️ הקנבס לא נטען";
      return;
    }
    var props = {
      excalidrawAPI: function (a) {
        api = a;
        // קובעים חתימת בסיס מיד אחרי הטעינה — כך פתיחת הדף לבדה לא מפעילה סנכרון
        setTimeout(function () { try { lastSig = contentSig(snapshotCanvas()); } catch (e) {} }, 300);
        // מחילים את הרקע רק אחרי שהקנבס סיים להיטען — קריאה מוקדמת מדי נדרסת על ידי המצב ההתחלתי
        setTimeout(applyBg, 400);
        setTimeout(applyBg, 1500);
      },
      initialData: {
        elements: saved.elements || [],
        appState: initAS,
        files: saved.files || {},
        scrollToContent: !(initAS && typeof initAS.scrollX === "number")
      },
      langCode: "he-IL",
      validateEmbeddable: true,
      renderEmbeddable: dovRenderEmbeddable,
      onChange: function () { if (applyingRemote) return; lastLocalEditAt = Date.now(); scheduleSave(); },
      UIOptions: { canvasActions: { loadScene: false } }
    };
    var App = function () {
      return React.createElement("div", { style: { width: "100%", height: "100%" } },
        React.createElement(ExcalidrawLib.Excalidraw, props));
    };
    try {
      ReactDOM.createRoot(document.getElementById("canvasRoot")).render(React.createElement(App));
      statusEl.textContent = "מוכן ✓";
    } catch (e) { dovErr("בניית הקנבס נכשלה: " + e.message); }
  }

  // ===== שם הקובץ =====
  var nameInput = document.getElementById("docName");
  nameInput.value = docRec.name || "";
  nameInput.addEventListener("change", function () {
    var v = nameInput.value.trim();
    if (v) { updateDoc(docId, { name: v }); toast("השם עודכן ✓"); }
  });

  // ===== חלונית כללית =====
  function dovModal(titleText, buildFn) {
    var ov = document.createElement("div");
    ov.className = "dovOverlay";
    var box = document.createElement("div");
    box.className = "dovBox";
    var h = document.createElement("h3");
    h.textContent = titleText;
    box.appendChild(h);
    ov.appendChild(box);
    function close() { if (ov.parentNode) ov.parentNode.removeChild(ov); }
    ov.addEventListener("click", function (e) { if (e.target === ov) close(); });
    buildFn(box, close);
    document.body.appendChild(ov);
    return close;
  }

      var as0 = api.getAppState();
      var here = { scrollX: as0.scrollX, scrollY: as0.scrollY, zoom: as0.zoom };
      if (navBack) {
        var back = document.createElement("button");
        back.className = "dovListItem";
        back.style.borderColor = "#0b6e99";
        back.textContent = "↩ חזרה למיקום שלפני הקפיצה האחרונה";
        back.addEventListener("click", function () {
          var b = navBack; navBack = null;
          try { api.updateScene({ appState: { scrollX: b.scrollX, scrollY: b.scrollY, zoom: b.zoom } }); } catch (e) {}
          close();
        });
        box.appendChild(back);
      }
      var list = document.createElement("div");
      list.style.cssText = "max-height:48vh;overflow:auto;display:flex;flex-direction:column;gap:4px;margin-top:6px;";
      if (!els.length) {
        var empty = document.createElement("div");
        empty.className = "hint";
        empty.textContent = "הקנבס ריק — אין עדיין אובייקטים";
        list.appendChild(empty);
      }
      els.forEach(function (el) {
        var label = navTypeNames[el.type] || ("• " + el.type);
        if (el.type === "text" && el.text) {
          var t = el.text.replace(/\s+/g, " ").trim();
          label = "🅰 " + (t.length > 38 ? t.slice(0, 38) + "…" : (t || "טקסט ריק"));
        }
        if (el.type === "embeddable" && el.link) { var pe2 = parseEmbed(el.link); label = widgetIcon(pe2.type) + " " + pe2.name; }
        var b = document.createElement("button");
        b.className = "dovListItem";
        b.textContent = label;
        b.addEventListener("click", function () {
          navBack = here;
          try { api.scrollToContent([el], { fitToContent: true, animate: true }); }
          catch (e) { try { api.scrollToContent([el]); } catch (e2) {} }
          close();
          toast("קפצתי לאובייקט — 🧭 ↩ יחזיר אותך למיקום הקודם");
        });
        list.appendChild(b);
      });
      box.appendChild(list);
    });
  });

  // ===== פאנל עיצוב מהיר: כל הגדרות האובייקט ישירות מהסרגל =====
  var stylePanel = document.createElement("div");
  stylePanel.id = "stylePanel";
  document.body.appendChild(stylePanel);
  var spColors = ["#1e1e1e", "#e03e3e", "#2f9e44", "#1971c2", "#f08c00", "#6940a5", "#ad1a72", "#ffffff"];
  var spBgs = ["transparent", "#ffc9c9", "#b2f2bb", "#a5d8ff", "#ffec99", "#eae4f2", "#f1f1ef"];
  function spSelected() {
    var ids = api.getAppState().selectedElementIds || {};
    return api.getSceneElements().filter(function (el) { return ids[el.id]; });
  }
  function spApply(props, textOnly) {
    if (!api) return;
    var ids = api.getAppState().selectedElementIds || {};
    var any = false;
    var els = api.getSceneElements().map(function (el) {
      if (!ids[el.id]) return el;
      if (textOnly && el.type !== "text") return el;
      any = true;
      var n = {};
      for (var k in el) n[k] = el[k];
      for (var p in props) n[p] = props[p];
      return n;
    });
    if (!any) { toast("סמן קודם אובייקט בקנבס — ואז בחר עיצוב"); return; }
    api.updateScene({ elements: els });
    scheduleSave();
  }
  function spSection(title) {
    var h = document.createElement("h4");
    h.textContent = title;
    stylePanel.appendChild(h);
    var r = document.createElement("div");
    r.className = "spRow";
    stylePanel.appendChild(r);
    return r;
  }
  function spBtn(row, label, fn) {
    var b = document.createElement("button");
    b.textContent = label;
    b.addEventListener("click", fn);
    row.appendChild(b);
    return b;
  }
  function spSwatch(row, color, fn) {
    var b = document.createElement("button");
    b.className = "spSwatch";
    b.style.background = color === "transparent" ? "repeating-conic-gradient(#ddd 0% 25%, #fff 0% 50%) 0 0 / 10px 10px" : color;
    b.title = color === "transparent" ? "שקוף" : color;
    b.addEventListener("click", fn);
    row.appendChild(b);
  }
  (function buildStylePanel() {
    var r1 = spSection("צבע קו");
    spColors.forEach(function (c) { spSwatch(r1, c, function () { spApply({ strokeColor: c }); }); });
    var ci = document.createElement("input");
    ci.type = "color";
    ci.title = "צבע מותאם אישית";
    ci.style.cssText = "width:30px;height:26px;border:1px solid #d3d1cb;border-radius:6px;padding:0;background:#fff;cursor:pointer;";
    ci.addEventListener("change", function () { spApply({ strokeColor: ci.value }); });
    r1.appendChild(ci);
    var r2 = spSection("צבע רקע / מילוי");
    spBgs.forEach(function (c) { spSwatch(r2, c, function () { spApply({ backgroundColor: c }); }); });
    var bi = document.createElement("input");
    bi.type = "color";
    bi.title = "רקע מותאם אישית";
    bi.style.cssText = ci.style.cssText;
    bi.addEventListener("change", function () { spApply({ backgroundColor: bi.value }); });
    r2.appendChild(bi);
    var r3 = spSection("סגנון מילוי");
    spBtn(r3, "▤ קווים", function () { spApply({ fillStyle: "hachure" }); });
    spBtn(r3, "▦ שתי וערב", function () { spApply({ fillStyle: "cross-hatch" }); });
    spBtn(r3, "■ מלא", function () { spApply({ fillStyle: "solid" }); });
    var r4 = spSection("עובי קו");
    spBtn(r4, "דק", function () { spApply({ strokeWidth: 1 }); });
    spBtn(r4, "בינוני", function () { spApply({ strokeWidth: 2 }); });
    spBtn(r4, "עבה", function () { spApply({ strokeWidth: 4 }); });
    var r5 = spSection("סגנון קו");
    spBtn(r5, "── רציף", function () { spApply({ strokeStyle: "solid" }); });
    spBtn(r5, "- - מקווקו", function () { spApply({ strokeStyle: "dashed" }); });
    spBtn(r5, "··· נקודות", function () { spApply({ strokeStyle: "dotted" }); });
    var r6 = spSection("סגנון ציור");
    spBtn(r6, "מדויק", function () { spApply({ roughness: 0 }); });
    spBtn(r6, "אומנותי", function () { spApply({ roughness: 1 }); });
    spBtn(r6, "משורבט", function () { spApply({ roughness: 2 }); });
    var r7 = spSection("פינות");
    spBtn(r7, "חדות", function () { spApply({ roundness: null }); });
    spBtn(r7, "מעוגלות", function () { spApply({ roundness: { type: 3 } }); });
    var r8 = spSection("גודל טקסט");
    [["S", 16], ["M", 20], ["L", 28], ["XL", 36]].forEach(function (p) {
      spBtn(r8, p[0], function () { spApply({ fontSize: p[1] }, true); });
    });
    var r9 = spSection("גופן");
    spBtn(r9, "✏️ כתב יד", function () { spApply({ fontFamily: 1 }, true); });
    spBtn(r9, "A רגיל", function () { spApply({ fontFamily: 2 }, true); });
    spBtn(r9, "</> קוד", function () { spApply({ fontFamily: 3 }, true); });
    var r10 = spSection("יישור טקסט");
    spBtn(r10, "ימין", function () { spApply({ textAlign: "right" }, true); });
    spBtn(r10, "מרכז", function () { spApply({ textAlign: "center" }, true); });
    spBtn(r10, "שמאל", function () { spApply({ textAlign: "left" }, true); });
    var r11 = spSection("שקיפות");
    var op = document.createElement("input");
    op.type = "range";
    op.min = "10";
    op.max = "100";
    op.step = "10";
    op.value = "100";
    op.style.width = "100%";
    op.addEventListener("change", function () { spApply({ opacity: Number(op.value) }); });
    r11.appendChild(op);
    var r12 = spSection("סדר שכבות");
    spBtn(r12, "⬆ לקדמה", function () { spReorder("front"); });
    spBtn(r12, "⬇ לרקע", function () { spReorder("back"); });
    var r13 = spSection("פעולות");
    spBtn(r13, "🗑 מחיקה", function () { spApply({ isDeleted: true }); });
  })();
  function spReorder(where) {
    if (!api) return;
    var ids = api.getAppState().selectedElementIds || {};
    var els = api.getSceneElements();
    var sel = els.filter(function (el) { return ids[el.id]; });
    if (!sel.length) { toast("סמן קודם אובייקט בקנבס"); return; }
    var rest = els.filter(function (el) { return !ids[el.id]; });
    api.updateScene({ elements: where === "front" ? rest.concat(sel) : sel.concat(rest) });
    scheduleSave();
  }
  document.getElementById("railStyle").addEventListener("click", function () {
    var on = stylePanel.style.display === "block";
    stylePanel.style.display = on ? "none" : "block";
    document.getElementById("railStyle").classList.toggle("on", !on);
    if (!on && api && !spSelected().length) toast("טיפ: סמן אובייקט בקנבס — וכל שינוי יחול עליו מיד");
  });

  // ===== שאר כפתורי הסרגל =====
  document.getElementById("homeBtn").addEventListener("click", function () { location.href = "index.html"; });
  document.getElementById("linksBtn").addEventListener("click", function () { openLinksModal(docId, function () {}); });
  // ===== נורית סנכרון: ירוק = מסונכרן, חום = מסנכרן, אפור = לא מחובר, אדום = שגיאה =====
  var dotEl = document.getElementById("dovDot");
  function dovStatusColor(t) {
    t = t || "";
    if (t.indexOf("שגיא") >= 0 || t.indexOf("⚠️") >= 0) return "#e03e3e";
    if (t.indexOf("מסנכרן") >= 0 || t.indexOf("טוען") >= 0) return "#b08968";
    if (t.indexOf("מסונכרן") >= 0) return "#0f7b6c";
    if (t.indexOf("נשמר") >= 0) return (window.dovCloud && dovCloud.spaceId()) ? "#0f7b6c" : "#9b9a97";
    return "#9b9a97";
  }
  function refreshDot() {
    var t = statusEl.textContent;
    dotEl.style.background = dovStatusColor(t);
    dotEl.title = t || "לא מחובר לענן";
  }
  new MutationObserver(refreshDot).observe(statusEl, { childList: true, characterData: true, subtree: true });
  dotEl.addEventListener("click", function () { toast(statusEl.textContent || "לא מחובר לענן"); });
  refreshDot();

  // ===== שליטה בסרגלים: הכל מוסתר כברירת מחדל — נשלט מהעמודה הימנית =====
  var CHROME_KEY = "dov-canvas-chrome";
  var chromeState = { bar: false, top: false, bottom: false };
  try { Object.assign(chromeState, JSON.parse(localStorage.getItem(CHROME_KEY) || "{}")); } catch (e) {}

  function applyChrome() {
    document.body.classList.toggle("noChrome", !chromeState.bar);
    var root = document.getElementById("canvasRoot");
    // Excalidraw מחליף פריסה בחלון צר: במחשב הסרגל העליון הוא .App-menu_top, במובייל .App-top-bar
    root.querySelectorAll(".App-top-bar, .App-menu_top, .App-toolbar--mobile").forEach(function (el) { el.style.display = chromeState.top ? "" : "none"; });
    root.querySelectorAll(".App-bottom-bar, footer, .layer-ui__wrapper__footer, .App-menu_bottom").forEach(function (el) { el.style.display = chromeState.bottom ? "" : "none"; });
    document.getElementById("railBar").classList.toggle("on", chromeState.bar);
    document.getElementById("railTools").classList.toggle("on", chromeState.top);
    document.getElementById("railBottom").classList.toggle("on", chromeState.bottom);
  }
  function toggleChrome(key) {
    chromeState[key] = !chromeState[key];
    try { localStorage.setItem(CHROME_KEY, JSON.stringify(chromeState)); } catch (e) {}
    applyChrome();
  }
  document.getElementById("railBar").addEventListener("click", function () { toggleChrome("bar"); });
  document.getElementById("railTools").addEventListener("click", function () { toggleChrome("top"); });
  document.getElementById("railBottom").addEventListener("click", function () { toggleChrome("bottom"); });

  // ===== רקע הקנבס: רשת (ברירת מחדל) / שורות / ריק =====
  var BG_KEY = "dov-canvas-bg";
  var bgMode = "grid";
  try { bgMode = localStorage.getItem(BG_KEY) || "grid"; } catch (e) {}
  var bgNames = { grid: "רשת ▦", lines: "שורות ≡", blank: "ריק" };
  function applyBg() {
    document.getElementById("bgLines").style.display = bgMode === "lines" ? "block" : "none";
    if (api) {
      try { api.updateScene({ appState: { gridSize: bgMode === "grid" ? 20 : null } }); } catch (e) {}
    }
  }
  document.getElementById("railBg").addEventListener("click", function () {
    bgMode = bgMode === "grid" ? "lines" : bgMode === "lines" ? "blank" : "grid";
    try { localStorage.setItem(BG_KEY, bgMode); } catch (e) {}
    applyBg();
    toast("רקע: " + bgNames[bgMode]);
  });
  applyBg();
  document.getElementById("hideBtn").addEventListener("click", function () { toggleChrome("bar"); });
  applyChrome();
  setInterval(applyChrome, 900); // Excalidraw בונה מחדש את הסרגלים בשינוי גודל — אוכפים את המצב שוב ושוב

  buildCanvas();

  // ===== סנכרון ענן של הקובץ הנוכחי =====
  (function () {
    try {
      if (!window.dovCloud || !dovCloud.spaceId()) return;
      var stEl2 = document.getElementById("saveStatus");
      if (stEl2) dovCloud.bindStatus(stEl2);
      var flag = "dov-cloud-reload-" + docId;
      dovCloud.pullDoc(docId).then(function (changed) {
        if (changed && !sessionStorage.getItem(flag)) {
          sessionStorage.setItem(flag, "1");
          location.reload();
        } else if (!changed) {
          sessionStorage.removeItem(flag);
        }
      });
    } catch (e) { console.error(e); }
  })();
</script>
<script>
(function () {
  // כאשר העמוד רץ כהטמעה (embed=1) — מוסיף סרגל צף קטן עם נעילה/זום ששולח הודעה לקנבס המארח
  try {
    var p = new URLSearchParams(location.search);
    if (p.get("embed") !== "1") return;
    var myId = p.get("id") || "";
    function send(action) { try { parent.postMessage({ source: "dov-widget", action: action, id: myId }, "*"); } catch (e) {} }
    var bar = document.createElement("div");
    bar.id = "dovEmbedBar";
    bar.style.cssText = "position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:2147483000;display:flex;gap:4px;background:rgba(15,123,108,0.92);padding:3px 6px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-family:inherit;";
    function mk(label, title, action) {
      var b = document.createElement("button");
      b.textContent = label; b.title = title;
      b.style.cssText = "border:0;background:transparent;color:#fff;cursor:pointer;font-size:14px;padding:2px 7px;border-radius:10px;line-height:1.2;";
      b.addEventListener("mouseenter", function () { b.style.background = "rgba(255,255,255,0.2)"; });
      b.addEventListener("mouseleave", function () { b.style.background = "transparent"; });
      b.addEventListener("click", function (ev) { ev.preventDefault(); ev.stopPropagation(); send(action); });
      return b;
    }
    bar.appendChild(mk("🔒", "מסך מלא — עבודה כמו על הקובץ המקורי", "focus"));
    bar.appendChild(mk("🔳", "זום מקסימלי בקנבס", "zoom"));
    bar.appendChild(mk("🔎", "קירוב בקנבס", "near"));
    function add() { if (document.body) { document.body.appendChild(bar); } else { setTimeout(add, 200); } }
    add();
  } catch (e) {}
})();
</script>
</body>
</html>
