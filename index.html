<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הווידג'טים של דב</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #fff; color: #37352f;
    padding: 24px 16px; max-width: 720px; margin: 0 auto;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #9b9a97; font-size: 14px; margin-bottom: 20px; }

  .grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  }
  .card {
    display: block; text-decoration: none; color: inherit;
    border: 1px solid #e9e9e7; border-radius: 10px;
    padding: 16px 14px; transition: background .1s;
  }
  a.card:hover { background: #f7f6f3; }
  .card .icon { font-size: 28px; margin-bottom: 8px; }
  .card .name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
  .card .desc { font-size: 12.5px; color: #9b9a97; }
  .card.soon { opacity: .45; cursor: default; }
  .badge {
    display: inline-block; font-size: 11px; background: #f1f1ef;
    border-radius: 4px; padding: 1px 6px; margin-top: 6px; color: #6b6b6b;
  }
  footer { margin-top: 28px; font-size: 12px; color: #c9c8c5; }
</style>
</head>
<body>
  <h1>🧰 הווידג'טים של דב</h1>
  <p class="subtitle">בחר ווידג'ט כדי להתחיל</p>

  <div class="grid">
    <a class="card" href="markdown.html">
      <div class="icon">📝</div>
      <div class="name">Markdown</div>
      <div class="desc">עורך עם תצוגה מקדימה חיה</div>
    </a>

    <div class="card soon">
      <div class="icon">🎨</div>
      <div class="name">קנבס ציור</div>
      <div class="desc">ציור חופשי ואובייקטים</div>
      <span class="badge">בקרוב</span>
    </div>

    <div class="card soon">
      <div class="icon">📊</div>
      <div class="name">גיליון</div>
      <div class="desc">טבלה עם חישובים וצבעים</div>
      <span class="badge">בקרוב</span>
    </div>
  </div>

  <footer>גרסה 0.1 — שלד ראשוני לבדיקת הטמעה</footer>
</body>
</html>
