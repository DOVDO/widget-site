<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הווידג'טים של דב</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #fff; color: #37352f;
    min-height: 100vh; display: flex; flex-direction: column;
    padding: 46px 14px 16px; /* מרווח עליון — אזור תפריט הריחוף של נושן */
  }

  header { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  #crumbs { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; font-size: 13.5px; min-width: 0; }
  #crumbs button {
    border: none; background: none; cursor: pointer; font-family: inherit;
    font-size: 13.5px; color: #9b9a97; padding: 2px 4px; border-radius: 4px;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #crumbs button:hover { background: #f1f1ef; color: #37352f; }
  #crumbs button.cur { color: #37352f; font-weight: 600; cursor: default; }
  #crumbs .sep { color: #d3d3d0; }

  .actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .actions button {
    border: 1px solid #d3d3d0; background: #fff; color: #37352f;
    border-radius: 6px; padding: 5px 10px; font-size: 12.5px; cursor: pointer;
    font-family: inherit; white-space: nowrap;
  }
  .actions button:hover { background: #f1f1ef; }
  .actions button.primary { background: #2383e2; border-color: #2383e2; color: #fff; }
  .actions button.primary:hover { background: #1b6ec2; }

  main { flex: 1; }
  .empty { color: #9b9a97; font-size: 13.5px; text-align: center; padding: 22px 0; }

  .row {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid #e9e9e7; border-radius: 8px;
    padding: 8px 10px; margin-bottom: 6px; background: #fff;
  }
  .row:hover { background: #fbfbfa; }
  .row .icon { font-size: 16px; flex-shrink: 0; }
  .row .main { flex: 1; min-width: 0; cursor: pointer; }
  .row .name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .meta { font-size: 11px; color: #9b9a97; margin-top: 1px; }
  .row .btns { display: flex; gap: 4px; flex-shrink: 0; }
  .row .btns button {
    border: none; background: none; cursor: pointer; font-size: 13px;
    padding: 3px 5px; border-radius: 5px; color: #9b9a97; font-family: inherit;
  }
  .row .btns button:hover { background: #f1f1ef; color: #37352f; }
  .linked { color: #2383e2 !important; font-weight: 600; }

  footer { margin-top: 14px; font-size: 11px; color: #9b9a97; text-align: center; }

  /* ===== מסך הבית ===== */
  .hero { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 8px 0 18px; }
  .bigBtn {
    flex: 1 1 130px; max-width: 200px; min-height: 88px;
    border: 1px solid #e9e9e7; border-radius: 10px; background: #fbfbfa;
    font-family: inherit; font-size: 14px; font-weight: 600; color: #37352f;
    cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  .bigBtn .big { font-size: 26px; }
  .bigBtn:hover { background: #f1f1ef; }
  .bigBtn.alt { background: #fff; border-style: dashed; }

  details#recentBox { border: 1px solid #e9e9e7; border-radius: 10px; padding: 8px 12px; }
  details#recentBox summary {
    cursor: pointer; font-size: 14px; font-weight: 600; padding: 4px 2px;
    list-style: none; display: flex; align-items: center; gap: 7px;
  }
  details#recentBox summary::-webkit-details-marker { display: none; }
  details#recentBox summary::before { content: "◀"; font-size: 10px; color: #9b9a97; transition: transform .15s; }
  details#recentBox[open] summary::before { transform: rotate(-90deg); }
  #recentList { margin-top: 8px; }

  /* ===== דיאלוגים מותאמים (prompt/confirm חסומים בהטמעה של נושן) ===== */
  .dlgOverlay { position: fixed; inset: 0; background: rgba(15,15,15,.45); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 14px; }
  .dlgBox { background: #fff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,.25); width: 100%; max-width: 380px; max-height: 75vh; overflow-y: auto; padding: 16px; }
  .dlgBox h3 { font-size: 14.5px; margin-bottom: 10px; }
  .dlgBox .msg { font-size: 13.5px; line-height: 1.55; white-space: pre-wrap; margin-bottom: 12px; }
  .dlgBox input[type="text"] { width: 100%; padding: 7px 8px; border: 1px solid #d3d3d0; border-radius: 6px; font-family: inherit; font-size: 13.5px; margin-bottom: 12px; }
  .dlgRow { display: flex; gap: 8px; }
  .dlgRow button { border: 1px solid #d3d3d0; background: #fff; border-radius: 6px; padding: 6px 14px; font-family: inherit; font-size: 13px; cursor: pointer; }
  .dlgRow button.primary { background: #2383e2; border-color: #2383e2; color: #fff; }
  .dlgRow button.danger { background: #e03e3e; border-color: #e03e3e; color: #fff; }

  #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: #37352f; color: #fff; font-size: 13px; padding: 8px 16px; border-radius: 8px; z-index: 400; opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 90%; }

  /* חלון בחירת תיקייה (להעברת קובץ) */
  #moveOverlay {
    position: fixed; inset: 0; background: rgba(15,15,15,.45); z-index: 150;
    display: none; align-items: center; justify-content: center; padding: 14px;
  }
  #moveBox {
    background: #fff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,.25);
    width: 100%; max-width: 380px; max-height: 70vh; overflow-y: auto; padding: 14px 16px;
  }
  #moveBox h3 { font-size: 14.5px; margin-bottom: 10px; }
  #moveBox button.opt {
    display: block; width: 100%; text-align: right; border: none; background: none;
    font-family: inherit; font-size: 13.5px; padding: 7px 8px; border-radius: 6px; cursor: pointer;
    color: #37352f;
  }
  #moveBox button.opt:hover { background: #f1f1ef; }
  #moveBox .cancel { margin-top: 8px; width: 100%; border: 1px solid #d3d3d0; background: #fff; border-radius: 6px; padding: 6px; font-family: inherit; font-size: 12.5px; cursor: pointer; }
</style>
</head>
<body>
<div id="cloudBar" style="display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:12px;color:#787774;border-bottom:1px solid #f1f1ef;direction:rtl">
  <button id="cloudBtn" style="border:1px solid #d3d1cb;background:#fff;border-radius:5px;cursor:pointer;padding:3px 10px;font-size:12px">☁️ ענן</button>
  <span id="cloudStatus">ענן: לא מחובר</span>
</div>

  <!-- ===== מסך הבית ===== -->
  <div id="homeView">
    <div class="hero">
      <button class="bigBtn" id="homeNewDoc"><span class="big">📝</span>מסמך חדש</button>
      <button class="bigBtn" id="homeNewSheet"><span class="big">📊</span>גיליון חדש</button>
      <button class="bigBtn" id="homeNewCanvas"><span class="big">🎨</span>קנבס חדש</button>
      <button class="bigBtn alt" id="openExplorerBtn"><span class="big">🗂️</span>סייר הקבצים</button>
    </div>
    <details id="recentBox" open>
      <summary>🕘 אחרונים</summary>
      <div id="recentList"></div>
    </details>
  </div>

  <!-- ===== סייר הקבצים ===== -->
  <div id="explorerView" style="display:none">
    <header>
      <div id="crumbs"></div>
      <div class="actions">
        <button id="homeBtn">🏠 בית</button>
        <button id="newDocBtn" class="primary">➕ מסמך</button>
        <button id="newSheetBtn" class="primary">➕ גיליון</button>
        <button id="newCanvasBtn" class="primary">➕ קנבס</button>
        <button id="newFolderBtn">📁 תיקייה</button>
      </div>
    </header>
    <main id="list"></main>
  </div>

  <footer>גרסה 0.26</footer>

  <div id="moveOverlay">
    <div id="moveBox">
      <h3>📂 העבר אל...</h3>
      <div id="moveOptions"></div>
      <button class="cancel" id="moveCancel">ביטול</button>
    </div>
  </div>

  <div id="toast"></div>

<script src="storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="cloud.js"></script>
<script src="links-ui.js"></script>
<script>
  let currentFolderId = null;

  // ----- דיאלוגים מותאמים: prompt/confirm/alert חסומים בתוך הטמעה של נושן -----
  function dovDlg() {
    const ov = document.createElement("div");
    ov.className = "dlgOverlay";
    const box = document.createElement("div");
    box.className = "dlgBox";
    ov.appendChild(box);
    function close() { if (ov.parentNode) ov.parentNode.removeChild(ov); }
    ov.addEventListener("mousedown", (e) => { if (e.target === ov) close(); });
    document.body.appendChild(ov);
    return { box: box, close: close };
  }

  function askText(title, initial, cb) {
    const d = dovDlg();
    const h = document.createElement("h3");
    h.textContent = title;
    const inp = document.createElement("input");
    inp.type = "text";
    inp.value = initial || "";
    const row = document.createElement("div");
    row.className = "dlgRow";
    const ok = document.createElement("button");
    ok.className = "primary";
    ok.textContent = "אישור";
    const cancel = document.createElement("button");
    cancel.textContent = "ביטול";
    function submit() {
      const v = inp.value.trim();
      d.close();
      if (v) cb(v);
    }
    ok.addEventListener("click", submit);
    inp.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
    cancel.addEventListener("click", d.close);
    row.appendChild(ok);
    row.appendChild(cancel);
    d.box.appendChild(h);
    d.box.appendChild(inp);
    d.box.appendChild(row);
    inp.focus();
    inp.select();
  }

  function askConfirm(msg, cb, danger) {
    const d = dovDlg();
    const m = document.createElement("div");
    m.className = "msg";
    m.textContent = msg;
    const row = document.createElement("div");
    row.className = "dlgRow";
    const ok = document.createElement("button");
    ok.className = danger ? "danger" : "primary";
    ok.textContent = danger ? "מחק" : "אישור";
    ok.addEventListener("click", () => { d.close(); cb(); });
    const cancel = document.createElement("button");
    cancel.textContent = "ביטול";
    cancel.addEventListener("click", d.close);
    row.appendChild(ok);
    row.appendChild(cancel);
    d.box.appendChild(m);
    d.box.appendChild(row);
  }

  let toastTimer = null;
  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.opacity = "1";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.style.opacity = "0"; }, 2200);
  }

  function showLinkModal(text) {
    const d = dovDlg();
    const h = document.createElement("h3");
    h.textContent = "🔗 קישור לקובץ — העתק ידנית";
    const inp = document.createElement("input");
    inp.type = "text";
    inp.readOnly = true;
    inp.value = text;
    inp.style.direction = "ltr";
    inp.addEventListener("click", () => inp.select());
    const row = document.createElement("div");
    row.className = "dlgRow";
    const cp = document.createElement("button");
    cp.className = "primary";
    cp.textContent = "העתק";
    cp.addEventListener("click", () => {
      inp.select();
      try { document.execCommand("copy"); cp.textContent = "הועתק ✓"; } catch (e) {}
    });
    const closeB = document.createElement("button");
    closeB.textContent = "סגור";
    closeB.addEventListener("click", d.close);
    row.appendChild(cp);
    row.appendChild(closeB);
    d.box.appendChild(h);
    d.box.appendChild(inp);
    d.box.appendChild(row);
    inp.select();
  }

  function copyText(text) {
    let ok = false;
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.cssText = "position:fixed;top:0;left:0;opacity:0";
      document.body.appendChild(ta);
      ta.select();
      ok = document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) {}
    if (ok) { toast("הקישור הועתק ✓"); return; }
    try {
      navigator.clipboard.writeText(text).then(() => toast("הקישור הועתק ✓"), () => showLinkModal(text));
    } catch (e) { showLinkModal(text); }
  }

  function docLink(d) {
    return new URL((d.type === "sheet" ? "sheet.html" : "markdown.html") + "?id=" + encodeURIComponent(d.id), location.href).href;
  }

  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return pad2(d.getDate()) + "." + pad2(d.getMonth() + 1) + "." + d.getFullYear() + " " + pad2(d.getHours()) + ":" + pad2(d.getMinutes());
    } catch (e) { return ""; }
  }

  function folderPath(folderId) {
    const path = [];
    let cur = folderId ? getFolder(folderId) : null;
    while (cur) {
      path.unshift(cur);
      cur = cur.parentId ? getFolder(cur.parentId) : null;
    }
    return path;
  }

  function renderCrumbs() {
    const crumbs = document.getElementById("crumbs");
    crumbs.innerHTML = "";
    const path = folderPath(currentFolderId);
    const rootBtn = document.createElement("button");
    rootBtn.textContent = "🗂️ ראשי";
    if (!path.length) rootBtn.className = "cur";
    else rootBtn.addEventListener("click", () => { currentFolderId = null; render(); });
    crumbs.appendChild(rootBtn);
    path.forEach((f, i) => {
      const sep = document.createElement("span");
      sep.className = "sep";
      sep.textContent = "/";
      crumbs.appendChild(sep);
      const btn = document.createElement("button");
      btn.textContent = f.name;
      if (i === path.length - 1) btn.className = "cur";
      else btn.addEventListener("click", () => { currentFolderId = f.id; render(); });
      crumbs.appendChild(btn);
    });
  }

  function folderRow(f) {
    const row = document.createElement("div");
    row.className = "row";
    const icon = document.createElement("span");
    icon.className = "icon";
    icon.textContent = "📁";
    const main = document.createElement("div");
    main.className = "main";
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = f.name;
    const meta = document.createElement("div");
    meta.className = "meta";
    const docCount = listDocs(f.id).length;
    const folderCount = listFolders(f.id).length;
    meta.textContent = docCount + " קבצים · " + folderCount + " תיקיות";
    main.appendChild(name);
    main.appendChild(meta);
    main.addEventListener("click", () => { currentFolderId = f.id; render(); });
    const btns = document.createElement("div");
    btns.className = "btns";
    const renameBtn = document.createElement("button");
    renameBtn.title = "שינוי שם";
    renameBtn.textContent = "✏️";
    renameBtn.addEventListener("click", () => {
      askText("שם חדש לתיקייה:", f.name, (newName) => {
        renameFolder(f.id, newName);
        refreshAll();
      });
    });
    const delBtn = document.createElement("button");
    delBtn.title = "מחיקה";
    delBtn.textContent = "🗑️";
    delBtn.addEventListener("click", () => {
      askConfirm('למחוק את התיקייה "' + f.name + '"?\nהתוכן שלה לא יימחק — הוא יעבור לתיקייה שמעליה.', () => {
        deleteFolder(f.id);
        refreshAll();
      }, true);
    });
    btns.appendChild(renameBtn);
    btns.appendChild(delBtn);
    row.appendChild(icon);
    row.appendChild(main);
    row.appendChild(btns);
    return row;
  }

  function openDocPage(d) {
    const page = d.type === "sheet" ? "sheet.html" : d.type === "canvas" ? "canvas.html" : "markdown.html";
    location.href = page + "?id=" + encodeURIComponent(d.id);
  }

  function docRow(d, inRecents) {
    const row = document.createElement("div");
    row.className = "row";
    const icon = document.createElement("span");
    icon.className = "icon";
    icon.textContent = d.type === "sheet" ? "📊" : d.type === "canvas" ? "🎨" : "📝";
    const main = document.createElement("div");
    main.className = "main";
    const name = document.createElement("div");
    name.className = "name";
    name.textContent = d.name;
    const meta = document.createElement("div");
    meta.className = "meta";
    const linkCount = (d.links || []).length;
    let metaText = "עודכן: " + fmtDate(d.updated);
    if (inRecents && d.folderId) {
      const folder = getFolder(d.folderId);
      if (folder) metaText += " · 📁 " + folder.name;
    }
    if (linkCount) metaText += " · 🔗 משובץ ב-" + linkCount + " מקומות";
    meta.textContent = metaText;
    main.appendChild(name);
    main.appendChild(meta);
    main.addEventListener("click", () => openDocPage(d));
    const btns = document.createElement("div");
    btns.className = "btns";

    const linksBtn = document.createElement("button");
    linksBtn.title = "היכן הקובץ משובץ בנושן";
    linksBtn.textContent = "🔗" + (linkCount ? linkCount : "");
    if (linkCount) linksBtn.className = "linked";
    linksBtn.addEventListener("click", () => openLinksModal(d.id, refreshAll));

    const copyBtn = document.createElement("button");
    copyBtn.title = "העתק קישור לקובץ (להטמעה בנושן)";
    copyBtn.textContent = "📋";
    copyBtn.addEventListener("click", () => copyText(docLink(d)));

    const moveBtn = document.createElement("button");
    moveBtn.title = "העברה לתיקייה";
    moveBtn.textContent = "📂";
    moveBtn.addEventListener("click", () => openMove(d.id));

    const renameBtn = document.createElement("button");
    renameBtn.title = "שינוי שם";
    renameBtn.textContent = "✏️";
    renameBtn.addEventListener("click", () => {
      askText("שם חדש לקובץ:", d.name, (newName) => {
        updateDoc(d.id, { name: newName });
        refreshAll();
      });
    });

    const delBtn = document.createElement("button");
    delBtn.title = "מחיקה";
    delBtn.textContent = "🗑️";
    delBtn.addEventListener("click", () => {
      let msg = 'למחוק את "' + d.name + '"?';
      const links = d.links || [];
      if (links.length) {
        msg += "\n\n⚠️ שים לב: הקובץ משובץ בנושן ב-" + links.length + " מקומות:\n" +
          links.map((l) => "• " + (l.note || l.url)).join("\n") +
          "\n\nההטמעות האלו יפסיקו לעבוד!";
      }
      askConfirm(msg, () => {
        deleteDoc(d.id);
        refreshAll();
      }, true);
    });

    btns.appendChild(linksBtn);
    btns.appendChild(copyBtn);
    btns.appendChild(moveBtn);
    btns.appendChild(renameBtn);
    btns.appendChild(delBtn);
    row.appendChild(icon);
    row.appendChild(main);
    row.appendChild(btns);
    return row;
  }

  function render() {
    renderCrumbs();
    const listEl = document.getElementById("list");
    listEl.innerHTML = "";
    const folders = listFolders(currentFolderId);
    const docs = listDocs(currentFolderId);
    if (!folders.length && !docs.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "התיקייה ריקה — צור מסמך, גיליון או תיקייה מהכפתורים למעלה ⬆️";
      listEl.appendChild(empty);
      return;
    }
    folders.forEach((f) => listEl.appendChild(folderRow(f)));
    docs.forEach((d) => listEl.appendChild(docRow(d, false)));
  }

  function renderRecents() {
    const el = document.getElementById("recentList");
    el.innerHTML = "";
    const docs = listAllDocs().slice(0, 8);
    if (!docs.length) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "עוד אין קבצים — צור את הראשון מהכפתורים למעלה ⬆️";
      el.appendChild(empty);
      return;
    }
    docs.forEach((d) => el.appendChild(docRow(d, true)));
  }

  function refreshAll() {
    render();
    renderRecents();
  }

  // ----- מעבר בין מסך הבית לסייר -----
  const homeView = document.getElementById("homeView");
  const explorerView = document.getElementById("explorerView");

  function showHome() {
    homeView.style.display = "";
    explorerView.style.display = "none";
    renderRecents();
  }

  function showExplorer() {
    homeView.style.display = "none";
    explorerView.style.display = "";
    render();
  }

  // ----- העברת קובץ לתיקייה -----
  const moveOverlay = document.getElementById("moveOverlay");
  const moveOptions = document.getElementById("moveOptions");

  function openMove(docId) {
    moveOptions.innerHTML = "";
    function addOption(label, folderId, depth) {
      const btn = document.createElement("button");
      btn.className = "opt";
      btn.textContent = "\u00a0".repeat(depth * 3) + label;
      btn.addEventListener("click", () => {
        moveDoc(docId, folderId);
        moveOverlay.style.display = "none";
        refreshAll();
      });
      moveOptions.appendChild(btn);
    }
    addOption("🗂️ ראשי", null, 0);
    function walk(parentId, depth) {
      listFolders(parentId).forEach((f) => {
        addOption("📁 " + f.name, f.id, depth);
        walk(f.id, depth + 1);
      });
    }
    walk(null, 1);
    moveOverlay.style.display = "flex";
  }

  document.getElementById("moveCancel").addEventListener("click", () => { moveOverlay.style.display = "none"; });
  moveOverlay.addEventListener("mousedown", (e) => { if (e.target === moveOverlay) moveOverlay.style.display = "none"; });

  // ----- יצירת קבצים: דוחפים לענן לפני המעבר לדף העריכה -----
  function createAndOpen(type) {
    const d = createDoc(type, currentFolderId);
    const go = () => openDocPage(d); // ניתוב מרכזי אחד — מכיר גם את הקנבס
    if (window.dovCloud && dovCloud.isReady()) {
      Promise.race([dovCloud.flush(), new Promise((r) => setTimeout(r, 1500))]).then(go, go);
    } else {
      go();
    }
  }

  document.getElementById("homeNewDoc").addEventListener("click", () => { currentFolderId = null; createAndOpen("markdown"); });
  document.getElementById("homeNewSheet").addEventListener("click", () => { currentFolderId = null; createAndOpen("sheet"); });
  document.getElementById("homeNewCanvas").addEventListener("click", () => { currentFolderId = null; createAndOpen("canvas"); });
  document.getElementById("openExplorerBtn").addEventListener("click", showExplorer);
  document.getElementById("homeBtn").addEventListener("click", showHome);
  document.getElementById("newDocBtn").addEventListener("click", () => createAndOpen("markdown"));
  document.getElementById("newSheetBtn").addEventListener("click", () => createAndOpen("sheet"));
  document.getElementById("newCanvasBtn").addEventListener("click", () => createAndOpen("canvas"));
  document.getElementById("newFolderBtn").addEventListener("click", () => {
    askText("שם התיקייה:", "", (name) => {
      createFolder(name, currentFolderId);
      refreshAll();
    });
  });

  showHome();

  // ===== חיבור לענן =====
  (function () {
    const stEl = document.getElementById("cloudStatus");
    const btn = document.getElementById("cloudBtn");
    if (!window.dovCloud) { stEl.textContent = "ענן: הספרייה לא נטענה"; return; }
    dovCloud.bindStatus(stEl);
    function startPull() {
      dovCloud.pullAll().then((changed) => { if (changed) refreshAll(); });
    }
    function mkBtn(text, primary) {
      const b = document.createElement("button");
      b.textContent = text;
      b.style.cssText = primary
        ? "border:1px solid #2383e2;background:#2383e2;color:#fff;border-radius:5px;cursor:pointer;padding:6px 12px;margin:0 0 0 6px;font-size:13px"
        : "border:1px solid #d3d1cb;background:#fff;border-radius:5px;cursor:pointer;padding:5px 10px;margin:0 0 0 6px;font-size:13px";
      return b;
    }
    function cloudModal() {
      const ov = document.createElement("div");
      ov.style.cssText = "position:fixed;inset:0;background:rgba(15,15,15,.45);display:flex;align-items:center;justify-content:center;z-index:9999";
      ov.addEventListener("click", (e) => { if (e.target === ov) document.body.removeChild(ov); });
      const box = document.createElement("div");
      box.style.cssText = "background:#fff;border-radius:10px;padding:18px;width:92%;max-width:430px;max-height:85vh;overflow:auto;box-shadow:0 8px 30px rgba(0,0,0,.25);direction:rtl";
      const h = document.createElement("h3");
      h.textContent = "☁️ סנכרון בענן";
      h.style.margin = "0 0 10px";
      box.appendChild(h);
      const cur = dovCloud.spaceId();
      const p = document.createElement("div");
      p.style.cssText = "font-size:13px;color:#37352f;margin-bottom:10px;line-height:1.5";
      box.appendChild(p);
      if (cur) {
        p.textContent = "מחובר למרחב. זה המזהה הסודי שלך — שמור אותו במקום בטוח, ואיתו תתחבר מכל מכשיר:";
        const inp = document.createElement("input");
        inp.value = cur;
        inp.readOnly = true;
        inp.style.cssText = "width:100%;box-sizing:border-box;padding:6px;border:1px solid #d3d1cb;border-radius:5px;direction:ltr;font-size:12px;margin-bottom:10px";
        inp.addEventListener("click", () => inp.select());
        box.appendChild(inp);
        const cp = mkBtn("📋 העתק מזהה", false);
        cp.addEventListener("click", () => {
          inp.select();
          try { document.execCommand("copy"); cp.textContent = "הועתק ✓"; } catch (e) {}
        });
        box.appendChild(cp);
        const sync = mkBtn("🔄 סנכרן עכשיו", false);
        sync.addEventListener("click", () => { document.body.removeChild(ov); startPull(); });
        box.appendChild(sync);
        const out = mkBtn("⏏️ נתק מכשיר זה", false);
        out.addEventListener("click", () => {
          document.body.removeChild(ov);
          askConfirm("לנתק את המכשיר הזה מהענן? הקבצים יישארו גם כאן וגם בענן.", () => {
            dovCloud.setSpaceId("");
            stEl.textContent = "ענן: לא מחובר";
            stEl.style.color = "#787774";
          });
        });
        box.appendChild(out);
      } else {
        p.textContent = "עוד לא מחובר. צור מרחב חדש — או הדבק מזהה קיים ממכשיר אחר. כל הקבצים המקומיים יועלו לענן אוטומטית.";
        const mk = mkBtn("✨ צור מרחב חדש", true);
        mk.addEventListener("click", () => {
          dovCloud.setSpaceId(dovCloud.newSpaceId());
          document.body.removeChild(ov);
          startPull();
        });
        box.appendChild(mk);
        const joinIn = document.createElement("input");
        joinIn.placeholder = "...או הדבק כאן מזהה קיים";
        joinIn.style.cssText = "width:100%;box-sizing:border-box;padding:6px;border:1px solid #d3d1cb;border-radius:5px;direction:ltr;font-size:12px;margin:12px 0 6px";
        box.appendChild(joinIn);
        const join = mkBtn("🔗 התחבר למזהה הזה", false);
        join.style.margin = "0";
        join.addEventListener("click", () => {
          const v = joinIn.value.trim();
          if (v.length < 16) { toast("המזהה קצר מדי — ודא שהעתקת את כולו"); return; }
          dovCloud.setSpaceId(v);
          document.body.removeChild(ov);
          startPull();
        });
        box.appendChild(join);
      }
      ov.appendChild(box);
      document.body.appendChild(ov);
    }
    btn.addEventListener("click", cloudModal);
    if (dovCloud.spaceId()) startPull();
    else stEl.textContent = "ענן: לא מחובר — לחץ ☁️ להפעלה";
  })();

</script>
</body>
</html>
