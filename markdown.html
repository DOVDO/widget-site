<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Widget</title>
<!-- Toast UI Editor: עורך WYSIWYG שכותב Markdown מאחורי הקלעים -->
<link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
<link rel="stylesheet" href="https://uicdn.toast.com/tui-color-picker/latest/tui-color-picker.min.css">
<link rel="stylesheet" href="https://uicdn.toast.com/editor-plugin-color-syntax/latest/toastui-editor-plugin-color-syntax.min.css">
<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="https://uicdn.toast.com/tui-color-picker/latest/tui-color-picker.min.js"></script>
<script src="https://uicdn.toast.com/editor-plugin-color-syntax/latest/toastui-editor-plugin-color-syntax.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #fff; color: #37352f;
    display: flex; flex-direction: column;
  }

  .content { flex: 1; min-height: 0; padding: 30px 10px 4px; }
  #editorRoot, #viewerRoot { height: 100%; }
  #viewerRoot { overflow: auto; padding: 0 6px; }

  body.mode-view #editorRoot { display: none; }
  body:not(.mode-view) #viewerRoot { display: none; }

  .toastui-editor-contents { direction: rtl; text-align: right; font-size: 15px; font-family: -apple-system, "Segoe UI", Arial, sans-serif; }
  .toastui-editor-contents pre, .toastui-editor-contents code { direction: ltr; text-align: left; }
  .ProseMirror { direction: rtl; }

  .toolbar {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    margin: 6px 10px 10px; padding: 6px 10px;
    border: 1px solid #e9e9e7; border-radius: 10px; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .toolbar a { text-decoration: none; font-size: 15px; flex-shrink: 0; }
  #docName {
    border: 1px solid transparent; border-radius: 6px; background: transparent;
    font-size: 13.5px; font-weight: 600; color: #37352f;
    padding: 3px 8px; min-width: 50px; max-width: 180px; flex: 1;
    direction: rtl;
  }
  #docName:hover { border-color: #d3d3d0; }
  #docName:focus { outline: none; border-color: #2383e2; }
  .toolbar button {
    border: 1px solid #d3d3d0; background: #fff; color: #37352f;
    border-radius: 6px; padding: 4px 9px; font-size: 12.5px; cursor: pointer;
    flex-shrink: 0;
  }
  .toolbar button:hover { background: #f1f1ef; }
  .toolbar button.active { background: #37352f; color: #fff; border-color: #37352f; }
  #saveStatus { font-size: 11.5px; color: #9b9a97; flex-shrink: 0; }

  body.toolbar-hidden .toolbar { display: none; }
  #showBtn {
    display: none; position: fixed; bottom: 10px; inset-inline-start: 10px;
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid #d3d3d0; background: #fff; cursor: pointer;
    font-size: 13px; opacity: .35; box-shadow: 0 2px 6px rgba(0,0,0,.1);
    align-items: center; justify-content: center; z-index: 50;
  }
  #showBtn:hover { opacity: 1; }
  body.toolbar-hidden #showBtn { display: flex; }

  /* ===== ידית בלוק בסגנון נושן ===== */
  #blockHandle {
    position: fixed; z-index: 60; display: none;
  }
  #blockHandle button {
    border: none; background: #fff; color: #9b9a97;
    border: 1px solid #e9e9e7; border-radius: 6px;
    width: 24px; height: 24px; cursor: pointer; font-size: 13px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    display: flex; align-items: center; justify-content: center;
  }
  #blockHandle button:hover { background: #f1f1ef; color: #37352f; }

  #bhMenu {
    position: fixed; z-index: 70; display: none;
    flex-direction: column; min-width: 160px;
    background: #fff; border: 1px solid #e9e9e7; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12); padding: 4px;
    direction: rtl;
  }
  #bhMenu button {
    border: none; background: none; text-align: right;
    padding: 7px 10px; font-size: 13.5px; cursor: pointer; border-radius: 6px;
    color: #37352f; font-family: inherit;
  }
  #bhMenu button:hover { background: #f1f1ef; }
  #bhMenu button.danger { color: #c4554d; }
</style>
</head>
<body class="mode-view">

  <div class="content">
    <div id="viewerRoot"></div>
    <div id="editorRoot"></div>
  </div>

  <div class="toolbar" id="toolbar">
    <a href="index.html" title="כל המסמכים">🏠</a>
    <input id="docName" title="שם המסמך — לחץ כדי לערוך">
    <button id="viewBtn" title="קריאה נקייה">👁️ צפייה</button>
    <button id="editBtn" title="עריכה חזותית כמו בנושן">✏️ עריכה</button>
    <button id="sourceBtn" title="עריכת קוד ה-Markdown">&lt;/&gt; מקור</button>
    <button id="downloadBtn" title="הורדת קובץ Markdown">⬇️ .md</button>
    <span id="saveStatus"></span>
    <button id="hideBtn" title="הסתרת הסרגל — כתיבה נקייה">⌄</button>
  </div>
  <button id="showBtn" title="הצגת הסרגל">⌃</button>

  <!-- ידית הבלוק והתפריט שלה -->
  <div id="blockHandle"><button id="bhBtn" title="פעולות בלוק">⋮⋮</button></div>
  <div id="bhMenu">
    <button data-act="above">⬆️ הוסף בלוק מעל</button>
    <button data-act="below">⬇️ הוסף בלוק מתחת</button>
    <button data-act="delete" class="danger">🗑️ מחק את הבלוק</button>
  </div>

<script src="storage.js"></script>
<script>
  const docNameInput = document.getElementById("docName");
  const saveStatus = document.getElementById("saveStatus");
  const modeButtons = {
    view: document.getElementById("viewBtn"),
    edit: document.getElementById("editBtn"),
    source: document.getElementById("sourceBtn"),
  };

  // --- טעינת המסמך ---
  const params = new URLSearchParams(location.search);
  let docId = params.get("id");
  let doc = docId ? getDoc(docId) : null;
  if (!doc) {
    doc = createDoc();
    docId = doc.id;
    history.replaceState(null, "", "markdown.html?id=" + encodeURIComponent(docId));
  }
  docNameInput.value = doc.name;

  // --- העורך — עם כל הכלים האפשריים בסרגל ---
  const editor = new toastui.Editor({
    el: document.getElementById("editorRoot"),
    height: "100%",
    initialEditType: "wysiwyg",
    initialValue: doc.content || "",
    usageStatistics: false,
    hideModeSwitch: true,
    autofocus: false,
    placeholder: "כתוב כאן...",
    toolbarItems: [
      ["heading", "bold", "italic", "strike"],
      ["hr", "quote"],
      ["ul", "ol", "task", "indent", "outdent"],
      ["table", "image", "link"],
      ["code", "codeblock"],
    ],
    plugins: [toastui.Editor.plugin.colorSyntax],
  });

  // --- התצוגה (קריאה בלבד) ---
  const viewer = toastui.Editor.factory({
    el: document.getElementById("viewerRoot"),
    viewer: true,
    initialValue: doc.content || "",
    usageStatistics: false,
  });

  function refreshViewer() {
    const md = editor.getMarkdown();
    viewer.setMarkdown(md.trim() ? md : "*המסמך ריק — עבור למצב ✏️ עריכה כדי לכתוב*");
  }

  // --- מצבים ---
  let currentMode = null;
  function setMode(mode) {
    currentMode = mode;
    document.body.classList.remove("mode-view", "mode-edit", "mode-source");
    document.body.classList.add("mode-" + mode);
    for (const key in modeButtons) {
      modeButtons[key].classList.toggle("active", key === mode);
    }
    hideHandle(); hideMenu();
    if (mode === "view") {
      refreshViewer();
    } else if (mode === "edit") {
      editor.changeMode("wysiwyg", true);
    } else {
      editor.changeMode("markdown", true);
    }
    try { localStorage.setItem("dov-widgets-ui-mode", mode); } catch (e) {}
  }

  let savedMode = null;
  try { savedMode = localStorage.getItem("dov-widgets-ui-mode"); } catch (e) {}
  setMode(savedMode || ((doc.content || "").trim() ? "view" : "edit"));

  modeButtons.view.addEventListener("click", () => setMode("view"));
  modeButtons.edit.addEventListener("click", () => { setMode("edit"); editor.focus(); });
  modeButtons.source.addEventListener("click", () => { setMode("source"); editor.focus(); });

  document.getElementById("viewerRoot").addEventListener("dblclick", () => {
    setMode("edit");
    editor.focus();
  });

  // --- שמירה אוטומטית ---
  let saveTimer = null;
  editor.on("change", () => {
    saveStatus.textContent = "שומר...";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      updateDoc(docId, { content: editor.getMarkdown() });
      saveStatus.textContent = "נשמר ✓";
    }, 400);
  });

  // --- עריכת שם ---
  docNameInput.addEventListener("change", () => {
    const name = docNameInput.value.trim();
    if (name) {
      updateDoc(docId, { name: name });
    } else {
      docNameInput.value = getDoc(docId).name;
    }
    saveStatus.textContent = "נשמר ✓";
  });

  // --- הסתרת הסרגל ---
  function setToolbarHidden(hidden) {
    document.body.classList.toggle("toolbar-hidden", hidden);
    try { localStorage.setItem("dov-widgets-toolbar-hidden", hidden ? "1" : "0"); } catch (e) {}
  }
  document.getElementById("hideBtn").addEventListener("click", () => setToolbarHidden(true));
  document.getElementById("showBtn").addEventListener("click", () => setToolbarHidden(false));
  try {
    if (localStorage.getItem("dov-widgets-toolbar-hidden") === "1") setToolbarHidden(true);
  } catch (e) {}

  // --- הורדת .md ---
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const safeName = (getDoc(docId).name || "note").replace(/[\\/:*?"<>|]/g, "-");
    const blob = new Blob([editor.getMarkdown()], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = safeName + ".md";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ============================================
  // ידית בלוק בסגנון נושן:
  // ריחוף על בלוק במצב עריכה מציג ⋮⋮ בצד הבלוק.
  // לחיצה פותחת תפריט: הוספה מעל / מתחת / מחיקה.
  // ============================================
  const blockHandle = document.getElementById("blockHandle");
  const bhMenu = document.getElementById("bhMenu");
  let hoveredBlock = null;

  function getProseMirror() {
    return document.querySelector("#editorRoot .ProseMirror");
  }

  function hideHandle() { blockHandle.style.display = "none"; }
  function hideMenu() { bhMenu.style.display = "none"; }

  function positionHandle(block) {
    const rect = block.getBoundingClientRect();
    let left = rect.right + 4;
    if (left + 28 > window.innerWidth) left = rect.right - 28;
    blockHandle.style.top = Math.max(rect.top, 0) + "px";
    blockHandle.style.left = left + "px";
    blockHandle.style.display = "block";
  }

  document.addEventListener("mousemove", (e) => {
    if (currentMode !== "edit") return;
    // אם העכבר על הידית או התפריט — לא מזיזים כלום
    if (blockHandle.contains(e.target) || bhMenu.contains(e.target)) return;
    const pm = getProseMirror();
    if (!pm) { hideHandle(); return; }
    let el = e.target;
    if (!pm.contains(el)) {
      // מחוץ לעורך — מסתירים (אלא אם התפריט פתוח)
      if (bhMenu.style.display !== "flex") hideHandle();
      return;
    }
    // מטפסים לבלוק העליון (הילד הישיר של העורך)
    while (el.parentElement && el.parentElement !== pm) el = el.parentElement;
    if (el && el.parentElement === pm) {
      hoveredBlock = el;
      positionHandle(el);
    }
  });

  // גלילה או שינוי גודל — מסתירים כדי לא להציג ידית במקום הלא נכון
  document.addEventListener("scroll", () => { hideHandle(); hideMenu(); }, true);
  window.addEventListener("resize", () => { hideHandle(); hideMenu(); });

  // לחיצה על הידית — פותחת את התפריט לידה
  document.getElementById("bhBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    if (!hoveredBlock) return;
    const rect = blockHandle.getBoundingClientRect();
    bhMenu.style.display = "flex";
    let left = rect.left - 170;
    if (left < 4) left = 4;
    let top = rect.top;
    if (top + 130 > window.innerHeight) top = window.innerHeight - 130;
    bhMenu.style.top = top + "px";
    bhMenu.style.left = left + "px";
  });

  // לחיצה בכל מקום אחר — סוגרת את התפריט
  document.addEventListener("mousedown", (e) => {
    if (!bhMenu.contains(e.target) && !blockHandle.contains(e.target)) hideMenu();
  });

  // --- פעולות התפריט ---
  function placeCaretIn(el) {
    const sel = window.getSelection();
    const r = document.createRange();
    r.selectNodeContents(el);
    r.collapse(true);
    sel.removeAllRanges();
    sel.addRange(r);
  }

  bhMenu.addEventListener("click", (e) => {
    const act = e.target.dataset && e.target.dataset.act;
    if (!act || !hoveredBlock) return;
    const block = hoveredBlock;
    editor.focus();

    if (act === "delete") {
      // בוחרים את כל הבלוק ומוחקים — העורך קולט את השינוי ומסתנכרן
      const sel = window.getSelection();
      const r = document.createRange();
      r.selectNode(block);
      sel.removeAllRanges();
      sel.addRange(r);
      let ok = false;
      try { ok = document.execCommand("delete"); } catch (err) {}
      if (!ok && block.parentElement) block.remove();
    } else {
      const p = document.createElement("p");
      p.innerHTML = "<br>";
      block.insertAdjacentElement(act === "above" ? "beforebegin" : "afterend", p);
      placeCaretIn(p);
    }

    hideMenu();
    hideHandle();
    hoveredBlock = null;
  });
</script>
</body>
</html>
