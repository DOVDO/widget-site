<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Widget</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #fff; color: #37352f;
    height: 100vh; display: flex; flex-direction: column;
  }
  .toolbar {
    display: flex; gap: 8px; align-items: center;
    padding: 6px 10px; border-bottom: 1px solid #e9e9e7;
  }
  .toolbar a { text-decoration: none; font-size: 15px; }
  .toolbar button {
    border: 1px solid #d3d3d0; background: #fff; color: #37352f;
    border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer;
  }
  .toolbar button:hover { background: #f1f1ef; }
  .spacer { flex: 1; }
  .hint { font-size: 12px; color: #9b9a97; }

  .panes { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1; min-width: 0; overflow: auto; }
  #editor {
    width: 100%; height: 100%; resize: none; border: none; outline: none;
    padding: 14px; font-size: 14px; line-height: 1.6;
    font-family: "SF Mono", Consolas, monospace;
    border-inline-end: 1px solid #e9e9e7;
    direction: rtl;
  }
  #preview { padding: 14px; line-height: 1.6; direction: rtl; }

  #preview h1, #preview h2, #preview h3 { margin: 14px 0 6px; }
  #preview p, #preview ul, #preview ol, #preview blockquote { margin: 6px 0; }
  #preview ul, #preview ol { padding-inline-start: 24px; }
  #preview blockquote {
    border-inline-start: 3px solid #d3d3d0; padding-inline-start: 10px; color: #6b6b6b;
  }
  #preview code {
    background: #f1f1ef; border-radius: 4px; padding: 1px 5px;
    font-family: Consolas, monospace; font-size: 13px; direction: ltr; unicode-bidi: embed;
  }
  #preview pre { background: #f7f6f3; padding: 10px; border-radius: 6px; overflow: auto; direction: ltr; text-align: left; }
  #preview pre code { background: none; padding: 0; }
  #preview table { border-collapse: collapse; margin: 8px 0; }
  #preview th, #preview td { border: 1px solid #d3d3d0; padding: 4px 10px; }

  body.preview-only #editor-pane { display: none; }
</style>
</head>
<body>
  <div class="toolbar">
    <a href="index.html" title="חזרה לדף הבית">🏠</a>
    <button id="toggleBtn">👁️ תצוגה בלבד</button>
    <button id="downloadBtn">⬇️ הורד .md</button>
    <span class="spacer"></span>
    <span class="hint">אחסון בזיכרון בלבד — רענון מוחק</span>
  </div>

  <div class="panes">
    <div class="pane" id="editor-pane">
      <textarea id="editor" placeholder="כתוב כאן Markdown..."># שלום עולם

זהו **ווידג'ט Markdown** בסיסי.

- נקודה ראשונה
- נקודה שנייה

> ציטוט לדוגמה

קוד בשורה: `int x = 5;`
</textarea>
    </div>
    <div class="pane" id="preview"></div>
  </div>

<script>
  const editor = document.getElementById("editor");
  const preview = document.getElementById("preview");

  function render() {
    const html = marked.parse(editor.value);
    preview.innerHTML = DOMPurify.sanitize(html);
  }
  editor.addEventListener("input", render);
  render();

  document.getElementById("toggleBtn").addEventListener("click", (e) => {
    document.body.classList.toggle("preview-only");
    e.target.textContent = document.body.classList.contains("preview-only")
      ? "✏️ חזרה לעריכה" : "👁️ תצוגה בלבד";
  });

  document.getElementById("downloadBtn").addEventListener("click", () => {
    const blob = new Blob([editor.value], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "note-" + new Date().toISOString().slice(0, 16).replace("T", "_") + ".md";
    a.click();
    URL.revokeObjectURL(a.href);
  });
</script>
</body>
</html>
