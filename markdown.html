<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Widget</title>
<link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
<link rel="stylesheet" href="https://uicdn.toast.com/tui-color-picker/latest/tui-color-picker.min.css">
<link rel="stylesheet" href="https://uicdn.toast.com/editor-plugin-color-syntax/latest/toastui-editor-plugin-color-syntax.min.css">
<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="https://uicdn.toast.com/tui-color-picker/latest/tui-color-picker.min.js"></script>
<script src="https://uicdn.toast.com/editor-plugin-color-syntax/latest/toastui-editor-plugin-color-syntax.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #fff; color: #37352f;
    display: flex; flex-direction: column;
  }

  .content { flex: 1; min-height: 0; padding: 30px 10px 4px; }
  #editorRoot, #viewerRoot { height: 100%; }
  #viewerRoot { overflow-y: auto; padding: 0 6px; }

  body.mode-view #editorRoot { display: none; }
  body:not(.mode-view) #viewerRoot { display: none; }

  .toastui-editor-contents { direction: rtl; text-align: right; font-size: 15px; font-family: -apple-system, "Segoe UI", Arial, sans-serif; }
  .toastui-editor-contents pre, .toastui-editor-contents code { direction: ltr; text-align: left; }

  /* המיכל הנגלל נשאר LTR כדי שפס הגלילה יהיה בצד ימין,
     וכל בלוק בתוכו מוצג RTL */
  .ProseMirror { direction: ltr; overflow-y: auto; scrollbar-width: thin; }
  .ProseMirror::-webkit-scrollbar { width: 7px; }
  .ProseMirror::-webkit-scrollbar-thumb { background: #d3d3d0; border-radius: 4px; }

  /* תחושת "בלוקים" כמו בנושן: כל בלוק עליון מודגש קלות בריחוף */
  .ProseMirror > * { direction: rtl; text-align: right; padding: 3px 6px; border-radius: 4px; }
  .ProseMirror > *:hover { background: rgba(55, 53, 47, .045); }
  .ProseMirror > pre { direction: ltr; text-align: left; }

  /* סרגל העיצוב העליון — גלילה אופקית במקום שבירה */
  .toastui-editor-defaultUI-toolbar { flex-wrap: nowrap !important; overflow-x: auto !important; overflow-y: hidden !important; scrollbar-width: thin; }
  .toastui-editor-defaultUI-toolbar::-webkit-scrollbar { height: 4px; }
  .toastui-editor-defaultUI-toolbar::-webkit-scrollbar-thumb { background: #d3d3d0; border-radius: 2px; }
  .toastui-editor-toolbar-group { flex-shrink: 0 !important; }

  /* הסרגל התחתון — גלילה אופקית */
  .toolbar {
    display: flex; gap: 6px; align-items: center;
    flex-wrap: nowrap; overflow-x: auto; scrollbar-width: thin;
    margin: 6px 10px 10px; padding: 6px 10px;
    border: 1px solid #e9e9e7; border-radius: 10px; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .toolbar::-webkit-scrollbar { height: 4px; }
  .toolbar::-webkit-scrollbar-thumb { background: #d3d3d0; border-radius: 2px; }
  .toolbar a { text-decoration: none; font-size: 15px; flex-shrink: 0; }
  #docName {
    border: 1px solid transparent; border-radius: 6px; background: transparent;
    font-size: 13.5px; font-weight: 600; color: #37352f;
    padding: 3px 8px; min-width: 60px; max-width: 180px; flex: 1 1 60px;
    direction: rtl;
  }
  #docName:hover { border-color: #d3d3d0; }
  #docName:focus { outline: none; border-color: #2383e2; }
  .toolbar button {
    border: 1px solid #d3d3d0; background: #fff; color: #37352f;
    border-radius: 6px; padding: 4px 9px; font-size: 12.5px; cursor: pointer;
    flex-shrink: 0; white-space: nowrap;
  }
  .toolbar button:hover { background: #f1f1ef; }
  .toolbar button.active { background: #37352f; color: #fff; border-color: #37352f; }
  #saveStatus { font-size: 11.5px; color: #9b9a97; flex-shrink: 0; white-space: nowrap; }

  body.toolbar-hidden .toolbar { display: none; }
  #showBtn {
    display: none; position: fixed; bottom: 10px; inset-inline-start: 10px;
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid #d3d3d0; background: #fff; cursor: pointer;
    font-size: 13px; opacity: .35; box-shadow: 0 2px 6px rgba(0,0,0,.1);
    align-items: center; justify-content: center; z-index: 50;
  }
  #showBtn:hover { opacity: 1; }
  body.toolbar-hidden #showBtn { display: flex; }

  #blockHandle { position: fixed; z-index: 60; display: none; }
  #blockHandle button {
    background: #fff; color: #9b9a97;
    border: 1px solid #e9e9e7; border-radius: 6px;
    width: 24px; height: 24px; cursor: grab; font-size: 13px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
    display: flex; align-items: center; justify-content: center;
  }
  #blockHandle button:hover { background: #f1f1ef; color: #37352f; }

  #bhMenu, #slashMenu {
    position: fixed; z-index: 70; display: none;
    flex-direction: column; min-width: 170px;
    background: #fff; border: 1px solid #e9e9e7; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12); padding: 4px;
    direction: rtl; max-height: 60vh; overflow-y: auto;
  }
  #bhMenu button, #slashMenu button {
    border: none; background: none; text-align: right;
    padding: 7px 10px; font-size: 13.5px; cursor: pointer; border-radius: 6px;
    color: #37352f; font-family: inherit; white-space: nowrap;
  }
  #bhMenu button:hover, #slashMenu button:hover, #slashMenu button.sel { background: #f1f1ef; }
  #bhMenu button.danger { color: #c4554d; }
  #slashMenu .hint { font-size: 11px; color: #9b9a97; padding: 4px 10px 2px; }

  #dropLine {
    position: fixed; display: none; height: 3px; border-radius: 2px;
    background: #2383e2; z-index: 65; pointer-events: none;
  }

  /* ===== דף נקי: הסתרת הסרגל העליון — בלי להשאיר בלוק לבן תקוע ===== */
  body.top-hidden .toastui-editor-toolbar,
  body.top-hidden .toastui-editor-defaultUI-toolbar { display: none !important; height: 0 !important; min-height: 0 !important; border: none !important; }
  body.top-hidden .toastui-editor-defaultUI { border-top: none; }
  body.top-hidden .toastui-editor-defaultUI .toastui-editor-main { height: 100% !important; }

  /* נורית סנכרון */
  #dovDot { position: fixed; bottom: 12px; inset-inline-end: 10px; width: 12px; height: 12px; border-radius: 50%; background: #9b9a97; box-shadow: 0 0 0 2px #fff, 0 0 0 3px #d3d1cb; cursor: pointer; z-index: 80; }

  /* תפריט קליק ימני */
  #dovCtx { position: fixed; z-index: 9300; display: none; flex-direction: column; min-width: 215px; max-height: calc(100vh - 16px); overflow-y: auto; background: #fff; border: 1px solid #e9e9e7; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.16); padding: 4px; direction: rtl; scrollbar-width: thin; }
  #dovCtx button { border: none; background: none; text-align: right; padding: 7px 10px; font-size: 13.5px; cursor: pointer; border-radius: 6px; color: #37352f; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
  #dovCtx button:hover { background: #f1f1ef; }
  #dovCtx .sep { height: 1px; background: #e9e9e7; margin: 4px 6px; flex-shrink: 0; }

  /* סרגל צף לבחירת טקסט — גישה מהירה לעיצוב */
  #dovBubble { position: fixed; z-index: 9200; display: none; gap: 2px; align-items: center; background: #fff; border: 1px solid #e9e9e7; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.16); padding: 4px; direction: ltr; max-width: calc(100vw - 12px); overflow-x: auto; scrollbar-width: none; }
  #dovBubble button { border: none; background: none; border-radius: 6px; min-width: 28px; height: 28px; padding: 0 6px; cursor: pointer; font-size: 13px; color: #37352f; flex-shrink: 0; font-family: inherit; }
  #dovBubble button:hover { background: #f1f1ef; }
  .dovBubbleDot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; border: 1px solid #d3d1cb; vertical-align: middle; }

  /* נעצים וצילום אזור */
  #pinLayer { display: none; position: fixed; inset: 0; z-index: 9000; cursor: crosshair; background: rgba(11,110,153,.05); }
  .dovPinMark { position: absolute; width: 14px; height: 14px; margin: -7px 0 0 -7px; border-radius: 50%; background: #0b6e99; box-shadow: 0 0 0 3px rgba(11,110,153,.25); }
  #pinHint { position: absolute; top: 34px; left: 50%; transform: translateX(-50%); background: #0b6e99; color: #fff; border-radius: 6px; padding: 5px 12px; font-size: 12.5px; white-space: nowrap; max-width: 94vw; overflow: hidden; text-overflow: ellipsis; }
  #pinRect { position: absolute; pointer-events: none; border: 2px dashed #0b6e99; background: rgba(11,110,153,.06); box-shadow: 0 0 0 100000px rgba(15,15,15,.28); }
  .pinHandle { position: absolute; pointer-events: auto; touch-action: none; width: 14px; height: 14px; background: #fff; border: 2px solid #0b6e99; border-radius: 50%; }
  .pinMove { position: absolute; pointer-events: auto; touch-action: none; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: #fff; border: 2px solid #0b6e99; border-radius: 50%; cursor: move; font-size: 16px; color: #0b6e99; box-shadow: 0 2px 8px rgba(0,0,0,.25); user-select: none; }
  #pinBar { position: absolute; pointer-events: auto; display: flex; gap: 6px; align-items: center; background: #fff; border: 1px solid #d3d1cb; border-radius: 8px; padding: 5px 8px; box-shadow: 0 2px 10px rgba(0,0,0,.2); font-size: 12.5px; white-space: nowrap; }
  #pinBar button { border: 1px solid #d3d1cb; background: #fff; border-radius: 6px; padding: 3px 9px; cursor: pointer; font-size: 12.5px; }
  #pinBar button.primary { background: #0b6e99; color: #fff; border-color: #0b6e99; }

  /* חלונית כללית + הודעות */
  .dovOverlay { position: fixed; inset: 0; background: rgba(15,15,15,.45); z-index: 99000; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .dovBox { background: #fff; border-radius: 10px; box-shadow: 0 10px 36px rgba(0,0,0,.25); padding: 16px; width: 100%; max-width: 460px; max-height: 86vh; overflow: auto; direction: rtl; }
  .dovBox h3 { margin: 0 0 10px; font-size: 15px; }
  .dovBox .hint { font-size: 12px; color: #787774; margin-top: 8px; }
  #dovToast { position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%); background: #37352f; color: #fff; border-radius: 8px; padding: 8px 14px; font-size: 13px; z-index: 99500; display: none; max-width: 90vw; }
</style>
</head>
<body class="mode-view">

  <div class="content">
    <div id="viewerRoot"></div>
    <div id="editorRoot"></div>
  </div>

  <div class="toolbar" id="toolbar">
    <a href="index.html" title="כל המסמכים">🏠</a>
    <input id="docName" title="שם המסמך — לחץ כדי לערוך">
    <button id="viewBtn" title="קריאה נקייה">👁️ צפייה</button>
    <button id="editBtn" title="עריכה חזותית">✏️ עריכה</button>
    <button id="sourceBtn" title="עריכת קוד ה-Markdown">&lt;/&gt; מקור</button>
    <button id="downloadBtn" title="הורדת קובץ Markdown">⬇️ .md</button>
    <span id="saveStatus"></span>
    <button id="linksBtn" title="היכן הקובץ משובץ בנושן">🔗</button>
    <button id="hideBtn" title="הסתרת הסרגל">⌄</button>
  </div>
  <button id="showBtn" title="הצגת הסרגל">⌃</button>

  <div id="blockHandle"><button id="bhBtn" draggable="true" title="לחיצה לתפריט, גרירה להזזה">⋮⋮</button></div>
  <div id="bhMenu">
    <button data-act="above">⬆️ הוסף בלוק מעל</button>
    <button data-act="below">⬇️ הוסף בלוק מתחת</button>
    <button data-act="duplicate">📄 שכפל את הבלוק</button>
    <button data-act="delete" class="danger">🗑️ מחק את הבלוק</button>
  </div>
  <div id="slashMenu"></div>
  <div id="dropLine"></div>
  <div id="dovCtx"></div>
  <div id="pinLayer"></div>
  <div id="dovDot" title="מצב סנכרון"></div>
  <div id="dovToast"></div>
  <div id="dovBubble"></div>

<script src="storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="cloud.js"></script>
<script src="links-ui.js"></script>
<script>
  // =====================================================
  // 1) כל הרכיבים מוגדרים קודם כל דבר —
  // הבאג בגרסה הקודמת: שימוש ברכיב לפני הגדרתו
  // הפיל את כל הסקריפט.
  // =====================================================
  const docNameInput = document.getElementById("docName");
  const saveStatus = document.getElementById("saveStatus");
  const viewerRootEl = document.getElementById("viewerRoot");
  const blockHandle = document.getElementById("blockHandle");
  const bhBtn = document.getElementById("bhBtn");
  const bhMenu = document.getElementById("bhMenu");
  const slashMenu = document.getElementById("slashMenu");
  const dropLine = document.getElementById("dropLine");
  const modeButtons = {
    view: document.getElementById("viewBtn"),
    edit: document.getElementById("editBtn"),
    source: document.getElementById("sourceBtn"),
  };

  let currentMode = null;
  let hoveredBlock = null;
  let dragBlock = null;
  let dropTarget = null;
  let dropWhere = "below";
  let slashOpen = false;
  let slashIndex = 0;
  let saveTimer = null;

  // אם בכל זאת תקרה שגיאה — נראה אותה בסרגל במקום לסבול בשקט
  window.addEventListener("error", (e) => {
    if (saveStatus) saveStatus.textContent = "⚠️ שגיאה: " + e.message;
  });

  // ===== טעינת המסמך =====
  const params = new URLSearchParams(location.search);
  // אם הקישור כולל מזהה מרחב (space) — מתחברים אליו אוטומטית גם אם האחסון המקומי נוקה
  try {
    const spParam = params.get("space");
    if (spParam && window.dovCloud && !dovCloud.spaceId()) dovCloud.setSpaceId(spParam);
  } catch (e) {}
  let docId = params.get("id");
  let doc = docId ? getDoc(docId) : null;
  if (!doc && docId && window.dovCloud && dovCloud.spaceId()) {
    // הקובץ לא נמצא מקומית (הדפדפן ניקה את האחסון?) — לא יוצרים קובץ חדש וריק!
    // שלד עם אותו מזהה ו-updated ריק — המשיכה מהענן (שרצה מיד) תמיד תנצח ותחזיר את התוכן
    doc = { id: docId, type: "markdown", name: defaultName(), content: "", data: null, folderId: null, links: [], created: nowIso(), updated: "" };
    window.dovStore.putDoc(doc);
  }
  if (!doc) {
    doc = createDoc();
    docId = doc.id;
    history.replaceState(null, "", "markdown.html?id=" + encodeURIComponent(docId));
  }
  docNameInput.value = doc.name;

  // ===== העורך והתצוגה =====
  const editor = new toastui.Editor({
    el: document.getElementById("editorRoot"),
    height: "100%",
    initialEditType: "wysiwyg",
    initialValue: doc.content || "",
    usageStatistics: false,
    hideModeSwitch: true,
    autofocus: false,
    placeholder: "כתוב כאן... (הקלד / בשורה ריקה לתפריט בלוקים)",
    toolbarItems: [
      ["heading", "bold", "italic", "strike"],
      ["hr", "quote"],
      ["ul", "ol", "task", "indent", "outdent"],
      ["table", "image", "link"],
      ["code", "codeblock"],
    ],
    plugins: [toastui.Editor.plugin.colorSyntax],
  });

  const viewer = toastui.Editor.factory({
    el: viewerRootEl,
    viewer: true,
    initialValue: doc.content || "",
    usageStatistics: false,
  });

  function refreshViewer() {
    const md = editor.getMarkdown();
    viewer.setMarkdown(md.trim() ? md : "*המסמך ריק — עבור למצב ✏️ עריכה כדי לכתוב*");
  }

  // ===== עזרי המנוע הפנימי (ProseMirror) =====
  function getView() {
    try {
      return editor.wwEditor && editor.wwEditor.view ? editor.wwEditor.view : null;
    } catch (e) { return null; }
  }
  function getProseMirror() {
    return document.querySelector("#editorRoot .ProseMirror");
  }
  function blockRange(view, el) {
    try {
      const inner = view.posAtDOM(el, 0);
      const $pos = view.state.doc.resolve(inner);
      if ($pos.depth < 1) return null;
      return { before: $pos.before(1), after: $pos.after(1) };
    } catch (e) { return null; }
  }
  function blockNode(view, r) {
    return view.state.doc.resolve(r.before).nodeAfter;
  }
  function placeCaretAt(view, tr, pos) {
    try {
      const SelClass = view.state.selection.constructor;
      tr.setSelection(SelClass.near(tr.doc.resolve(pos)));
    } catch (e) {}
    return tr;
  }
  function deleteBlockEl(el) {
    const view = getView();
    const r = view && blockRange(view, el);
    if (view && r) {
      view.dispatch(view.state.tr.delete(r.before, r.after));
    } else if (el.parentElement) {
      el.remove();
    }
  }
  function insertParagraphAt(el, where) {
    const view = getView();
    const r = view && blockRange(view, el);
    if (!view || !r) return;
    const para = view.state.schema.nodes.paragraph.createAndFill();
    if (!para) return;
    const pos = where === "above" ? r.before : r.after;
    let tr = view.state.tr.insert(pos, para);
    tr = placeCaretAt(view, tr, pos + 1);
    view.dispatch(tr);
    view.focus();
  }
  function duplicateBlockEl(el) {
    const view = getView();
    const r = view && blockRange(view, el);
    if (!view || !r) return;
    const node = blockNode(view, r);
    if (!node) return;
    view.dispatch(view.state.tr.insert(r.after, node));
  }
  function moveBlockEl(srcEl, targetEl, where) {
    const view = getView();
    if (!view || srcEl === targetEl) return;
    const src = blockRange(view, srcEl);
    const tgt = blockRange(view, targetEl);
    if (!src || !tgt) return;
    const node = blockNode(view, src);
    if (!node) return;
    let insertPos = where === "above" ? tgt.before : tgt.after;
    let tr = view.state.tr.delete(src.before, src.after);
    insertPos = tr.mapping.map(insertPos);
    tr = tr.insert(insertPos, node);
    view.dispatch(tr);
  }

  // ===== מצבי תצוגה =====
  function hideHandle() { blockHandle.style.display = "none"; }
  function hideMenu() { bhMenu.style.display = "none"; }
  function closeSlash() {
    slashMenu.style.display = "none";
    slashOpen = false;
  }

  function setMode(mode) {
    currentMode = mode;
    document.body.classList.remove("mode-view", "mode-edit", "mode-source");
    document.body.classList.add("mode-" + mode);
    for (const key in modeButtons) {
      modeButtons[key].classList.toggle("active", key === mode);
    }
    hideHandle(); hideMenu(); closeSlash();
    if (mode === "view") {
      refreshViewer();
    } else if (mode === "edit") {
      editor.changeMode("wysiwyg", true);
    } else {
      editor.changeMode("markdown", true);
    }
    try { localStorage.setItem("dov-widgets-ui-mode", mode); } catch (e) {}
  }

  modeButtons.view.addEventListener("click", () => setMode("view"));
  modeButtons.edit.addEventListener("click", () => { setMode("edit"); editor.focus(); });
  modeButtons.source.addEventListener("click", () => { setMode("source"); editor.focus(); });
  viewerRootEl.addEventListener("dblclick", () => { setMode("edit"); editor.focus(); });

  // ===== שמירה, שם, הורדה, הסתרת סרגל =====
  editor.on("change", () => {
    saveStatus.textContent = "שומר...";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      updateDoc(docId, { content: editor.getMarkdown() });
      saveStatus.textContent = "נשמר ✓";
    }, 400);
  });

  docNameInput.addEventListener("change", () => {
    const name = docNameInput.value.trim();
    if (name) {
      updateDoc(docId, { name: name });
    } else {
      docNameInput.value = getDoc(docId).name;
    }
    saveStatus.textContent = "נשמר ✓";
  });

  function setToolbarHidden(hidden) {
    document.body.classList.toggle("toolbar-hidden", hidden);
    try { localStorage.setItem("dov-md-bottom", hidden ? "1" : "0"); } catch (e) {}
  }
  function setTopHidden(hidden) {
    document.body.classList.toggle("top-hidden", hidden);
    try { localStorage.setItem("dov-md-top", hidden ? "1" : "0"); } catch (e) {}
    // מאלץ את העורך לחשב מחדש את הגובה — אחרת נשאר אזור לבן "תקוע" במקום הסרגל
    try { editor.setHeight("100%"); } catch (e) {}
  }
  document.getElementById("hideBtn").addEventListener("click", () => setToolbarHidden(true));
  document.getElementById("showBtn").addEventListener("click", () => setToolbarHidden(false));

  document.getElementById("downloadBtn").addEventListener("click", () => {
    const safeName = (getDoc(docId).name || "note").replace(/[\\/:*?"<>|]/g, "-");
    const blob = new Blob([editor.getMarkdown()], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = safeName + ".md";
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ===== ידית בלוק =====
  function positionHandle(block) {
    const rect = block.getBoundingClientRect();
    let left = rect.right + 4;
    if (left + 28 > window.innerWidth) left = rect.right - 28;
    blockHandle.style.top = Math.max(rect.top, 0) + "px";
    blockHandle.style.left = left + "px";
    blockHandle.style.display = "block";
  }

  function topBlockFromPoint(x, y) {
    const pm = getProseMirror();
    if (!pm) return null;
    let el = document.elementFromPoint(x, y);
    if (!el || !pm.contains(el) || el === pm) return null;
    while (el.parentElement && el.parentElement !== pm) el = el.parentElement;
    return el && el.parentElement === pm ? el : null;
  }

  document.addEventListener("mousemove", (e) => {
    if (currentMode !== "edit" || dragBlock) return;
    if (blockHandle.contains(e.target) || bhMenu.contains(e.target)) return;
    const block = topBlockFromPoint(e.clientX, e.clientY);
    if (block) {
      hoveredBlock = block;
      positionHandle(block);
    } else if (bhMenu.style.display !== "flex") {
      hideHandle();
    }
  });

  document.addEventListener("scroll", () => { hideHandle(); hideMenu(); closeSlash(); }, true);
  window.addEventListener("resize", () => { hideHandle(); hideMenu(); closeSlash(); });

  bhBtn.addEventListener("mousedown", (e) => e.preventDefault());

  bhBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!hoveredBlock) return;
    const rect = blockHandle.getBoundingClientRect();
    bhMenu.style.display = "flex";
    let left = rect.left - 180;
    if (left < 4) left = 4;
    let top = rect.top;
    if (top + 160 > window.innerHeight) top = Math.max(window.innerHeight - 160, 4);
    bhMenu.style.top = top + "px";
    bhMenu.style.left = left + "px";
  });

  document.addEventListener("mousedown", (e) => {
    if (!bhMenu.contains(e.target) && !blockHandle.contains(e.target)) hideMenu();
    if (!slashMenu.contains(e.target)) closeSlash();
  });

  bhMenu.addEventListener("click", (e) => {
    const act = e.target.dataset && e.target.dataset.act;
    if (!act || !hoveredBlock) return;
    const block = hoveredBlock;
    if (act === "delete") deleteBlockEl(block);
    else if (act === "duplicate") duplicateBlockEl(block);
    else insertParagraphAt(block, act);
    hideMenu();
    hideHandle();
    hoveredBlock = null;
  });

  // ===== גרירת בלוקים =====
  bhBtn.addEventListener("dragstart", (e) => {
    if (!hoveredBlock) { e.preventDefault(); return; }
    dragBlock = hoveredBlock;
    hideMenu();
    try { e.dataTransfer.setData("text/plain", ""); } catch (err) {}
    e.dataTransfer.effectAllowed = "move";
  });

  document.addEventListener("dragover", (e) => {
    if (!dragBlock) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const target = topBlockFromPoint(e.clientX, e.clientY);
    if (!target || target === dragBlock) {
      dropTarget = null;
      dropLine.style.display = "none";
      return;
    }
    const rect = target.getBoundingClientRect();
    const above = e.clientY < rect.top + rect.height / 2;
    dropTarget = target;
    dropWhere = above ? "above" : "below";
    dropLine.style.display = "block";
    dropLine.style.top = (above ? rect.top : rect.bottom) - 1.5 + "px";
    dropLine.style.left = rect.left + "px";
    dropLine.style.width = rect.width + "px";
  }, true);

  document.addEventListener("drop", (e) => {
    if (!dragBlock) return;
    e.preventDefault();
    e.stopPropagation();
    if (dropTarget) moveBlockEl(dragBlock, dropTarget, dropWhere);
    endDrag();
  }, true);

  document.addEventListener("dragend", () => endDrag(), true);

  function endDrag() {
    dragBlock = null;
    dropTarget = null;
    dropLine.style.display = "none";
    hideHandle();
  }

  // ===== תפריט לוכסן (/) =====
  const slashItems = [
    { label: "🔤 כותרת 1", cmd: "heading", level: 1 },
    { label: "🔣 כותרת 2", cmd: "heading", level: 2 },
    { label: "🔡 כותרת 3", cmd: "heading", level: 3 },
    { label: "• רשימת תבליטים", cmd: "bulletList" },
    { label: "1⃣ רשימה ממוספרת", cmd: "orderedList" },
    { label: "☑️ רשימת משימות", cmd: "taskList" },
    { label: "❝ ציטוט", cmd: "blockQuote" },
    { label: "➖ קו מפריד", cmd: "hr" },
    { label: "💻 בלוק קוד", cmd: "codeBlock" },
    { label: "📊 טבלה 3×3", cmd: "addTable" },
  ];

  function renderSlash() {
    slashMenu.innerHTML = "";
    slashItems.forEach((item, i) => {
      const btn = document.createElement("button");
      btn.textContent = item.label;
      btn.className = i === slashIndex ? "sel" : "";
      btn.addEventListener("mousedown", (ev) => ev.preventDefault());
      btn.addEventListener("click", () => runSlash(i));
      slashMenu.appendChild(btn);
    });
    const hint = document.createElement("div");
    hint.className = "hint";
    hint.textContent = "↑↓ לניווט · Enter לבחירה · Esc לסגירה";
    slashMenu.appendChild(hint);
  }

  function caretViewportRect() {
    const sel = window.getSelection();
    if (sel && sel.rangeCount) {
      const rect = sel.getRangeAt(0).getBoundingClientRect();
      if (rect && (rect.top || rect.left || rect.width || rect.height)) return rect;
      const node = sel.anchorNode;
      const el = node && (node.nodeType === 1 ? node : node.parentElement);
      if (el) return el.getBoundingClientRect();
    }
    return null;
  }

  function openSlash() {
    slashIndex = 0;
    renderSlash();
    slashMenu.style.display = "flex";
    const rect = caretViewportRect();
    let top = rect ? rect.bottom + 6 : 60;
    let left = rect ? Math.max(rect.left - 170, 4) : 10;
    slashMenu.style.visibility = "hidden";
    slashMenu.style.top = "0px";
    slashMenu.style.left = "0px";
    const h = slashMenu.offsetHeight;
    if (top + h > window.innerHeight - 8) top = Math.max((rect ? rect.top : 60) - h - 6, 8);
    slashMenu.style.top = top + "px";
    slashMenu.style.left = left + "px";
    slashMenu.style.visibility = "visible";
    slashOpen = true;
  }

  function runSlash(i) {
    const item = slashItems[i];
    closeSlash();
    editor.focus();
    try {
      if (item.cmd === "heading") editor.exec("heading", { level: item.level });
      else if (item.cmd === "addTable") editor.exec("addTable", { rowCount: 3, columnCount: 3 });
      else editor.exec(item.cmd);
    } catch (e) {
      saveStatus.textContent = "⚠️ הפקודה לא נתמכה";
    }
  }

  document.addEventListener("keydown", (e) => {
    if (slashOpen) {
      if (e.key === "Escape") {
        e.preventDefault(); e.stopPropagation(); closeSlash();
      } else if (e.key === "ArrowDown") {
        e.preventDefault(); e.stopPropagation();
        slashIndex = (slashIndex + 1) % slashItems.length; renderSlash();
      } else if (e.key === "ArrowUp") {
        e.preventDefault(); e.stopPropagation();
        slashIndex = (slashIndex - 1 + slashItems.length) % slashItems.length; renderSlash();
      } else if (e.key === "Enter") {
        e.preventDefault(); e.stopPropagation(); runSlash(slashIndex);
      } else if (e.key !== "Shift" && e.key !== "Control" && e.key !== "Alt" && e.key !== "Meta") {
        closeSlash();
      }
      return;
    }
    if (e.key !== "/" || currentMode !== "edit") return;
    const view = getView();
    if (!view) return;
    try {
      if (!view.hasFocus()) return;
      const sel = view.state.selection;
      if (!sel.empty) return;
      if (sel.$from.parent.textContent.trim() !== "") return;
    } catch (err) { return; }
    e.preventDefault();
    e.stopPropagation();
    openSlash();
  }, true);

  // =====================================================
  // 2) אתחול — רק אחרי שהכל הוגדר (התיקון המרכזי!)
  // =====================================================
  let savedMode = null;
  try { savedMode = localStorage.getItem("dov-widgets-ui-mode"); } catch (e) {}
  if (savedMode !== "view" && savedMode !== "edit" && savedMode !== "source") savedMode = null;
  setMode(savedMode || ((doc.content || "").trim() ? "view" : "edit"));

  // ברירת מחדל: דף נקי לגמרי — שני הסרגלים מוסתרים (קליק ימני מחזיר אותם)
  let mdBottom = null, mdTop = null;
  try { mdBottom = localStorage.getItem("dov-md-bottom"); mdTop = localStorage.getItem("dov-md-top"); } catch (e) {}
  setToolbarHidden(mdBottom !== "0");
  setTopHidden(mdTop !== "0");

  document.getElementById("linksBtn").addEventListener("click", () => openLinksModal(docId));

  // =====================================================
  // 3) גרסה 0.32 — דף נקי: קליק ימני, נורית סנכרון,
  //    צילום מסמך/אזור והעתקה עם עיצוב
  // =====================================================

  function dovToast(msg) {
    const t = document.getElementById("dovToast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(t._tm);
    t._tm = setTimeout(() => { t.style.display = "none"; }, 3200);
  }

  function dovModal(titleText, buildFn) {
    const ov = document.createElement("div");
    ov.className = "dovOverlay";
    const box = document.createElement("div");
    box.className = "dovBox";
    const h = document.createElement("h3");
    h.textContent = titleText;
    box.appendChild(h);
    ov.appendChild(box);
    function close() { try { document.body.removeChild(ov); } catch (e) {} }
    ov.addEventListener("mousedown", (e) => { if (e.target === ov) close(); });
    buildFn(box, close);
    document.body.appendChild(ov);
    return close;
  }

  function mdSafeName() {
    return (getDoc(docId).name || "note").replace(/[\\/:*?"<>|]/g, "-");
  }

  // ===== נורית סנכרון — במקום טקסט "מסונכרן בענן" =====
  const dovDot = document.getElementById("dovDot");
  function dovStatusColor(t) {
    if (!t) return "#9b9a97";
    if (t.indexOf("שגיאה") >= 0 || t.indexOf("⚠️") >= 0) return "#e03e3e";
    if (t.indexOf("מסנכרן") >= 0 || t.indexOf("שומר") >= 0 || t.indexOf("טוען") >= 0) return "#b97a2a";
    if (t.indexOf("מסונכרן") >= 0 || t.indexOf("נשמר") >= 0) return "#2f9e44";
    return "#9b9a97";
  }
  function dovUpdateDot() {
    const t = saveStatus.textContent || "";
    dovDot.style.background = dovStatusColor(t);
    dovDot.title = t || "מצב סנכרון";
  }
  new MutationObserver(dovUpdateDot).observe(saveStatus, { childList: true, characterData: true, subtree: true });
  dovUpdateDot();
  dovDot.addEventListener("click", () => dovToast(saveStatus.textContent || "עדיין לא היה סנכרון"));

  // ===== העתקת כל המסמך כולל העיצוב =====
  function copyDocRich() {
    let html = "";
    try { html = editor.getHTML(); } catch (e) {}
    if (!html || !html.trim()) { dovToast("המסמך ריק — אין מה להעתיק"); return; }
    const stage = document.createElement("div");
    stage.contentEditable = "true";
    stage.style.cssText = "position:fixed;left:0;top:0;opacity:0;pointer-events:none;z-index:0;background:#fff;";
    stage.innerHTML = html;
    document.body.appendChild(stage);
    let ok = false;
    try {
      const range = document.createRange();
      range.selectNodeContents(stage);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      ok = document.execCommand("copy");
      sel.removeAllRanges();
    } catch (e) {}
    document.body.removeChild(stage);
    if (ok) dovToast("המסמך הועתק עם העיצוב ✓ — הדבק בנושן עם Ctrl+V");
    else dovToast("⚠️ ההעתקה נחסמה — סמן את הטקסט והעתק ידנית");
  }

  // ===== צילום מסמך / אזור (html2canvas נטען רק בעת הצורך) =====
  let h2cPromise = null;
  function ensureH2C() {
    if (window.html2canvas) return Promise.resolve();
    if (h2cPromise) return h2cPromise;
    h2cPromise = new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js";
      s.onload = res;
      s.onerror = () => {
        const s2 = document.createElement("script");
        s2.src = "https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js";
        s2.onload = res;
        s2.onerror = rej;
        document.head.appendChild(s2);
      };
      document.head.appendChild(s);
    });
    return h2cPromise;
  }

  function showShotModal(canvas) {
    let data = "";
    try { data = canvas.toDataURL("image/png"); } catch (e) {}
    if (!data || data.length < 100) { dovToast("⚠️ הצילום נכשל — נסה שוב"); return; }
    dovModal("📷 צילום המסמך", (box) => {
      const cap = document.createElement("div");
      cap.style.cssText = "background:#e7f3f8;border:1px solid #0b6e99;color:#0b6e99;border-radius:6px;padding:6px 10px;font-size:12.5px;margin-bottom:8px;";
      cap.textContent = "🖱 קליק ימני על התמונה ← \"העתקת תמונה\" — הדרך שתמיד עובדת";
      box.appendChild(cap);
      const img = document.createElement("img");
      img.src = data;
      img.style.cssText = "max-width:100%;border:1px solid #e1e1e1;border-radius:4px;";
      box.appendChild(img);
      const a = document.createElement("a");
      a.href = data;
      a.download = mdSafeName() + ".png";
      a.textContent = "⬇️ הורדת התמונה כקובץ PNG";
      a.style.cssText = "display:inline-block;margin-top:10px;font-size:13px;color:#0b6e99;";
      box.appendChild(a);
      const tip = document.createElement("div");
      tip.className = "hint";
      tip.textContent = "אפשר גם לגרור את התמונה ישירות לדף נושן.";
      box.appendChild(tip);
    });
  }

  // האלמנט שגולל בפועל את תוכן המסמך (תלוי במצב צפייה/עריכה)
  function getScroller() {
    let root = currentMode === "view" ? viewerRootEl : document.getElementById("editorRoot");
    if (!root) root = document.body;
    if (root.scrollHeight > root.clientHeight + 2) return root;
    const all = root.querySelectorAll("*");
    for (let i = 0; i < all.length; i++) {
      const el = all[i];
      if (el.scrollHeight > el.clientHeight + 2) {
        const cs = getComputedStyle(el);
        if (cs.overflowY === "auto" || cs.overflowY === "scroll") return el;
      }
    }
    return root;
  }

  // צילום "בתפירה": גוללים אוטומטית, מצלמים פרוסות מסך (הדרך שמוכחת כעובדת בהטמעה)
  // ותופרים אותן לתמונה אחת — בלי תלות בגובה המסמך
  async function stitchCapture(scroller, fromY, toY) {
    await ensureH2C();
    const rect = scroller.getBoundingClientRect();
    const viewH = scroller.clientHeight;
    const totalH = Math.max(10, toY - fromY);
    // ככל שהקטע ארוך יותר — מורידים מעט רזולוציה כדי שהתמונה לא תיכשל
    const scale = Math.max(1, Math.min(2.5, Math.sqrt(28000000 / (rect.width * totalH))));
    const out = document.createElement("canvas");
    out.width = Math.round(rect.width * scale);
    out.height = Math.round(totalH * scale);
    const g = out.getContext("2d");
    g.fillStyle = "#ffffff";
    g.fillRect(0, 0, out.width, out.height);
    const prevTop = scroller.scrollTop;
    const hideIds = ["dovDot", "showBtn", "blockHandle", "dovToast", "dovBubble", "dovCtx", "dovRangeLine"];
    let done = 0;
    while (done < totalH) {
      const sliceH = Math.min(viewH, totalH - done);
      scroller.scrollTop = fromY + done;
      await new Promise((r) => setTimeout(r, 140)); // נותנים לדפדפן לצייר את הפריים
      const offsetInView = (fromY + done) - scroller.scrollTop;
      const cv = await window.html2canvas(document.body, {
        backgroundColor: "#ffffff",
        scale: scale,
        x: rect.left,
        y: rect.top + offsetInView,
        width: rect.width,
        height: sliceH,
        onclone: (cd) => hideIds.forEach((id) => { const n = cd.getElementById(id); if (n) n.remove(); }),
      });
      g.drawImage(cv, 0, Math.round(done * scale), out.width, Math.round(sliceH * scale));
      done += sliceH;
    }
    scroller.scrollTop = prevTop;
    return out;
  }

  function runStitch(scroller, fromY, toY) {
    dovToast("📷 מצלם… המסמך נגלל אוטומטית — רגע אחד ⏳");
    stitchCapture(scroller, fromY, toY)
      .then((cv) => showShotModal(cv))
      .catch(() => dovToast("⚠️ הצילום נכשל — נסה שוב או צלם קטע קטן יותר"));
  }

  // ===== צילום מנקודה לנקודה: לחיצה על שורת התחלה, גלילה, לחיצה על שורת סיום =====
  let rangePick = null;
  function startRangeShot() {
    const sc = getScroller();
    if (!sc) { dovToast("אין מה לצלם"); return; }
    rangePick = { scroller: sc, firstY: null };
    dovToast("🎯 לחץ על השורה הראשונה לצילום (Esc לביטול)");
  }
  function rangeLine(rect, clientY) {
    let ln = document.getElementById("dovRangeLine");
    if (!ln) {
      ln = document.createElement("div");
      ln.id = "dovRangeLine";
      ln.style.cssText = "position:fixed;height:2px;background:#0b6e99;z-index:8900;pointer-events:none;box-shadow:0 0 5px rgba(11,110,153,.7);";
      document.body.appendChild(ln);
    }
    ln.style.left = rect.left + "px";
    ln.style.width = rect.width + "px";
    ln.style.top = clientY + "px";
    ln.style.display = "block";
  }
  function clearRangeLine() {
    const ln = document.getElementById("dovRangeLine");
    if (ln) ln.style.display = "none";
  }
  document.addEventListener("click", (e) => {
    if (!rangePick) return;
    const sc = rangePick.scroller;
    const rect = sc.getBoundingClientRect();
    if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
    const y = sc.scrollTop + (e.clientY - rect.top);
    if (rangePick.firstY === null) {
      rangePick.firstY = y;
      rangeLine(rect, e.clientY);
      dovToast("🎯 עכשיו גלול ולחץ על השורה האחרונה");
    } else {
      const from = Math.max(0, Math.min(rangePick.firstY, y) - 10);
      const to = Math.min(sc.scrollHeight, Math.max(rangePick.firstY, y) + 26);
      rangePick = null;
      clearRangeLine();
      runStitch(sc, from, to);
    }
  }, true);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && rangePick) { rangePick = null; clearRangeLine(); dovToast("הצילום בוטל"); }
  }, true);
  document.addEventListener("scroll", () => { if (rangePick) clearRangeLine(); }, true);

  function shotFullOld() {
    const target = currentMode === "view" ? viewerRootEl : (getProseMirror() || document.body);
    dovToast("מצלם את כל המסמך… ⏳");
    // יוצרים עותק של התוכן בגובה מלא (בלי גלילה) מאחורי מסך לבן זמני,
    // ומצלמים את העותק — כך נכנס לתמונה גם מה שמעבר לגבולות הגלילה.
    const cover = document.createElement("div");
    cover.style.cssText = "position:fixed;inset:0;background:#fff;z-index:98000;display:flex;align-items:center;justify-content:center;font-size:14px;color:#787774;";
    cover.textContent = "📷 מצלם את כל המסמך… ⏳";
    const holder = document.createElement("div");
    holder.style.cssText = "position:absolute;left:0;top:0;background:#fff;padding:14px;direction:rtl;z-index:97000;width:" + Math.max(target.clientWidth || 0, 320) + "px;";
    const clone = target.cloneNode(true);
    clone.style.height = "auto";
    clone.style.maxHeight = "none";
    clone.style.overflow = "visible";
    clone.removeAttribute("contenteditable");
    holder.appendChild(clone);
    document.body.appendChild(holder);
    document.body.appendChild(cover);
    function cleanup() {
      try { document.body.removeChild(holder); } catch (e) {}
      try { document.body.removeChild(cover); } catch (e) {}
    }
    ensureH2C().then(() => {
      const w = Math.max(holder.scrollWidth, 320);
      const hgt = Math.max(holder.scrollHeight, 60);
      // מגבילים את הרזולוציה כדי שמסמך ארוך לא ייצור תמונה גדולה מדי (שנכשלת בשקט)
      const scale = Math.max(1, Math.min(2, Math.sqrt(12000000 / (w * hgt))));
      return window.html2canvas(holder, { backgroundColor: "#ffffff", scale: scale, width: w, height: hgt, windowWidth: w + 40, windowHeight: hgt + 40 });
    }).then((cv) => {
      cleanup();
      if (!cv || !cv.width || !cv.height) { dovToast("⚠️ הצילום נכשל — נסה צילום אזור עם נעצים"); return; }
      showShotModal(cv);
    }).catch(() => { cleanup(); dovToast("⚠️ הצילום נכשל — נסה צילום אזור עם נעצים"); });
  }

  function shotRegion(r) {
    dovToast("מצלם את האזור… ⏳");
    ensureH2C().then(() => window.html2canvas(document.body, {
      backgroundColor: "#ffffff", scale: 2, x: r.x, y: r.y, width: r.w, height: r.h,
    })).then(showShotModal).catch(() => dovToast("⚠️ הצילום נכשל — בדוק את החיבור לאינטרנט"));
  }

  // ===== נעצים: מסגרת מתכווננת — המסמך נשאר חופשי לגלילה =====
  const pinLayer = document.getElementById("pinLayer");
  let pinPts = [];
  let pinBox = null;
  let pinRectEl = null;
  let pinBarEl = null;

  function pinReset() {
    pinPts = []; pinBox = null; pinRectEl = null; pinBarEl = null;
    pinLayer.style.display = "none";
    pinLayer.style.pointerEvents = "";
    pinLayer.style.background = "";
    pinLayer.style.cursor = "";
    pinLayer.innerHTML = "";
  }

  function startPins() {
    pinReset();
    pinLayer.style.display = "block";
    pinLayer.innerHTML = "<div id='pinHint'>📌 לחץ על 2 פינות של האזור — אחרי שתיווצר מסגרת, המסמך חופשי לגלילה</div>";
  }

  pinLayer.addEventListener("click", (e) => {
    if (pinBox) return;
    const m = document.createElement("div");
    m.className = "dovPinMark";
    m.style.left = e.clientX + "px";
    m.style.top = e.clientY + "px";
    pinLayer.appendChild(m);
    pinPts.push({ x: e.clientX, y: e.clientY });
    if (pinPts.length === 2) buildPinRect();
  });

  function drawPinRect() {
    pinRectEl.style.left = pinBox.x + "px";
    pinRectEl.style.top = pinBox.y + "px";
    pinRectEl.style.width = pinBox.w + "px";
    pinRectEl.style.height = pinBox.h + "px";
    pinBarEl.style.top = (pinBox.y > 44 ? -40 : pinBox.h + 10) + "px";
    pinBarEl.style.left = "0px";
  }

  function buildPinRect() {
    pinBox = {
      x: Math.min(pinPts[0].x, pinPts[1].x),
      y: Math.min(pinPts[0].y, pinPts[1].y),
      w: Math.max(Math.abs(pinPts[0].x - pinPts[1].x), 24),
      h: Math.max(Math.abs(pinPts[0].y - pinPts[1].y), 24),
    };
    pinLayer.innerHTML = "";
    pinRectEl = document.createElement("div");
    pinRectEl.id = "pinRect";
    ["nw", "ne", "sw", "se"].forEach((c) => {
      const hd = document.createElement("div");
      hd.className = "pinHandle";
      hd.dataset.c = c;
      hd.style.cursor = (c === "nw" || c === "se") ? "nwse-resize" : "nesw-resize";
      if (c.indexOf("w") >= 0) hd.style.left = "-9px"; else hd.style.right = "-9px";
      if (c.indexOf("n") >= 0) hd.style.top = "-9px"; else hd.style.bottom = "-9px";
      pinRectEl.appendChild(hd);
    });
    const grip = document.createElement("div");
    grip.className = "pinMove";
    grip.textContent = "✥";
    grip.title = "גרירת המסגרת — רק מכאן";
    pinRectEl.appendChild(grip);
    pinBarEl = document.createElement("div");
    pinBarEl.id = "pinBar";
    const shoot = document.createElement("button");
    shoot.className = "primary";
    shoot.textContent = "📸 צלם";
    shoot.addEventListener("click", () => {
      const r = { x: pinBox.x, y: pinBox.y, w: pinBox.w, h: pinBox.h };
      pinReset();
      setTimeout(() => shotRegion(r), 80); // נותנים לכהות להיעלם לפני הצילום
    });
    const cancel = document.createElement("button");
    cancel.textContent = "✖";
    cancel.addEventListener("click", pinReset);
    pinBarEl.appendChild(shoot);
    pinBarEl.appendChild(cancel);
    pinRectEl.appendChild(pinBarEl);
    pinLayer.appendChild(pinRectEl);
    // שחרור השכבה — המסמך חופשי לגלילה; רק הידיות חיות
    pinLayer.style.pointerEvents = "none";
    pinLayer.style.background = "transparent";
    pinLayer.style.cursor = "default";
    drawPinRect();
    initPinDrag();
  }

  function initPinDrag() {
    pinRectEl.addEventListener("pointerdown", (e) => {
      const t = e.target;
      const mode = t.classList.contains("pinHandle") ? t.dataset.c : t.classList.contains("pinMove") ? "move" : null;
      if (!mode) return;
      e.preventDefault();
      e.stopPropagation();
      try { t.setPointerCapture(e.pointerId); } catch (err) {}
      const sx = e.clientX, sy = e.clientY;
      const o = { x: pinBox.x, y: pinBox.y, w: pinBox.w, h: pinBox.h };
      const mv = (ev) => {
        const dx = ev.clientX - sx, dy = ev.clientY - sy;
        if (mode === "move") {
          pinBox.x = o.x + dx;
          pinBox.y = o.y + dy;
        } else {
          if (mode.indexOf("w") >= 0) { pinBox.x = Math.min(o.x + dx, o.x + o.w - 24); pinBox.w = Math.max(o.w - dx, 24); }
          if (mode.indexOf("e") >= 0) { pinBox.w = Math.max(o.w + dx, 24); }
          if (mode.indexOf("n") >= 0) { pinBox.y = Math.min(o.y + dy, o.y + o.h - 24); pinBox.h = Math.max(o.h - dy, 24); }
          if (mode.indexOf("s") >= 0) { pinBox.h = Math.max(o.h + dy, 24); }
        }
        drawPinRect();
      };
      const up = () => {
        t.removeEventListener("pointermove", mv);
        t.removeEventListener("pointerup", up);
      };
      t.addEventListener("pointermove", mv);
      t.addEventListener("pointerup", up);
    });
  }

  // ===== סרגל צף לבחירת טקסט — גישה מהירה לעיצוב בלי לפתוח תפריט =====
  const dovBubble = document.getElementById("dovBubble");
  function hideBubble() { dovBubble.style.display = "none"; }
  function bubbleExec(cmd, payload) {
    try { editor.exec(cmd, payload); } catch (e) { dovToast("⚠️ הפקודה לא נתמכה"); }
  }
  (function buildBubble() {
    const items = [
      ["𝐁", "מודגש", () => bubbleExec("bold")],
      ["𝐼", "נטוי", () => bubbleExec("italic")],
      ["S̶", "קו חוצה", () => bubbleExec("strike")],
      ["</>", "קוד", () => bubbleExec("code")],
      ["H1", "כותרת 1", () => bubbleExec("heading", { level: 1 })],
      ["H2", "כותרת 2", () => bubbleExec("heading", { level: 2 })],
      ["H3", "כותרת 3", () => bubbleExec("heading", { level: 3 })],
      ["•", "רשימת תבליטים", () => bubbleExec("bulletList")],
      ["☑", "רשימת משימות", () => bubbleExec("taskList")],
      ["❝", "ציטוט", () => bubbleExec("blockQuote")],
    ];
    items.forEach((it) => {
      const b = document.createElement("button");
      b.textContent = it[0];
      b.title = it[1];
      b.addEventListener("mousedown", (ev) => ev.preventDefault()); // שומר על הסימון בזמן הלחיצה
      b.addEventListener("click", it[2]);
      dovBubble.appendChild(b);
    });
    [["#37352f", "רגיל"], ["#e03e3e", "אדום"], ["#0b6e99", "כחול"], ["#0f7b6c", "ירוק"], ["#d9730d", "כתום"]].forEach((c) => {
      const b = document.createElement("button");
      const dot = document.createElement("span");
      dot.className = "dovBubbleDot";
      dot.style.background = c[0];
      b.title = "צבע טקסט: " + c[1];
      b.appendChild(dot);
      b.addEventListener("mousedown", (ev) => ev.preventDefault());
      b.addEventListener("click", () => bubbleExec("color", { selectedColor: c[0] }));
      dovBubble.appendChild(b);
    });
  })();
  function maybeShowBubble() {
    if (currentMode !== "edit") { hideBubble(); return; }
    const pm = getProseMirror();
    const sel = window.getSelection();
    if (!pm || !sel || sel.rangeCount === 0 || sel.isCollapsed) { hideBubble(); return; }
    const range = sel.getRangeAt(0);
    const node = range.commonAncestorContainer;
    const el = node.nodeType === 1 ? node : node.parentElement;
    if (!el || !pm.contains(el)) { hideBubble(); return; }
    const rect = range.getBoundingClientRect();
    if (!rect || (!rect.width && !rect.height)) { hideBubble(); return; }
    dovBubble.style.display = "flex";
    dovBubble.style.visibility = "hidden";
    dovBubble.style.top = "0px";
    dovBubble.style.left = "0px";
    const bw = dovBubble.offsetWidth;
    const bh = dovBubble.offsetHeight;
    let top = rect.top - bh - 8;
    if (top < 4) top = rect.bottom + 8;
    let left = rect.left + rect.width / 2 - bw / 2;
    left = Math.max(4, Math.min(left, window.innerWidth - bw - 4));
    dovBubble.style.top = top + "px";
    dovBubble.style.left = left + "px";
    dovBubble.style.visibility = "visible";
  }
  document.addEventListener("mouseup", (e) => {
    if (dovBubble.contains(e.target)) return;
    setTimeout(maybeShowBubble, 10);
  });
  document.addEventListener("keyup", (e) => {
    if ((e.key && e.key.indexOf("Arrow") === 0) || e.key === "Shift") setTimeout(maybeShowBubble, 10);
  });
  document.addEventListener("mousedown", (e) => { if (!dovBubble.contains(e.target)) hideBubble(); });
  document.addEventListener("scroll", hideBubble, true);
  document.addEventListener("contextmenu", hideBubble, true);

  // ===== תפריט קליק ימני — הגישה לכל האפשרויות =====
  const dovCtx = document.getElementById("dovCtx");
  function hideCtx() { dovCtx.style.display = "none"; }

  function ctxBtn(label, fn) {
    const b = document.createElement("button");
    b.textContent = label;
    b.addEventListener("click", () => { hideCtx(); fn(); });
    dovCtx.appendChild(b);
  }
  function ctxSep() {
    const s = document.createElement("div");
    s.className = "sep";
    dovCtx.appendChild(s);
  }

  // תת-תפריט נפתח/נסגר בתוך התפריט (כמו בגיליון)
  function ctxGroup(label, items) {
    const head = document.createElement("button");
    head.textContent = label + " ◂";
    head.addEventListener("mousedown", (ev) => ev.preventDefault()); // שומר על הסימון בעורך
    const grp = document.createElement("div");
    grp.style.cssText = "display:none;flex-direction:column;flex-shrink:0;background:#fbfbfa;border-radius:6px;";
    items.forEach(([txt, fn]) => {
      const b = document.createElement("button");
      b.textContent = txt;
      b.style.paddingInlineStart = "26px";
      b.style.flexShrink = "0";
      b.addEventListener("mousedown", (ev) => ev.preventDefault()); // לא מאבדים את הסימון
      b.addEventListener("click", () => { hideCtx(); fn(); });
      grp.appendChild(b);
    });
    head.addEventListener("click", () => {
      const open = grp.style.display !== "none";
      grp.style.display = open ? "none" : "flex";
      head.textContent = label + (open ? " ◂" : " ▾");
    });
    dovCtx.appendChild(head);
    dovCtx.appendChild(grp);
  }

  // הרצת פקודת עיצוב/הוספה של העורך (מה שהיה בסרגל העליון)
  function fmtExec(cmd, payload) {
    if (currentMode !== "edit") { setMode("edit"); }
    try { editor.exec(cmd, payload); editor.focus(); } catch (e) { dovToast("⚠️ הפקודה לא נתמכה"); }
  }

  function refreshFromCloud() {
    dovToast("🔄 מרענן מהענן… ⏳");
    try { if (window.dovCloud && dovCloud.flush) dovCloud.flush(); } catch (e) {}
    try { sessionStorage.removeItem("dov-cloud-reload-" + docId); } catch (e) {}
    setTimeout(() => location.reload(), 700);
  }

  function copyDocUrl() {
    let url = location.origin + location.pathname + "?id=" + encodeURIComponent(docId);
    // מצרפים את מזהה המרחב — כך ההטמעה תתחבר לענן גם אם האחסון המקומי נוקה
    try { if (window.dovCloud && dovCloud.spaceId()) url += "&space=" + encodeURIComponent(dovCloud.spaceId()); } catch (e) {}
    let ok = false;
    try {
      const ta = document.createElement("textarea");
      ta.value = url;
      ta.style.cssText = "position:fixed;top:0;left:0;opacity:0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ok = document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) {}
    dovToast(ok ? "קישור הקובץ הועתק ✓" : "⚠️ ההעתקה נחסמה — העתק מהסייר בדף הבית");
  }

  function buildCtx() {
    dovCtx.innerHTML = "";
    const mark = (m) => (currentMode === m ? "✓ " : "");
    ctxBtn(mark("view") + "👁️ מצב צפייה", () => setMode("view"));
    ctxBtn(mark("edit") + "✏️ מצב עריכה", () => { setMode("edit"); editor.focus(); });
    ctxBtn(mark("source") + "⌨️ עריכת מקור (Markdown)", () => { setMode("source"); editor.focus(); });
    ctxSep();
    const topHidden = document.body.classList.contains("top-hidden");
    const botHidden = document.body.classList.contains("toolbar-hidden");
    ctxBtn(topHidden ? "🧰 הצגת סרגל העיצוב העליון" : "🧰 הסתרת סרגל העיצוב העליון", () => setTopHidden(!topHidden));
    ctxBtn(botHidden ? "🎛️ הצגת הסרגל התחתון" : "🎛️ הסתרת הסרגל התחתון", () => setToolbarHidden(!botHidden));
    ctxSep();
    ctxGroup("🅰 עיצוב והוספה (הסרגל העליון)", [
      ["𝐁 מודגש", () => fmtExec("bold")],
      ["𝐼 נטוי", () => fmtExec("italic")],
      ["S̶ קו חוצה", () => fmtExec("strike")],
      ["</> קוד בתוך שורה", () => fmtExec("code")],
      ["H1 כותרת גדולה", () => fmtExec("heading", { level: 1 })],
      ["H2 כותרת בינונית", () => fmtExec("heading", { level: 2 })],
      ["H3 כותרת קטנה", () => fmtExec("heading", { level: 3 })],
      ["• רשימת תבליטים", () => fmtExec("bulletList")],
      ["1. רשימה ממוספרת", () => fmtExec("orderedList")],
      ["☑ רשימת משימות", () => fmtExec("taskList")],
      ["❝ ציטוט", () => fmtExec("blockQuote")],
      ["▦ טבלה 3×3", () => fmtExec("addTable", { rowCount: 3, columnCount: 3 })],
      ["─ קו מפריד", () => fmtExec("hr")],
      ["{ } בלוק קוד", () => fmtExec("codeBlock")],
    ]);
    ctxSep();
    ctxBtn("📋 העתקת כל המסמך (עם העיצוב)", copyDocRich);
    ctxBtn("📷 צילום כל המסמך", shotFull);
    ctxBtn("🎯 צילום מנקודה לנקודה", startRangeShot);
    ctxBtn("📌 צילום אזור בין 2 נעצים", startPins);
    ctxBtn("⬇️ הורדת קובץ .md", () => document.getElementById("downloadBtn").click());
    ctxSep();
    ctxBtn("🔄 רענון מהענן", refreshFromCloud);
    ctxBtn("📋 העתקת קישור הקובץ (להטמעה)", copyDocUrl);
    ctxBtn("🔗 היכן המסמך משובץ בנושן", () => openLinksModal(docId));
    ctxBtn("🏠 כל המסמכים", () => { location.href = "index.html"; });
  }

  document.addEventListener("contextmenu", (e) => {
    const t = e.target;
    if (t.closest) {
      if (t.closest(".dovOverlay")) return; // בחלון הצילום — תפריט הדפדפן המקורי להעתקת תמונה
      if (t.closest("#dovCtx")) { e.preventDefault(); return; }
      if (currentMode === "edit" && t.closest(".ProseMirror table")) return; // תפריט הטבלאות המובנה של העורך
    }
    e.preventDefault();
    buildCtx();
    dovCtx.style.display = "flex";
    dovCtx.style.visibility = "hidden";
    dovCtx.style.top = "0px";
    dovCtx.style.left = "0px";
    const w = dovCtx.offsetWidth, h = dovCtx.offsetHeight;
    let left = e.clientX - w; // נפתח לשמאל הסמן — נוח בעברית
    if (left < 4) left = Math.min(e.clientX, window.innerWidth - w - 4);
    let top = e.clientY;
    if (top + h > window.innerHeight - 4) top = Math.max(window.innerHeight - h - 4, 4);
    dovCtx.style.top = top + "px";
    dovCtx.style.left = Math.max(left, 4) + "px";
    dovCtx.style.visibility = "visible";
  });

  document.addEventListener("mousedown", (e) => { if (!dovCtx.contains(e.target)) hideCtx(); });
  document.addEventListener("scroll", (e) => {
    // גלילה בתוך התפריט עצמו לא סוגרת אותו — רק גלילת המסמך
    const t = e.target;
    if (t && t.nodeType === 1 && t.closest && t.closest("#dovCtx")) return;
    hideCtx();
  }, true);

  // ===== סנכרון ענן של הקובץ הנוכחי =====
  (function () {
    try {
      if (!window.dovCloud || !dovCloud.spaceId()) return;
      const stEl2 = document.getElementById("saveStatus");
      if (stEl2) dovCloud.bindStatus(stEl2);
      const cid = new URLSearchParams(location.search).get("id");
      if (!cid) return;
      const flag = "dov-cloud-reload-" + cid;
      dovCloud.pullDoc(cid).then(function (changed) {
        if (changed && !sessionStorage.getItem(flag)) {
          sessionStorage.setItem(flag, "1");
          location.reload();
        } else if (!changed) {
          sessionStorage.removeItem(flag);
        }
      });
    } catch (e) { console.error(e); }
  })();

</script>
</body>
</html>
