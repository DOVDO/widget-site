<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Widget</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Arial, sans-serif;
    background: #fff; color: #37352f;
    display: flex; flex-direction: column;
  }
  .toolbar {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    padding: 6px 10px; border-bottom: 1px solid #e9e9e7;
  }
  .toolbar a { text-decoration: none; font-size: 15px; flex-shrink: 0; }
  #docName {
    border: 1px solid transparent; border-radius: 6px;
    font-size: 14px; font-weight: 600; color: #37352f;
    padding: 3px 8px; min-width: 60px; max-width: 220px; flex: 1;
    direction: rtl;
  }
  #docName:hover { border-color: #d3d3d0; }
  #docName:focus { outline: none; border-color: #2383e2; }
  .toolbar button {
    border: 1px solid #d3d3d0; background: #fff; color: #37352f;
    border-radius: 6px; padding: 4px 10px; font-size: 13px; cursor: pointer;
    flex-shrink: 0;
  }
  .toolbar button:hover { background: #f1f1ef; }
  #saveStatus { font-size: 12px; color: #9b9a97; flex-shrink: 0; min-width: 52px; text-align: left; }

  .panes { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1; min-width: 0; min-height: 0; overflow: auto; }
  #editor {
    width: 100%; height: 100%; resize: none; border: none; outline: none;
    padding: 14px; font-size: 14px; line-height: 1.6;
    font-family: "SF Mono", Consolas, monospace;
    border-inline-end: 1px solid #e9e9e7;
    direction: rtl;
  }
  #preview { padding: 14px; line-height: 1.6; direction: rtl; }

  #preview h1, #preview h2, #preview h3 { margin: 14px 0 6px; }
  #preview p, #preview ul, #preview ol, #preview blockquote { margin: 6px 0; }
  #preview ul, #preview ol { padding-inline-start: 24px; }
  #preview blockquote {
    border-inline-start: 3px solid #d3d3d0; padding-inline-start: 10px; color: #6b6b6b;
  }
  #preview code {
    background: #f1f1ef; border-radius: 4px; padding: 1px 5px;
    font-family: Consolas, monospace; font-size: 13px; direction: ltr; unicode-bidi: embed;
  }
  #preview pre { background: #f7f6f3; padding: 10px; border-radius: 6px; overflow: auto; direction: ltr; text-align: left; }
  #preview pre code { background: none; padding: 0; }
  #preview table { border-collapse: collapse; margin: 8px 0; }
  #preview th, #preview td { border: 1px solid #d3d3d0; padding: 4px 10px; }

  body.preview-only #editor-pane { display: none; }

  /* רספונסיביות: במסך צר העורך והתצוגה נערמים זה מעל זה */
  @media (max-width: 600px) {
    .panes { flex-direction: column; }
    #editor {
      border-inline-end: none;
      border-bottom: 1px solid #e9e9e7;
    }
    .pane { flex: 1 1 50%; }
    #saveStatus { min-width: auto; }
  }
</style>
</head>
<body>
  <div class="toolbar">
    <a href="index.html" title="כל המסמכים">🏠</a>
    <input id="docName" title="שם המסמך — לחץ כדי לערוך">
    <button id="toggleBtn">👁️ תצוגה</button>
    <button id="downloadBtn">⬇️ .md</button>
    <span id="saveStatus"></span>
  </div>

  <div class="panes">
    <div class="pane" id="editor-pane">
      <textarea id="editor" placeholder="כתוב כאן Markdown..."></textarea>
    </div>
    <div class="pane" id="preview"></div>
  </div>

<script src="storage.js"></script>
<script>
  const editor = document.getElementById("editor");
  const preview = document.getElementById("preview");
  const docNameInput = document.getElementById("docName");
  const saveStatus = document.getElementById("saveStatus");

  // --- טעינת המסמך לפי ה-id שבכתובת ---
  const params = new URLSearchParams(location.search);
  let docId = params.get("id");
  let doc = docId ? getDoc(docId) : null;

  // אם הגענו בלי מסמך (או עם id שלא קיים) — נוצר חדש מיד
  if (!doc) {
    doc = createDoc();
    docId = doc.id;
    history.replaceState(null, "", "markdown.html?id=" + encodeURIComponent(docId));
  }

  editor.value = doc.content;
  docNameInput.value = doc.name;

  // --- תצוגה מקדימה ---
  function render() {
    preview.innerHTML = DOMPurify.sanitize(marked.parse(editor.value));
  }
  render();

  // --- שמירה אוטומטית (עם השהייה קטנה כדי לא לשמור על כל תו) ---
  let saveTimer = null;
  function scheduleSave() {
    saveStatus.textContent = "שומר...";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      updateDoc(docId, { content: editor.value });
      saveStatus.textContent = "נשמר ✓";
    }, 400);
  }

  editor.addEventListener("input", () => {
    render();
    scheduleSave();
  });

  // --- עריכת שם המסמך ---
  docNameInput.addEventListener("change", () => {
    const name = docNameInput.value.trim();
    if (name) {
      updateDoc(docId, { name: name });
    } else {
      docNameInput.value = getDoc(docId).name; // שם ריק — מחזירים את הקודם
    }
    saveStatus.textContent = "נשמר ✓";
  });

  // --- מעבר עריכה/תצוגה ---
  document.getElementById("toggleBtn").addEventListener("click", (e) => {
    document.body.classList.toggle("preview-only");
    e.target.textContent = document.body.classList.contains("preview-only")
      ? "✏️ עריכה" : "👁️ תצוגה";
  });

  // --- הורדה כקובץ .md עם שם המסמך ---
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const safeName = (getDoc(docId).name || "note").replace(/[\\/:*?"<>|]/g, "-");
    const blob = new Blob([editor.value], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = safeName + ".md";
    a.click();
    URL.revokeObjectURL(a.href);
  });
</script>
</body>
</html>
